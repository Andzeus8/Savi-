<style>
  :root {
    --paper: #F5F1EA;

    --card: #FFFFFF;

    --navigator-height: 88px;

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; }
  html, body { margin: 0; padding: 0; overflow: hidden; background: var(--paper); color: var(--ink); font-family: "SF Pro Text", "Avenir Next", system-ui, -apple-system, sans-serif; overscroll-behavior: none; -webkit-font-smoothing: antialiased; }
  body {
    height: 100%;

  .serif { font-family: 'Fraunces', Georgia, serif; letter-spacing: -0.015em; }
  .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Monaco, Consolas, monospace; }

  /* App container — fullscreen on mobile, phone-frame on desktop */
  .stage { height: 100dvh; min-height: 100dvh; display: flex; align-items: stretch; justify-content: center; background: var(--paper); overflow: hidden; }
  @media (min-width: 500px) {
    .stage {
      align-items: center;
      padding: 32px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 28%),
        linear-gradient(180deg, #EDE6D9 0%, #DDD4C2 100%);

    .frame-wrap { width: min(480px, calc(100vw - 64px)); height: min(900px, calc(100dvh - 64px)); position: relative; }
    .bezel { position: absolute; inset: 0; border-radius: 34px; padding: 0; background: transparent; box-shadow: 0 36px 80px -30px rgba(60,50,40,0.38); }
    .bezel-inner { width: 100%; height: 100%; border-radius: 34px; padding: 0; background: transparent; }
    .screen { width: 100%; height: 100%; border-radius: 34px; overflow: hidden; position: relative; background: var(--paper); border: 1px solid rgba(255,255,255,0.55); }
    .notch { display: none; }
  }
  @media (max-width: 499px) {
    .frame-wrap { width: 100%; height: 100dvh; min-height: 100dvh; }
    .bezel, .bezel-inner { all: unset; display: block; width: 100%; height: 100dvh; min-height: 100dvh; }
    .screen { width: 100%; height: 100dvh; min-height: 100dvh; background: var(--paper); position: relative; overflow: hidden; padding-top: env(safe-area-inset-top); }
    .notch { display: none; }
  }

  .app { display: flex; flex-direction: column; height: 100%; min-height: 0; overflow: hidden; position: relative; }
  @media (min-width: 500px) { .app { height: 100%; min-height: 0; } }
  .app-main { flex: 1; min-height: 0; position: relative; overflow: hidden; padding-bottom: var(--navigator-offset); }
  .navigator-shell { position: absolute; left: 0; right: 0; bottom: 0; z-index: 30; pointer-events: none; }
  .navigator-shell > * { pointer-events: auto; box-shadow: 0 -12px 24px -22px rgba(28,26,23,0.45); }
  @media (max-width: 499px) {
    .navigator-shell { position: fixed; left: 0; right: 0; bottom: 0; z-index: 40; }
  }
  /* Scroll areas */
  .scroll { overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex: 1; }
  .scroll::-webkit-scrollbar { display: none; }

  /* Buttons */
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  button:active { transform: scale(0.985); }
  input, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  button, a, input, textarea { transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease, background-color 140ms ease, opacity 140ms ease; }
  button:disabled, input:disabled, textarea:disabled { cursor: not-allowed; }
  input:focus, textarea:focus { outline: none; border-color: var(--ink) !important; }
  button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 3px solid rgba(200, 85, 61, 0.22);
    outline-offset: 2px;
  }
  @media (hover: hover) {
    button:hover:not(:disabled), a:hover {
      box-shadow: 0 12px 20px -18px rgba(28,26,23,0.5);
    }
    button:hover:not(:disabled) { transform: translateY(-1px); }
  }

  /* Animations */
  @keyframes slide-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes wizard-glow { 0%, 100% { transform: scale(1); opacity: 0.85; } 50% { transform: scale(1.06); opacity: 1; } }
  @keyframes gentle-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  @keyframes dot-bounce { 0%, 80%, 100% { opacity: 0.28; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-2px); } }
  .anim-slide { animation: slide-up 0.35s ease-out forwards; opacity: 0; }
  .anim-fade { animation: fade-in 0.25s ease-out forwards; }
  .anim-sheet { animation: sheet-up 0.35s cubic-bezier(0.2, 0.9, 0.3, 1) forwards; }
  .wizard-float { animation: gentle-float 1.6s ease-in-out infinite; }
  .wizard-glow { animation: wizard-glow 3.8s ease-in-out infinite; }
  .loading-dots { display: inline-flex; align-items: center; gap: 3px; margin-left: 4px; vertical-align: middle; }
  .loading-dots span { width: 4px; height: 4px; border-radius: 999px; background: currentColor; animation: dot-bounce 1s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  /* Utility */
  .clamp2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .clamp1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>

const seededShuffle = (items, seed = "savi") => {
  const hash = (value) => {
    let h = 2166136261;
    for (let i = 0; i < value.length; i += 1) {
      h ^= value.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  };
  return [...items]
    .map((item, index) => ({ item, rank: hash(`${seed}:${item.title}:${item.url}:${index}`) }))
    .sort((a, b) => a.rank - b.rank || a.item.title.localeCompare(b.item.title))
    .map(({ item }) => item);
};
const orderSeedItemsByTitles = (items, orderedTitles = []) => {
  const orderMap = new Map(orderedTitles.map((title, index) => [title, index]));
  return [...items].sort((a, b) => {
    const aOrder = orderMap.has(a.title) ? orderMap.get(a.title) : Number.MAX_SAFE_INTEGER;
    const bOrder = orderMap.has(b.title) ? orderMap.get(b.title) : Number.MAX_SAFE_INTEGER;
    if (aOrder !== bOrder) return aOrder - bOrder;
    return (a.title || "").localeCompare(b.title || "");
  });
};

    request.onsuccess = () => resolve(request.result);

  });

};

const readImageMetadata = async (file, options = {}) => {
  const objectUrl = URL.createObjectURL(file);
  try {
    const image = await new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("image_load_failed"));
      img.src = objectUrl;
    });
    const maxEdge = options.maxEdge || 1200;
    const quality = options.quality || 0.86;
    const scale = Math.min(1, maxEdge / Math.max(image.naturalWidth || 1, image.naturalHeight || 1));
    const canvas = document.createElement("canvas");
    canvas.width = Math.max(1, Math.round((image.naturalWidth || 1) * scale));
    canvas.height = Math.max(1, Math.round((image.naturalHeight || 1) * scale));
    const context = canvas.getContext("2d");
    if (context) context.drawImage(image, 0, 0, canvas.width, canvas.height);
    return {
      width: image.naturalWidth || 0,
      height: image.naturalHeight || 0,
      preview: canvas.toDataURL(file.type === "image/png" ? "image/png" : "image/jpeg", quality),
    };
  } finally {
    URL.revokeObjectURL(objectUrl);
  }
};
const readFolderImage = async (file) => {
  if (!file || !(file.type || "").startsWith("image/")) throw new Error("folder_image_required");
  if (file.type === "image/gif" || file.type === "image/webp") {
    return blobToDataUrl(file);
  }
  const imageMeta = await readImageMetadata(file, { maxEdge: 720, quality: 0.78 });
  return imageMeta.preview;
};
const extractFileMetadata = async (file, folders) => {
  const extension = fileExtensionFromName(file.name);
  const type = inferTypeFromFile(file);
  const title = titleFromFilename(file.name);
  const sizeLabel = formatBytes(file.size);
  const tags = dedupe([
    "upload",
    extension,
    file.type.split("/")[0],
    type === "image" ? "photo" : "",
    type === "file" ? "document" : "",
  ]);
  let thumbnail = "";
  let description = `${describeFileKind(file)} from your device • ${sizeLabel}`;
  let extra = {};

  if (type === "image") {
    try {
      const imageMeta = await readImageMetadata(file);
      thumbnail = imageMeta.preview;
      description = `${describeFileKind(file)} from your device • ${imageMeta.width} × ${imageMeta.height} • ${sizeLabel}`;
      extra = { width: imageMeta.width, height: imageMeta.height };
    } catch {}
  } else if (isTextLikeFile(file)) {
    const snippet = await readTextPreview(file);
    if (snippet) description = snippet;
  }

  const folderId = guessFolderId({
    title,
    description,
    filename: file.name,
    mimeType: file.type,
    source: "device",
    tags,

  link.href = objectUrl;
  if (openInNewTab) {
    link.target = "_blank";
    link.rel = "noreferrer";
  } else {
    link.download = name || "download";

const shareFallbackTextForItem = (item = {}) => {
  const bits = [item.title, item.description, item.url].filter(Boolean);
  return bits.join("\n");
};

const shareSavedItem = async (item, { onCopied } = {}) => {
  const payload = {
    title: item.title || "Saved item",
    text: item.url ? (item.description || item.title || item.url) : shareFallbackTextForItem(item),
  };
  if (item.url) payload.url = item.url;

  try {
    if (navigator.share) {
      await navigator.share(payload);
      return { ok: true, method: "share" };
    }
  } catch (error) {
    if (error?.name === "AbortError") return { ok: false, cancelled: true };
  }

  const fallbackText = item.url || shareFallbackTextForItem(item);
  if (!fallbackText) return { ok: false };

  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(fallbackText);
      onCopied?.("Copied");
      return { ok: true, method: "clipboard" };
    }
  } catch {}

  try {
    window.prompt("Copy this item", fallbackText);
    onCopied?.("Copied");
    return { ok: true, method: "prompt" };
  } catch {}

  return { ok: false };
};

const inferTypeFromUrl = (value) => {
  const normalized = normalizeUrl(value).toLowerCase();
  if (isMapsUrl(normalized)) return "place";
  if (/\.(png|jpe?g|gif|webp|svg)(\?|$)/.test(normalized)) return "image";
  if (/\.(pdf|docx?|pptx?|xlsx?)(\?|$)/.test(normalized)) return "file";
  if (/\.(mp4|mov|m4v|webm)(\?|$)/.test(normalized)) return "video";
  if (/youtube\.com|youtu\.be|vimeo\.com|tiktok\.com/.test(normalized)) return "video";
  return "article";
};

const inferTypeFromMetadata = (metadata, value) => {
  const haystack = `${metadata?.publisher || ""} ${metadata?.provider || ""} ${value || ""}`.toLowerCase();
  if (isMapsUrl(value) || /google maps|apple maps|maps\.google|maps\.apple|place/.test(haystack)) return "place";
  if (metadata?.type === "video" || /youtube|youtu\.be|vimeo|tiktok/.test(haystack)) return "video";
  if (metadata?.type === "photo" || metadata?.type === "image") return "image";
  if (metadata?.type === "rich" && /map|location|place/.test(haystack)) return "place";
  if (/\.(png|jpe?g|gif|webp|svg)(\?|$)/.test((value || "").toLowerCase())) return "image";
  return inferTypeFromUrl(value);
};

  if (normalized.includes("paste") || normalized.includes("manual text") || normalizedHost === "paste") return { key: "paste", label: "Paste" };

  if (/pinterest/.test(normalized) || /(^|\.)pinterest\./.test(normalizedHost)) return { key: "pinterest", label: "Pinterest" };
  if (/reddit/.test(normalized) || /(^|\.)reddit\.com$/.test(normalizedHost)) return { key: "reddit", label: "Reddit" };

  if (/dribbble/.test(normalized) || /(^|\.)dribbble\.com$/.test(normalizedHost)) return { key: "dribbble", label: "Dribbble" };

    const root = normalizedHost.split(".").slice(-2, -1)[0] || normalizedHost.split(".")[0];

const sanitizeText = (value = "") => value.replace(/\[(.*?)\]\(.*?\)/g, "$1").replace(/\s+/g, " ").trim();

const extractJinaDescription = (text) => {
  const descriptionMatch = text.match(/^Description:\s*(.+)$/mi);
  if (descriptionMatch?.[1]) return sanitizeText(descriptionMatch[1]);
  const contentMatch = text.match(/Markdown Content:\s*([\s\S]+)/i);
  const lines = (contentMatch?.[1] || text)
    .split("\n")
    .map(line => sanitizeText(line))
    .filter(Boolean);

  return (
    lines.find(line =>
      line.length > 70 &&
      !/^title:/i.test(line) &&
      !/^url source:/i.test(line) &&
      !/^published time:/i.test(line) &&
      !/^warning:/i.test(line) &&
      !/^#/.test(line)
    ) || ""
  );
};

const youtubeVideoIdFromUrl = (value) => {
  try {
    const url = new URL(normalizeUrl(value));
    if (url.hostname.includes("youtu.be")) return url.pathname.replace("/", "").trim();
    if (url.searchParams.get("v")) return url.searchParams.get("v");
    const parts = url.pathname.split("/").filter(Boolean);
    const markerIndex = parts.findIndex(part => ["shorts", "embed", "live"].includes(part));
    if (markerIndex >= 0 && parts[markerIndex + 1]) return parts[markerIndex + 1];
  } catch {}
  return "";
};

const descriptionScore = (value = "") => {
  const normalized = sanitizeText(value).toLowerCase();
  if (!normalized) return -1;
  let score = normalized.length;
  if (/ via youtube$/.test(normalized)) score -= 200;
  if (/^youtube video$/.test(normalized)) score -= 250;
  if (/^saved from /.test(normalized)) score -= 300;
  return score;
};

const mergeMetadata = (...sources) => {
  const descriptions = sources.map(source => source?.description || "").filter(Boolean);
  const bestDescription = descriptions.sort((a, b) => descriptionScore(b) - descriptionScore(a))[0] || "";

  return {
    title: sources.find(source => source?.title)?.title || "",
    description: bestDescription,
    thumbnail: sources.find(source => source?.thumbnail)?.thumbnail || "",
    publisher: sources.find(source => source?.publisher)?.publisher || "",
    author: sources.find(source => source?.author)?.author || "",
    type: sources.find(source => source?.type)?.type || "",
    source: sources.find(source => source?.source)?.source || "",
  };
};

const scoreFolder = (folder, haystack) => {
  const normalizedName = folder.name.toLowerCase().replace(/&/g, " ").replace(/\s+/g, " ").trim();
  let score = 0;

  normalizedName.split(" ").filter(token => token.length > 2).forEach((token) => {
    if (haystack.includes(token)) score += 2;
  });

  (folderKeywordMap[normalizedName] || []).forEach((keyword) => {
    if (haystack.includes(keyword)) score += 4;
  });

  return score;
};

const guessFolderId = (metadata, folders) => {
  const uploadFallback = folders.find(f => f.id === "f-private-vault" || f.name.toLowerCase() === "private vault");
  const linkFallback = folders.find(f => f.id === "f-random" || f.name.toLowerCase() === "random af") || folders.find(f => f.id === "f-must-see" || f.name.toLowerCase() === "watch read later");
  const actionFallback = folders.find(f => f.id === "f-must-see" || f.name.toLowerCase() === "watch read later");
  const placeFallback = folders.find(f => f.id === "f-travel" || f.name.toLowerCase() === "places");
  const mediaFallback = folders.find(f => f.id === "f-must-see" || f.name.toLowerCase() === "watch read later");
  const musicFallback = folders.find(f => f.id === "f-lmao" || f.name.toLowerCase() === "lulz");
  const fallback = metadata.filename || metadata.assetName
    ? (uploadFallback || linkFallback || folders.find(f => !f.system))
    : metadata.type === "place"
      ? (actionFallback || placeFallback || linkFallback || folders.find(f => !f.system))
      : /spotify|playlist|track|song|meme|music/i.test(`${metadata.source || ""} ${metadata.title || ""} ${metadata.description || ""}`)
        ? (musicFallback || mediaFallback || linkFallback || folders.find(f => !f.system))
      : metadata.type === "video"
        ? (mediaFallback || linkFallback || folders.find(f => !f.system))
        : (linkFallback || actionFallback || uploadFallback || folders.find(f => !f.system));
  const haystack = sanitizeText([
    metadata.title,
    metadata.description,
    metadata.publisher,
    metadata.author,
    metadata.source,
    metadata.url,
    metadata.filename,
    metadata.mimeType,
    metadata.extension,
    Array.isArray(metadata.tags) ? metadata.tags.join(" ") : metadata.tags,
  ].join(" ").toLowerCase());

  let best = fallback || folders.find(f => !f.system);
  let bestScore = -1;
  folders.filter(f => !f.system).forEach((folder) => {
    const score = scoreFolder(folder, haystack);
    if (score > bestScore) {
      best = folder;
      bestScore = score;
    }
  });
  return best?.id || "";
};
const normalizeSavedState = (state) => {
  if (!state || typeof state !== "object") return null;
  const rawFolders = Array.isArray(state.folders) ? state.folders : [];
  const rawItems = Array.isArray(state.items) ? state.items : [];
  const customFolders = rawFolders.filter(folder => !LEGACY_SEED_FOLDER_IDS.includes(folder.id) && !SEED_FOLDER_LOOKUP[folder.id]);
  const nextFolders = withSeededFolderDefaults(customFolders);
  const tinfoilFolder = nextFolders.find(folder => folder.id === "f-tinfoil");
  const wtfFolder = nextFolders.find(folder => folder.id === "f-wtf-favorites");
  const nextItems = rawItems.map((item) => {
    const legacyTarget = LEGACY_FOLDER_ID_MAP[item.folderId];
    let nextFolderId = item.folderId;
    if (legacyTarget) nextFolderId = legacyTarget;
    if (!nextFolders.some(folder => folder.id === nextFolderId)) {
      nextFolderId = guessFolderId(item, nextFolders) || nextFolders.find(folder => !folder.system)?.id || "f-random";
    }
    if (nextFolderId === "f-wtf-favorites" && tinfoilFolder) {
      const haystack = sanitizeText([
        item.title,
        item.description,
        item.publisher,
        item.author,
        item.source,
        item.url,
        item.filename,
        item.mimeType,
        item.extension,
        Array.isArray(item.tags) ? item.tags.join(" ") : item.tags,
      ].join(" ").toLowerCase());
      const tinfoilScore = scoreFolder(tinfoilFolder, haystack);
      const wtfScore = wtfFolder ? scoreFolder(wtfFolder, haystack) : 0;
      if (tinfoilScore > 0 && tinfoilScore >= wtfScore) nextFolderId = "f-tinfoil";
    }
    return { ...item, folderId: nextFolderId };
  });
  return { ...state, folders: nextFolders, items: nextItems };
};

const fetchLinkMetadata = async (rawUrl, folders) => {
  const normalizedUrl = normalizeUrl(rawUrl);
  const source = hostFromUrl(normalizedUrl);
  const domain = domainGuess(normalizedUrl);
  const extractedPlaceName = isMapsUrl(normalizedUrl) ? extractPlaceNameFromMapsUrl(normalizedUrl) : "";
  const requests = [
    fetchMicrolinkMetadata(normalizedUrl),
    fetchNoembedMetadata(normalizedUrl),
    fetchJinaMetadata(normalizedUrl),
  ];

  if (isYouTubeUrl(normalizedUrl)) {
    requests.unshift(fetchYouTubeOEmbedMetadata(normalizedUrl));
  }

  const results = await Promise.allSettled(requests);

  const metadata = mergeMetadata(
    ...results.filter(result => result.status === "fulfilled").map(result => result.value)
  );

  const type = inferTypeFromMetadata(metadata, normalizedUrl);
  const sourceProfile = sourceProfileForValue(normalizedUrl, metadata.source || source);
  const resolvedTitle = type === "place" && extractedPlaceName && (!metadata.title || /google maps|maps/i.test(metadata.title))
    ? extractedPlaceName
    : metadata.title;
  const resolvedDescription = metadata.description || (type === "place" ? `Saved place from ${sourceProfile.label}.` : "");
  const tags = dedupe([
    domain,
    metadata.publisher && metadata.publisher.toLowerCase().replace(/\s+/g, "-"),
    sourceProfile.key !== domain ? sourceProfile.key : "",
    type === "place" ? "location" : "",
    type === "place" && extractedPlaceName ? extractedPlaceName.toLowerCase().split(/[\s,]+/).find(token => token.length > 3) : "",
  ]);
  const folderId = guessFolderId({ ...metadata, url: normalizedUrl, source }, folders);
  const fallbackTitle = resolvedTitle || extractedPlaceName || (domain ? `Saved from ${domain}` : "Untitled save");
  const fallbackDescription = resolvedDescription || (type === "place" && extractedPlaceName ? `${extractedPlaceName} saved as a place link.` : "");

  return {
    ...metadata,
    title: fallbackTitle,
    description: fallbackDescription,
    url: normalizedUrl,
    source: metadata.source || sourceProfile.label || source,
    type,
    tags,
    folderId,
    success: Boolean(metadata.title || metadata.description || metadata.thumbnail || extractedPlaceName || results.some(result => result.status === "fulfilled")),
  };
};

const typeIconFor = (type, props) => {

};

const relativeTime = (ts) => {
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return "just now";
  if (m < 60) return `${m}m`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h`;
  const d = Math.floor(h / 24);
  if (d < 7) return `${d}d`;
  return new Date(ts).toLocaleDateString();
};

const BACKUP_VERSION = 2;
const BACKUP_MIME = "application/json";

const buildBackupPayload = async (folders, items) => {
  const assetIds = dedupe(items.map(item => item.assetId));
  const assets = [];
  for (const assetId of assetIds) {
    const asset = await getAssetRecord(assetId).catch(() => null);
    if (!asset?.blob) continue;
    assets.push({
      id: asset.id,
      name: asset.name || "",
      type: asset.type || asset.blob.type || "application/octet-stream",
      size: typeof asset.size === "number" ? asset.size : asset.blob.size,
      dataUrl: await blobToDataUrl(asset.blob),
    });
  }

  return {
    app: "SAVI",
    version: BACKUP_VERSION,
    exportedAt: new Date().toISOString(),
    folders,
    items,
    assets,
  };
};

const isValidBackup = (backup) => {
  if (!backup || typeof backup !== "object") return false;
  if (backup.app !== "SAVI") return false;
  if (!Array.isArray(backup.folders) || !Array.isArray(backup.items)) return false;
  if (backup.assets && !Array.isArray(backup.assets)) return false;
  return true;
};

  const toastTimerRef = useRef(null);
  const lightboxObjectUrlRef = useRef("");

  const dismissActiveField = () => {
    const active = document.activeElement;
    if (!active) return;
    const tag = active.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA" || active.isContentEditable) active.blur();
  };

  const openSaveSheet = (nextUrl = "", options = {}) => {
    dismissActiveField();
    setPrefillUrl(nextUrl);
    setPrefillFromClipboard(Boolean(options.tryClipboard && !nextUrl));
    setPrefillAutoAnalyze(options.autoAnalyzeInitial ?? true);
    setShowSaveSheet(true);
  };

  const shareApp = async () => {
    const shareUrl = /^https?:\/\//i.test(window.location.href) ? window.location.href : "https://andzeus8.github.io/Savi-/";
    const payload = {
      title: "SAVI",
      text: "Check out SAVI — a pocket organizer for links, files, places, and ideas.",
      url: shareUrl,
    };

    try {
      if (window.SAVINative?.postMessage) {
        window.SAVINative.postMessage("share", payload);
        return;
      }
    } catch {}

    try {
      if (navigator.share) {
        await navigator.share(payload);
        return;
      }
    } catch (error) {
      if (error?.name === "AbortError") return;
    }

    try {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(shareUrl);
        alert("SAVI link copied to your clipboard.");
        return;
      }
    } catch {}

    window.prompt("Copy the SAVI link:", shareUrl);
  };

  const showToast = (message = "Copied") => {
    setToastMessage(message);
    window.clearTimeout(toastTimerRef.current);
    toastTimerRef.current = window.setTimeout(() => setToastMessage(""), 1900);
  };

  const closeLightbox = () => {
    if (lightboxObjectUrlRef.current) {
      URL.revokeObjectURL(lightboxObjectUrlRef.current);
      lightboxObjectUrlRef.current = "";
    }
    setLightboxImage(null);
  };

  const openImageLightbox = async (item) => {
    if (!item || item.type !== "image") return;
    try {
      if (lightboxObjectUrlRef.current) {
        URL.revokeObjectURL(lightboxObjectUrlRef.current);
        lightboxObjectUrlRef.current = "";
      }

      if (item.assetId) {
        const asset = await getAssetRecord(item.assetId).catch(() => null);
        if (asset?.blob && (asset.type || item.assetMime || "").startsWith("image/")) {
          const objectUrl = URL.createObjectURL(asset.blob);
          lightboxObjectUrlRef.current = objectUrl;
          setLightboxImage({
            src: objectUrl,
            title: item.title,
            subtitle: item.assetName || item.description || "",
          });
          return;
        }
      }

      const src = item.thumbnail || item.url || "";
      if (!src) {
        showToast("Couldn't open image");
        return;
      }
      setLightboxImage({
        src,
        title: item.title,
        subtitle: item.description || "",
      });
    } catch {
      showToast("Couldn't open image");
    }
  };

  const handleShareItem = async (item) => {
    const result = await shareSavedItem(item, { onCopied: showToast });
    if (!result.ok && !result.cancelled) showToast("Couldn't share that item");

  useEffect(() => {
    dismissActiveField();
  }, [route]);

  useEffect(() => () => {
    window.clearTimeout(toastTimerRef.current);
    if (lightboxObjectUrlRef.current) URL.revokeObjectURL(lightboxObjectUrlRef.current);
  }, []);

  // If opened with ?url=..., auto-open the save sheet
  useEffect(() => {
    const incoming = getIncomingUrl();

      openSaveSheet(incoming, { autoAnalyzeInitial: true });

      try { window.history.replaceState({}, "", window.location.pathname); } catch {}
    }
  }, []);

  useEffect(() => {
    if (launchClipboardCheckedRef.current) return;
    launchClipboardCheckedRef.current = true;

    const incoming = getIncomingUrl();
    if (incoming || showSaveSheet) return;
    if (!window.isSecureContext || !navigator.clipboard?.readText) return;

    const tryClipboardOnLaunch = async () => {
      try {
        const rawText = (await navigator.clipboard.readText()).trim();
        if (!rawText) return;
        const normalized = normalizeUrl(rawText);
        if (!hostFromUrl(normalized)) return;
        openSaveSheet(rawText, { autoAnalyzeInitial: false });
      } catch {}
    };

    tryClipboardOnLaunch();
  }, [showSaveSheet]);

  useEffect(() => {
    if (showOnboarding) return;
    saveState({ folders, items });
  }, [folders, items, showOnboarding]);
  useEffect(() => { saveUiPrefs({ viewMode }); }, [viewMode]);

  const visibleItems = useMemo(() => {
    let list = items;

    if (browseMode === "sources" && activeSource !== "all") list = list.filter(i => sourceProfileForItem(i).key === activeSource);
    if (search.trim()) {

      list = list.filter(i =>
        (i.title || "").toLowerCase().includes(q) ||

  }, [items, folders]);

    });

  }, [items]);

      .sort((a, b) => b.count - a.count || a.label.localeCompare(b.label))

    const payload = await buildBackupPayload(folders, items);

    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: BACKUP_MIME });

      const parsed = JSON.parse(await file.text());
      if (!isValidBackup(parsed)) {
        return { ok: false, message: "That file doesn't look like a SAVI backup." };
      }

      await clearAssetRecords().catch(() => {});
      for (const asset of parsed.assets || []) {
        if (!asset?.id || !asset?.dataUrl) continue;
        const blob = await dataUrlToBlob(asset.dataUrl);

          id: asset.id,
          name: asset.name || "",
          type: asset.type || blob.type || "application/octet-stream",
          size: typeof asset.size === "number" ? asset.size : blob.size,
          blob,
          updatedAt: Date.now(),

      setFolders(normalized?.folders || withSeededFolderDefaults([]));

      setActiveType("all");

        message: `Backup restored. ${parsed.items.length} ${parsed.items.length === 1 ? "item" : "items"} loaded.`,

  };
  const addFolder = (folderDraft) => setFolders(prev => [...prev, { id: `f-${Date.now()}`, ...folderDraft }]);
  const updateFolder = (folderId, updates) => setFolders(prev => prev.map(folder => folder.id === folderId ? { ...folder, ...updates } : folder));
  const clearLibrary = async () => {
    try {
      localStorage.clear();
    } catch {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(UI_PREFS_KEY);
      localStorage.removeItem(ONBOARDED_KEY);
      localStorage.removeItem(DEMO_SUPPRESSED_KEY);
    }
    saveDemoSuppressed(true);
    await deleteAssetDatabase().catch(() => false);
    await clearAssetRecords().catch(() => {});
    window.location.reload();
  };

  const finishOnboarding = () => {
    saveOnboarded(true);
    setShowOnboarding(false);
  };

                        if (editingFolderId) {

                        }

                      }}
                    />
                  )}

                  <div style={{ fontSize: 16, lineHeight: 1.35, color: T.ink, marginBottom: 8, fontWeight: 600, position: "relative" }}>{slide.subtitle}</div>
                  <div style={{ fontSize: 13, lineHeight: 1.55, color: T.inkSoft, marginBottom: 24, maxWidth: 290, position: "relative" }}>{slide.description}</div>
                  <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "4px 0 8px", position: "relative" }}>
                    {slide.visual}
                  </div>
                  <div style={{ marginTop: 18, height: 7, borderRadius: 999, background: slide.accent, opacity: 0.94, boxShadow: "0 12px 24px -18px rgba(22,26,35,0.55)" }} />
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{ paddingTop: 16 }}>
          <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 18 }}>
            {slides.map((slide, index) => (
              <button
                type="button"
                key={slide.title}
                aria-label={`Go to onboarding step ${index + 1}`}
                onClick={() => goToStep(index)}
                style={{
                  width: index === step ? 24 : 8,
                  height: 8,
                  borderRadius: 999,
                  background: index === step ? "linear-gradient(160deg, #6D7CFF 0%, #C8553D 100%)" : "rgba(143,138,128,0.28)",
                }}
              />
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1.2fr", gap: 10, paddingBottom: "calc(8px + env(safe-area-inset-bottom))" }}>
            <button
              type="button"
              onClick={previousStep}
              disabled={step === 0}
              style={{ padding: 15, borderRadius: 16, fontSize: 13, fontWeight: 600, background: step === 0 ? T.paperDim : T.card, color: step === 0 ? T.inkMute : T.ink, border: `1px solid ${T.lineSoft}`, opacity: step === 0 ? 0.7 : 1 }}
            >
              Back
            </button>
            <button type="button" onClick={nextStep} style={{ padding: 15, borderRadius: 16, fontSize: 14, fontWeight: 700, background: slides[step].accent, color: T.paper, boxShadow: "0 22px 34px -24px rgba(22,26,35,0.52)", position: "relative", zIndex: 3 }}>
              {step === slides.length - 1 ? "Let's Go!" : step === 0 ? "Get Started" : "Next"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function HomeScreen({ folders, items, searchMode = false, activeFolder, setActiveFolder, browseMode, setBrowseMode, activeType, setActiveType, activeSource, setActiveSource, viewMode, setViewMode, folderCounts, typeCounts, sourceCounts, sourceOptions, search, setSearch, onSelect, onShare, onShareItem, onOpenSearch, onSeeAllFolders, onOpenFolder, onBack }) {
  const activeFolderName = folders.find(f => f.id === activeFolder)?.name || "All Saves";
  const activeSourceLabel = sourceOptions.find((option) => option.key === activeSource)?.label || (activeSource === "all" ? "All Apps" : titleize(activeSource));
  const heroEyebrow = searchMode ? "Search" : browseMode === "all" ? "My SAVIs" : browseMode === "folders" ? "Folders" : browseMode === "types" ? "Types" : "Apps";
  const heroTitle = searchMode ? "Find any SAVI" : browseMode === "all" ? "My SAVIs" : browseMode === "folders" ? (activeFolder === "f-all" ? "All folders" : activeFolderName) : browseMode === "types" ? displayTypeLabel(activeType) : activeSourceLabel;
  const heroDescription = searchMode
    ? "Search works across every folder, tag, app, and file detail in your library."
    : browseMode === "all"
      ? "Search fast, jump into your top folders, and keep the latest saves right under your thumb."
      : browseMode === "folders"
        ? "Use folder chips to narrow the stream below without leaving the page."
        : browseMode === "types"
          ? "Scan by format when you know the shape of what you saved."
          : "Jump into the apps and platforms that generated the save.";
  const heroCount = items.length;
  const searchInputRef = useRef(null);
  const topFolders = folders
    .filter((folder) => !folder.system)
    .map((folder) => ({
      ...folder,
      count: folderCounts[folder.id] ?? 0,
      latest: items.find((item) => item.folderId === folder.id),
    }))
    .filter((folder) => folder.count > 0)
    .sort((a, b) => {
      if (b.count !== a.count) return b.count - a.count;
      const aOrder = DEFAULT_FOLDER_ORDER_MAP[a.id] ?? 1000;
      const bOrder = DEFAULT_FOLDER_ORDER_MAP[b.id] ?? 1000;
      return aOrder - bOrder;
    })
    .slice(0, 4);
  const showDashboard = !searchMode;

  useEffect(() => {
    if (!searchMode) return;
    const timer = window.setTimeout(() => {
      searchInputRef.current?.focus({ preventScroll: true });
    }, 120);
    return () => window.clearTimeout(timer);
  }, [searchMode]);

  const filterCount = (count, active) => (
    <span className="mono" style={{ fontSize: 9, opacity: active ? 0.78 : 0.62 }}>{count}</span>
  );

  const modeOptions = [
    { key: "all", label: "All" },
    { key: "folders", label: "Folders" },
    { key: "types", label: "Types" },
    { key: "sources", label: "Apps" },
  ];

  return (
    <div className="scroll" style={{ height: "100%" }}>
      <div style={{ padding: searchMode ? "16px 20px 6px" : "16px 20px 10px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, marginBottom: searchMode ? 18 : 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            {searchMode && (
              <button onClick={onBack} aria-label="Back to Home" style={{ width: 34, height: 34, borderRadius: 12, background: T.card, color: T.ink, border: `1px solid ${T.lineSoft}`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <IconChevronLeft size={15} />
              </button>
            )}
            <div style={{ width: 34, height: 34, borderRadius: 12, background: "linear-gradient(160deg, #161A23 0%, #6D7CFF 100%)", display: "flex", alignItems: "center", justifyContent: "center", color: T.paper, boxShadow: "0 16px 28px -22px rgba(22,26,35,0.72)" }}>
              <IconBookmark size={14} stroke={2} fill={T.paper} />
            </div>
            <div>
              <div className="serif" style={{ fontSize: 22, fontWeight: 500, color: T.ink }}>SAVI</div>
              <div className="mono" style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: T.inkMute }}>
                {heroCount} {heroCount === 1 ? "item" : "items"}
              </div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {!searchMode && (
              <button onClick={onShare} className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", padding: "10px 12px", borderRadius: 14, border: `1px solid ${T.lineSoft}`, background: T.card, color: T.inkSoft, boxShadow: "0 12px 24px -22px rgba(22,26,35,0.55)" }}>
                Share
              </button>
            )}
          </div>
        </div>

        {searchMode && (
          <>
            <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.22em", marginBottom: 8, color: T.inkMute }}>
              {heroEyebrow}
            </div>
            <h1 className="serif" style={{ fontSize: 42, lineHeight: 1.02, margin: 0, marginBottom: 10, color: T.ink }}>{heroTitle}</h1>
            <div style={{ fontSize: 13, lineHeight: 1.45, color: T.inkSoft, maxWidth: 310 }}>
              {heroDescription}
            </div>
          </>
        )}
      </div>

      {searchMode && (
        <div style={{ padding: "18px 20px 12px" }}>
          <div style={{ display: "flex", gap: 4, padding: 4, borderRadius: 18, background: T.paperDim, border: `1px solid ${T.lineSoft}`, boxShadow: "inset 0 1px 0 rgba(255,255,255,0.6)" }}>
            {modeOptions.map((option) => {
              const active = browseMode === option.key;
              return (
                <button
                  key={option.key}
                  onClick={() => setBrowseMode(option.key)}
                  className="mono"
                  style={{ flex: 1, padding: "11px 8px", borderRadius: 14, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", background: active ? T.card : "transparent", color: active ? T.ink : T.inkSoft, boxShadow: active ? "0 10px 24px -20px rgba(22,26,35,0.78)" : "none" }}
                >
                  {option.label}
                </button>
              );
            })}
          </div>
        </div>
      )}

      <div style={{ padding: "0 20px 14px" }}>
        {searchMode ? (
          <div style={{ position: "relative" }}>
            <div style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", color: T.inkMute, pointerEvents: "none", display: "flex" }}>
              <IconSearch size={15} />
            </div>
            <input aria-label="Search your library" ref={searchInputRef} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search titles, tags, apps, and notes..." style={{ width: "100%", borderRadius: 16, padding: "12px 14px 12px 42px", fontSize: 14, background: T.card, border: `1px solid ${T.lineSoft}`, color: T.ink, boxShadow: "0 16px 28px -26px rgba(22,26,35,0.55)" }} />
          </div>
        ) : (
          <button onClick={onOpenSearch} aria-label="Open Search" style={{ width: "100%", borderRadius: 16, padding: "12px 14px", display: "flex", alignItems: "center", gap: 10, background: T.card, border: `1px solid ${T.lineSoft}`, color: T.inkMute, boxShadow: "0 16px 28px -26px rgba(22,26,35,0.55)", textAlign: "left" }}>
            <IconSearch size={15} />
            <span style={{ fontSize: 14 }}>Search all your SAVIs</span>
          </button>
        )}
      </div>

      {showDashboard && (
        <div style={{ padding: "0 20px 18px", display: "grid", gap: 18 }}>
          {topFolders.length > 0 && (
            <div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, marginBottom: 10 }}>
                <div className="serif" style={{ fontSize: 24, color: T.ink }}>Top SAVI folders</div>
                <button className="mono" onClick={() => { setBrowseMode("folders"); setActiveFolder("f-all"); onSeeAllFolders?.(); }} style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: T.inkMute }}>
                  See all
                </button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {topFolders.map((folder) => (
                  <button
                    key={folder.id}
                    onClick={() => { setBrowseMode("folders"); setActiveFolder(folder.id); onOpenFolder?.(folder.id); }}
                    style={{
                      minHeight: 132,
                      textAlign: "left",
                      padding: 14,
                      borderRadius: 22,
                      background: folder.image
                        ? `center / cover no-repeat url(${folder.image}), ${T.card}`
                        : `linear-gradient(160deg, ${folder.color}40 0%, ${folder.color}14 100%)`,
                      border: `1px solid ${folder.image ? "rgba(255,255,255,0.16)" : T.lineSoft}`,
                      boxShadow: "0 18px 34px -28px rgba(22,26,35,0.55)",
                      position: "relative",
                      overflow: "hidden",
                      display: "flex",
                      flexDirection: "column",
                      justifyContent: "space-between",
                    }}
                  >
                    {folder.image && <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, rgba(8,12,20,0.04) 0%, rgba(8,12,20,0.24) 42%, rgba(8,12,20,0.86) 100%)" }} />}
                    <div style={{ position: "relative", zIndex: 1, display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                      <span className="mono" style={{ padding: "7px 9px", borderRadius: 999, background: folder.image ? "rgba(255,255,255,0.14)" : `${folder.color}16`, color: folder.image ? "rgba(255,255,255,0.92)" : T.ink, fontSize: 9.5, letterSpacing: "0.08em", textTransform: "uppercase" }}>
                        {folder.count} saves
                      </span>
                    </div>
                    <div style={{ position: "relative", zIndex: 1 }}>
                      <div className="serif" style={{ fontSize: 21, lineHeight: 1.02, color: folder.image ? "#fff" : T.ink, marginBottom: 5 }}>
                        {folder.name}
                      </div>
                      <div className="clamp1" style={{ fontSize: 11.5, color: folder.image ? "rgba(255,255,255,0.82)" : T.inkSoft }}>
                        {folder.latest?.title || "Open this folder"}
                      </div>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          )}

        </div>
      )}

      {searchMode && browseMode !== "all" && (
        <div style={{ padding: "0 20px 18px" }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {browseMode === "folders" && folders.map((f) => {
              const active = f.id === activeFolder;
              return (
                <button key={f.id} onClick={()=>setActiveFolder(f.id)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 12px", borderRadius: 999, fontSize: 12, whiteSpace: "nowrap", background: active ? T.ink : T.card, color: active ? T.paper : T.inkSoft, border: `1px solid ${active ? T.ink : T.lineSoft}`, boxShadow: active ? "none" : "0 16px 28px -24px rgba(22,26,35,0.5)" }}>
                  {f.system ? <IconSparkles size={11} /> : <div style={{ width: 8, height: 8, borderRadius: 999, background: f.color }} />}
                  <span>{f.name}</span>
                  {filterCount(folderCounts[f.id] ?? 0, active)}
                </button>
              );
            })}
            {browseMode === "types" && ["all", "article", "video", "image", "file", "text", "place", "link"].filter((key) => typeCounts[key] > 0 || key === "all").map((key) => {
              const active = key === activeType;
              const visual = typeVisualForKey(key);
              return (
                <button key={key} onClick={()=>setActiveType(key)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px 8px 8px", borderRadius: 999, fontSize: 12, whiteSpace: "nowrap", background: active ? T.ink : T.card, color: active ? T.paper : T.inkSoft, border: `1px solid ${active ? T.ink : T.lineSoft}`, boxShadow: active ? "none" : "0 16px 28px -24px rgba(22,26,35,0.5)" }}>
                  <BrandBadge visual={active ? { ...visual, bg: "rgba(255,255,255,0.12)", gradient: "", fg: T.paper } : visual} size={22} active={active} />
                  <span>{displayTypeLabel(key)}</span>
                  {filterCount(typeCounts[key] ?? 0, active)}
                </button>
              );
            })}
            {browseMode === "sources" && [{ key: "all", label: "All apps", count: sourceCounts.all || 0 }, ...sourceOptions].map((option) => {
              const active = option.key === activeSource;
              const visual = option.key === "all"
                ? { bg: T.ink, fg: T.paper, icon: (size) => <IconSparkles size={size} stroke={2.05} /> }
                : sourceVisualForKey(option.key);
              return (
                <button key={option.key} onClick={()=>setActiveSource(option.key)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px 8px 8px", borderRadius: 999, fontSize: 12, whiteSpace: "nowrap", background: active ? T.ink : T.card, color: active ? T.paper : T.inkSoft, border: `1px solid ${active ? T.ink : T.lineSoft}`, boxShadow: active ? "none" : "0 16px 28px -24px rgba(22,26,35,0.5)" }}>
                  <BrandBadge visual={active && option.key !== "all" ? { ...visual, bg: "rgba(255,255,255,0.12)", gradient: "", fg: T.paper } : visual} size={22} active={active} />
                  <span>{option.label}</span>
                  {filterCount(option.count, active)}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {items.length === 0 ? (
        <div style={{ padding: "0 20px 28px" }}>
          <EmptyState search={search} searchMode={searchMode} browseMode={browseMode} activeFolderName={activeFolderName} activeSourceLabel={activeSourceLabel} activeType={activeType} />
        </div>
      ) : viewMode === "grid" ? (
        <div key={`grid-${browseMode}-${activeFolder}-${activeType}-${activeSource}`} className="anim-fade" style={{ padding: "0 20px 28px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, marginBottom: 12 }}>
            <div className="serif" style={{ fontSize: 24, color: T.ink }}>{showDashboard ? "Recent SAVIs" : heroTitle}</div>
            <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: T.inkMute }}>
              {items.length} {items.length === 1 ? "item" : "items"}
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: 14, alignItems: "start" }}>
          {items.map((item, idx) => <ItemCard key={item.id} item={item} index={idx} onClick={()=>onSelect(item)} onShare={()=>onShareItem(item)} delay={idx * 22} layout="grid" />)}
          </div>
        </div>
      ) : (
        <div key={`list-${browseMode}-${activeFolder}-${activeType}-${activeSource}`} className="anim-fade" style={{ padding: "0 20px 28px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, marginBottom: 12 }}>
            <div className="serif" style={{ fontSize: 24, color: T.ink }}>{showDashboard ? "Recent SAVIs" : heroTitle}</div>
            <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: T.inkMute }}>
              {items.length} {items.length === 1 ? "item" : "items"}
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {items.map((item, idx) => <ItemListRow key={item.id} item={item} onClick={()=>onSelect(item)} onShare={()=>onShareItem(item)} delay={idx * 18} />)}
          </div>
        </div>
      )}
    </div>
  );
}

function EmptyState({ search, searchMode = false, browseMode = "all", activeFolderName = "All Saves", activeSourceLabel = "All Apps", activeType = "all" }) {
  const title = search
    ? "No matches yet"
    : searchMode
      ? "Search your library"
      : browseMode === "all"
        ? "Nothing saved yet"
      : browseMode === "folders"
        ? `No saves in ${activeFolderName}`
        : browseMode === "types"
          ? `No ${displayTypeLabel(activeType).toLowerCase()} saves yet`
          : `No saves from ${activeSourceLabel}`;
  const description = search
    ? `Nothing matched "${search}" across folders, tags, apps, or notes.`
    : searchMode
      ? "Try a title, folder, app, or tag to find something quickly."
      : browseMode === "all"
        ? "Start saving links, files, or places and they will show up here in whichever view you prefer."
      : browseMode === "folders"
        ? "Save something new or switch folders to browse another part of your library."
        : browseMode === "types"
          ? "Try another content type or save something in this format."
          : "Try another app filter or save content from that app first.";
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "64px 16px", textAlign: "center" }}>
      <div style={{ width: 56, height: 56, borderRadius: 16, background: T.paperDim, border: `1px solid ${T.lineSoft}`, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 16, color: T.inkMute }}>
        <IconSearch size={20} />
      </div>
      <div className="serif" style={{ fontSize: 24, marginBottom: 4, color: T.ink }}>{title}</div>
      <div style={{ fontSize: 12.5, maxWidth: 260, lineHeight: 1.5, color: T.inkSoft }}>{description}</div>
    </div>
  );
}

function ItemCard({ item, index, onClick, onShare, delay, layout = "grid" }) {
  const sourceProfile = sourceProfileForItem(item);
  const sourceVisual = sourceVisualForProfile(sourceProfile);
  const polishedLinkPreview = ["article", "link", "file", "place"].includes(item.type);
  const mediaAspect = item.type === "video"
    ? "4 / 5"
    : item.type === "place"
      ? "4 / 5.2"
      : item.type === "article" || item.type === "file"
        ? "4 / 4.4"
        : index % 3 === 0
          ? "4 / 5.3"
          : "4 / 4.9";
  return (
    <div className="anim-slide" style={{ animationDelay: `${delay}ms`, width: "100%", position: "relative", breakInside: "avoid", alignSelf: "start", marginBottom: layout === "grid" ? 0 : 14 }}>
      <button onClick={onClick} style={{ width: "100%", display: "block", textAlign: "left", borderRadius: 24, background: T.card, border: `1px solid ${T.lineSoft}`, transition: "transform 0.12s", overflow: "hidden", boxShadow: "0 18px 40px -34px rgba(22,26,35,0.55)" }}>
        <div style={{ position: "relative", aspectRatio: mediaAspect, color: item.color, overflow: "hidden", background: polishedLinkPreview ? "#F7F8FC" : `${item.color}18`, padding: polishedLinkPreview ? 10 : 0 }}>
          {item.thumbnail ? (
            <img
              src={item.thumbnail}
              alt=""
              style={{
                position: "absolute",
                inset: polishedLinkPreview ? 10 : 0,
                width: polishedLinkPreview ? "calc(100% - 20px)" : "100%",
                height: polishedLinkPreview ? "calc(100% - 20px)" : "100%",
                objectFit: "cover",
                borderRadius: polishedLinkPreview ? 10 : 0,
                border: polishedLinkPreview ? "1px solid rgba(22,26,35,0.08)" : "none",
                boxShadow: polishedLinkPreview ? "0 16px 28px -24px rgba(22,26,35,0.28)" : "none",
                display: "block",
              }}
            />
          ) : (
            <div style={{ position: "absolute", inset: polishedLinkPreview ? 10 : 0, borderRadius: polishedLinkPreview ? 10 : 0, background: `${item.color}18`, border: polishedLinkPreview ? "1px solid rgba(22,26,35,0.08)" : "none" }} />
          )}
          <div style={{ position: "absolute", inset: polishedLinkPreview ? 10 : 0, borderRadius: polishedLinkPreview ? 10 : 0, background: item.thumbnail ? "linear-gradient(180deg, rgba(11,16,26,0.06) 0%, rgba(11,16,26,0.12) 34%, rgba(11,16,26,0.64) 100%)" : "linear-gradient(180deg, rgba(109,124,255,0.08) 0%, rgba(22,26,35,0.18) 100%)" }} />
          <div style={{ position: "absolute", top: 12, left: 12, right: 56, display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>
            <div className="mono" style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 9.5, letterSpacing: "0.1em", textTransform: "uppercase", padding: "7px 10px", borderRadius: 999, background: "rgba(255,255,255,0.84)", color: T.ink, boxShadow: "0 10px 20px -18px rgba(22,26,35,0.8)" }}>
              {typeIconFor(item.type, { size: 12, stroke: 1.8 })}
              {displayTypeLabel(item.type)}
            </div>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 8 }}>
              <div className="mono" style={{ fontSize: 10, color: "rgba(255,255,255,0.86)", padding: "6px 9px", borderRadius: 999, background: "rgba(11,16,26,0.28)", backdropFilter: "blur(10px)" }}>
                {relativeTime(item.savedAt)}
              </div>
            </div>
          </div>
          <div style={{ position: "absolute", left: 14, right: 58, bottom: 14, display: "flex", alignItems: "center", gap: 8 }}>
            <BrandBadge visual={sourceVisual} size={20} />
            <div className="mono clamp1" style={{ fontSize: 11, color: "rgba(255,255,255,0.9)" }}>{sourceProfile.label}</div>
          </div>
        </div>
        <div style={{ padding: "14px 14px 16px" }}>
          <div className="clamp2" style={{ fontSize: 15, fontWeight: 600, lineHeight: 1.28, marginBottom: 6, color: T.ink }}>
            {item.title}
          </div>
          <div className="clamp3" style={{ fontSize: 12.5, lineHeight: 1.42, color: T.inkSoft }}>
            {item.description}
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
            {(item.tags || []).slice(0, 2).map((tag) => (
              <span key={tag} className="mono" style={{ fontSize: 9.5, letterSpacing: "0.08em", textTransform: "uppercase", padding: "6px 8px", borderRadius: 999, background: T.paperDim, color: T.inkMute }}>
                {tag}
              </span>
            ))}
            <span className="mono" style={{ fontSize: 9.5, letterSpacing: "0.08em", textTransform: "uppercase", padding: "6px 8px", borderRadius: 999, background: `${item.color}12`, color: item.color }}>
              save
            </span>
          </div>
        </div>
