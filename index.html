  @media (max-width: 499px) {
    .frame-wrap { width: 100%; height: 100dvh; min-height: 100dvh; }
    .bezel, .bezel-inner { all: unset; display: block; width: 100%; height: 100dvh; min-height: 100dvh; }
    .screen { width: 100%; height: 100dvh; min-height: 100dvh; background: var(--paper); position: relative; overflow: hidden; padding-top: env(safe-area-inset-top); }
    .notch { display: none; }
  }

  .app { display: flex; flex-direction: column; height: 100%; min-height: 0; overflow: hidden; position: relative; }
  @media (min-width: 500px) { .app { height: 844px; min-height: 0; } }
  .app-main { flex: 1; min-height: 0; position: relative; overflow: hidden; padding-bottom: var(--navigator-offset); }
  .navigator-shell { position: absolute; left: 0; right: 0; bottom: 0; z-index: 30; pointer-events: none; }
  .navigator-shell > * { pointer-events: auto; box-shadow: 0 -12px 24px -22px rgba(28,26,23,0.45); }
  @media (max-width: 499px) {
    .navigator-shell { position: fixed; left: 0; right: 0; bottom: 0; z-index: 40; }
  }
  /* Scroll areas */
  .scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex: 1; }
  .scroll::-webkit-scrollbar { display: none; }

  /* Buttons */
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  button:active { transform: scale(0.985); }
  input, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  input:focus, textarea:focus { outline: none; border-color: var(--ink) !important; }

  /* Animations */
  @keyframes slide-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes gentle-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  @keyframes dot-bounce { 0%, 80%, 100% { opacity: 0.28; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-2px); } }
  .anim-slide { animation: slide-up 0.35s ease-out forwards; opacity: 0; }

  .wizard-float { animation: gentle-float 1.6s ease-in-out infinite; }
  .loading-dots { display: inline-flex; align-items: center; gap: 3px; margin-left: 4px; vertical-align: middle; }
  .loading-dots span { width: 4px; height: 4px; border-radius: 999px; background: currentColor; animation: dot-bounce 1s infinite; }

  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

const normalizeUrl = (value) => {
  const raw = (value || "").trim();
  if (!raw) return "";
  const next = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
  try {
    return new URL(next).toString();
  } catch {
    return raw;
  }
};

const hostFromUrl = (value) => {
  try {
    return new URL(normalizeUrl(value)).hostname.replace(/^www\./, "");
  } catch {
    return "";
  }
};

const formatBytes = (bytes = 0) => {

    unitIndex += 1;
  }
  return `${value >= 10 || unitIndex === 0 ? value.toFixed(unitIndex === 0 ? 0 : 0) : value.toFixed(1)} ${units[unitIndex]}`;
};
const humanizeToken = (value = "") => value.replace(/[_-]+/g, " ").replace(/\s+/g, " ").trim().replace(/\b\w/g, (char) => char.toUpperCase());
const isTextLikeFile = (file) => {
  const extension = fileExtensionFromName(file?.name || "");
  return (file?.type || "").startsWith("text/") || TEXT_FILE_EXTENSIONS.includes(extension);
};
const isPreviewableAsset = (item) => PREVIEWABLE_MIME_PREFIXES.some(prefix => (item?.assetMime || "").startsWith(prefix)) || PREVIEWABLE_MIME_TYPES.includes(item?.assetMime || "");
const inferTypeFromFile = (file) => {
  const mime = file?.type || "";
  const extension = fileExtensionFromName(file?.name || "");
  if (mime.startsWith("image/")) return "image";
  if (mime.startsWith("video/")) return "video";
  if (isTextLikeFile(file) || DOCUMENT_FILE_EXTENSIONS.includes(extension)) return "file";
  return "file";
};
const describeFileKind = (file) => {
  const extension = fileExtensionFromName(file?.name || "");
  const mime = file?.type || "";
  if (mime.startsWith("image/")) return `${humanizeToken(mime.replace("image/", ""))} image`;
  if (mime.startsWith("video/")) return `${humanizeToken(mime.replace("video/", ""))} video`;
  if (mime === "application/pdf" || extension === "pdf") return "PDF document";
  if (isTextLikeFile(file)) return `${humanizeToken(extension || "text")} note`;
  if (DOCUMENT_FILE_EXTENSIONS.includes(extension)) return `${humanizeToken(extension)} file`;
  return humanizeToken(extension || mime.split("/").pop() || "file");
};
const pickTextSnippet = (text = "") => {
  const lines = text
    .split(/\r?\n/)
    .map(line => sanitizeText(line))
    .filter(Boolean)
    .filter(line => !/^([#>*-]|\d+\.)\s*$/.test(line));
  return clampText(lines.slice(0, 3).join(" "), 180);
};

let assetDbPromise = null;
const openAssetDb = () => {
  if (assetDbPromise) return assetDbPromise;
  assetDbPromise = new Promise((resolve, reject) => {
    if (!("indexedDB" in window)) {
      reject(new Error("indexeddb_unavailable"));
      return;
    }
    const request = window.indexedDB.open(ASSET_DB_NAME, ASSET_DB_VERSION);
    request.onupgradeneeded = () => {
      const db = request.result;
      if (!db.objectStoreNames.contains(ASSET_STORE)) {
        db.createObjectStore(ASSET_STORE, { keyPath: "id" });
      }
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error("indexeddb_open_failed"));
  });
  return assetDbPromise;
};
const assetStoreRequest = async (mode, executor) => {
  const db = await openAssetDb();
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(ASSET_STORE, mode);
    const store = transaction.objectStore(ASSET_STORE);
    executor(store, resolve, reject);
    transaction.onerror = () => reject(transaction.error || new Error("indexeddb_tx_failed"));
  });
};
const putAssetRecord = async (record) => assetStoreRequest("readwrite", (store, resolve) => {
  const request = store.put(record);
  request.onsuccess = () => resolve(record);
});
const getAssetRecord = async (id) => assetStoreRequest("readonly", (store, resolve) => {
  const request = store.get(id);
  request.onsuccess = () => resolve(request.result || null);
});
const deleteAssetRecord = async (id) => assetStoreRequest("readwrite", (store, resolve) => {
  const request = store.delete(id);
  request.onsuccess = () => resolve(true);
});
const clearAssetRecords = async () => assetStoreRequest("readwrite", (store, resolve) => {
  const request = store.clear();
  request.onsuccess = () => resolve(true);
});
const blobToDataUrl = (blob) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => resolve(reader.result);
  reader.onerror = () => reject(reader.error || new Error("blob_read_failed"));
  reader.readAsDataURL(blob);
});
const dataUrlToBlob = async (dataUrl) => {
  const response = await fetch(dataUrl);
  return response.blob();
};
const readTextPreview = async (file) => {
  try {
    const text = await file.slice(0, 5000).text();
    return pickTextSnippet(text);
  } catch {
    return "";
  }
};
const readImageMetadata = async (file, options = {}) => {
  const objectUrl = URL.createObjectURL(file);
  try {
    const image = await new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("image_load_failed"));
      img.src = objectUrl;
    });
    const maxEdge = options.maxEdge || 1200;
    const quality = options.quality || 0.86;
    const scale = Math.min(1, maxEdge / Math.max(image.naturalWidth || 1, image.naturalHeight || 1));
    const canvas = document.createElement("canvas");
    canvas.width = Math.max(1, Math.round((image.naturalWidth || 1) * scale));
    canvas.height = Math.max(1, Math.round((image.naturalHeight || 1) * scale));
    const context = canvas.getContext("2d");
    if (context) context.drawImage(image, 0, 0, canvas.width, canvas.height);
    return {
      width: image.naturalWidth || 0,
      height: image.naturalHeight || 0,
      preview: canvas.toDataURL(file.type === "image/png" ? "image/png" : "image/jpeg", quality),
    };
  } finally {
    URL.revokeObjectURL(objectUrl);
  }
};
const readFolderImage = async (file) => {
  if (!file || !(file.type || "").startsWith("image/")) throw new Error("folder_image_required");
  if (file.type === "image/gif" || file.type === "image/webp") {
    return blobToDataUrl(file);
  }
  const imageMeta = await readImageMetadata(file, { maxEdge: 720, quality: 0.78 });
  return imageMeta.preview;
};
const extractFileMetadata = async (file, folders) => {
  const extension = fileExtensionFromName(file.name);
  const type = inferTypeFromFile(file);
  const title = titleFromFilename(file.name);
  const sizeLabel = formatBytes(file.size);
  const tags = dedupe([
    "upload",
    extension,
    file.type.split("/")[0],
    type === "image" ? "photo" : "",
  ]);
  let thumbnail = "";
  let description = `${describeFileKind(file)} from your device • ${sizeLabel}`;
  let extra = {};

  if (type === "image") {
    try {
      const imageMeta = await readImageMetadata(file);
      thumbnail = imageMeta.preview;
      description = `${describeFileKind(file)} from your device • ${imageMeta.width} × ${imageMeta.height} • ${sizeLabel}`;
      extra = { width: imageMeta.width, height: imageMeta.height };
    } catch {}
  } else if (isTextLikeFile(file)) {
    const snippet = await readTextPreview(file);
    if (snippet) description = snippet;
  }

  const folderId = guessFolderId({
    title,
    description,
    filename: file.name,
    mimeType: file.type,
    source: "device",
    tags,
  }, folders);

  return {
    title,
    description,
    type,
    folderId,
    tags,
    thumbnail,
    source: "device",
    assetName: file.name,
    assetMime: file.type || "application/octet-stream",
    assetSize: file.size || 0,
    ...extra,
  };
};
const downloadBlob = ({ blob, name, openInNewTab = false }) => {

const inferTypeFromUrl = (value) => {
  const normalized = normalizeUrl(value).toLowerCase();
  if (/\.(png|jpe?g|gif|webp|svg)(\?|$)/.test(normalized)) return "image";
  if (/\.(mp4|mov|m4v|webm)(\?|$)/.test(normalized)) return "video";
  if (/youtube\.com|youtu\.be|vimeo\.com|tiktok\.com/.test(normalized)) return "video";
  return "article";
};

const inferTypeFromMetadata = (metadata, value) => {
  const haystack = `${metadata?.publisher || ""} ${metadata?.provider || ""} ${value || ""}`.toLowerCase();
  if (metadata?.type === "video" || /youtube|youtu\.be|vimeo|tiktok/.test(haystack)) return "video";
  if (metadata?.type === "photo" || metadata?.type === "image") return "image";
  if (/\.(png|jpe?g|gif|webp|svg)(\?|$)/.test((value || "").toLowerCase())) return "image";
  return inferTypeFromUrl(value);
};

const sanitizeText = (value = "") => value.replace(/\[(.*?)\]\(.*?\)/g, "$1").replace(/\s+/g, " ").trim();

const extractJinaDescription = (text) => {
  const descriptionMatch = text.match(/^Description:\s*(.+)$/mi);
  if (descriptionMatch?.[1]) return sanitizeText(descriptionMatch[1]);
  const contentMatch = text.match(/Markdown Content:\s*([\s\S]+)/i);
  const lines = (contentMatch?.[1] || text)
    .split("\n")
    .map(line => sanitizeText(line))
    .filter(Boolean);

  return (
    lines.find(line =>
      line.length > 70 &&
      !/^title:/i.test(line) &&
      !/^url source:/i.test(line) &&
      !/^published time:/i.test(line) &&
      !/^warning:/i.test(line) &&
      !/^#/.test(line)
    ) || ""
  );
};

const parseJinaMetadata = (text) => {
  const titleMatch = text.match(/^Title:\s*(.+)$/mi);
  return {
    title: sanitizeText(titleMatch?.[1] || ""),
    description: extractJinaDescription(text),
  };
};

const youtubeVideoIdFromUrl = (value) => {
  try {
    const url = new URL(normalizeUrl(value));
    if (url.hostname.includes("youtu.be")) return url.pathname.replace("/", "").trim();
    if (url.searchParams.get("v")) return url.searchParams.get("v");
    const parts = url.pathname.split("/").filter(Boolean);
    const markerIndex = parts.findIndex(part => ["shorts", "embed", "live"].includes(part));
    if (markerIndex >= 0 && parts[markerIndex + 1]) return parts[markerIndex + 1];
  } catch {}
  return "";
};

const isYouTubeUrl = (value) => /(^|\.)youtube\.com$|(^|\.)youtu\.be$|(^|\.)youtube-nocookie\.com$/i.test(hostFromUrl(value));

const parseYouTubeOEmbedData = (data = {}) => ({
  title: sanitizeText(data.title || ""),

  thumbnail: data.thumbnail_url || "",

  author: sanitizeText(data.author_name || ""),

});

const fetchYouTubeOEmbedMetadata = async (normalizedUrl) => {
  const endpoint = `https://www.youtube.com/oembed?format=json&url=${encodeURIComponent(normalizedUrl)}`;
  const response = await fetch(endpoint);
  if (!response.ok) throw new Error("youtube_oembed_failed");
  const payload = await response.json();
  const parsed = parseYouTubeOEmbedData(payload);
  const videoId = youtubeVideoIdFromUrl(normalizedUrl);
  if (videoId && !parsed.thumbnail) parsed.thumbnail = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
  return parsed;
};

const fetchMicrolinkMetadata = async (normalizedUrl) => {
  const endpoint = `https://api.microlink.io/?${new URLSearchParams({ url: normalizedUrl, screenshot: "false", meta: "true" }).toString()}`;
  const response = await fetch(endpoint);
  if (!response.ok) throw new Error("microlink_failed");

};

const fetchNoembedMetadata = async (normalizedUrl) => {

const descriptionScore = (value = "") => {
  const normalized = sanitizeText(value).toLowerCase();
  if (!normalized) return -1;
  let score = normalized.length;
  if (/ via youtube$/.test(normalized)) score -= 200;
  if (/^youtube video$/.test(normalized)) score -= 250;
  if (/^saved from /.test(normalized)) score -= 300;
  return score;
};

const mergeMetadata = (...sources) => {
  const descriptions = sources.map(source => source?.description || "").filter(Boolean);
  const bestDescription = descriptions.sort((a, b) => descriptionScore(b) - descriptionScore(a))[0] || "";

  return {
    title: sources.find(source => source?.title)?.title || "",
    description: bestDescription,
    thumbnail: sources.find(source => source?.thumbnail)?.thumbnail || "",
    publisher: sources.find(source => source?.publisher)?.publisher || "",
    author: sources.find(source => source?.author)?.author || "",
    type: sources.find(source => source?.type)?.type || "",
    source: sources.find(source => source?.source)?.source || "",
  };
};

const scoreFolder = (folder, haystack) => {
  const normalizedName = folder.name.toLowerCase().replace(/&/g, " ").replace(/\s+/g, " ").trim();
  let score = 0;

  normalizedName.split(" ").filter(token => token.length > 2).forEach((token) => {
    if (haystack.includes(token)) score += 2;
  });

  (folderKeywordMap[normalizedName] || []).forEach((keyword) => {
    if (haystack.includes(keyword)) score += 4;
  });

  return score;
};

const guessFolderId = (metadata, folders) => {
  const uploadFallback = folders.find(f => f.id === "f-personal" || f.name.toLowerCase() === "personal");
  const linkFallback = folders.find(f => f.id === "f-read" || f.name.toLowerCase() === "read later");
  const fallback = metadata.filename || metadata.assetName ? (uploadFallback || linkFallback || folders.find(f => !f.system)) : (linkFallback || uploadFallback || folders.find(f => !f.system));
  const haystack = sanitizeText([
    metadata.title,
    metadata.description,
    metadata.publisher,
    metadata.author,
    metadata.source,
    metadata.url,
    metadata.filename,
    metadata.mimeType,
    metadata.extension,
    Array.isArray(metadata.tags) ? metadata.tags.join(" ") : metadata.tags,
  ].join(" ").toLowerCase());

  let best = fallback || folders.find(f => !f.system);
  let bestScore = -1;
  folders.filter(f => !f.system).forEach((folder) => {
    const score = scoreFolder(folder, haystack);
    if (score > bestScore) {
      best = folder;
      bestScore = score;
    }
  });
  return best?.id || "";
};

const fetchLinkMetadata = async (rawUrl, folders) => {
  const normalizedUrl = normalizeUrl(rawUrl);
  const source = hostFromUrl(normalizedUrl);
  const domain = domainGuess(normalizedUrl);
  const requests = [
    fetchMicrolinkMetadata(normalizedUrl),
    fetchNoembedMetadata(normalizedUrl),
    fetchJinaMetadata(normalizedUrl),
  ];

  if (isYouTubeUrl(normalizedUrl)) {
    requests.unshift(fetchYouTubeOEmbedMetadata(normalizedUrl));
  }

  const results = await Promise.allSettled(requests);

  const metadata = mergeMetadata(
    ...results.filter(result => result.status === "fulfilled").map(result => result.value)
  );

  const type = inferTypeFromMetadata(metadata, normalizedUrl);
  const tags = dedupe([domain, metadata.publisher && metadata.publisher.toLowerCase().replace(/\s+/g, "-")]);
  const folderId = guessFolderId({ ...metadata, url: normalizedUrl, source }, folders);
  const fallbackTitle = metadata.title || (domain ? `Saved from ${domain}` : "Untitled save");
  const fallbackDescription = metadata.description || "";

  return {
    ...metadata,
    title: fallbackTitle,
    description: fallbackDescription,
    url: normalizedUrl,
    source: metadata.source || source,
    type,
    tags,
    folderId,
    success: Boolean(metadata.title || metadata.description || metadata.thumbnail || results.some(result => result.status === "fulfilled")),
  };
};

const relativeTime = (ts) => {
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return "just now";
  if (m < 60) return `${m}m`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h`;
  const d = Math.floor(h / 24);
  if (d < 7) return `${d}d`;
  return new Date(ts).toLocaleDateString();
};

const loadState = () => {

const saveState = (data) => {

const BACKUP_VERSION = 2;
const BACKUP_MIME = "application/json";

const buildBackupPayload = async (folders, items) => {
  const assetIds = dedupe(items.map(item => item.assetId));
  const assets = [];
  for (const assetId of assetIds) {
    const asset = await getAssetRecord(assetId).catch(() => null);
    if (!asset?.blob) continue;
    assets.push({
      id: asset.id,
      name: asset.name || "",
      type: asset.type || asset.blob.type || "application/octet-stream",
      size: typeof asset.size === "number" ? asset.size : asset.blob.size,
      dataUrl: await blobToDataUrl(asset.blob),
    });
  }

  return {
    app: "SAVI",
    version: BACKUP_VERSION,
    exportedAt: new Date().toISOString(),
    folders,
    items,
    assets,
  };
};

const isValidBackup = (backup) => {
  if (!backup || typeof backup !== "object") return false;
  if (backup.app !== "SAVI") return false;
  if (!Array.isArray(backup.folders) || !Array.isArray(backup.items)) return false;
  if (backup.assets && !Array.isArray(backup.assets)) return false;
  return true;
};

function App() {
  const saved = loadState();
  const [folders, setFolders] = useState(saved?.folders || SEED_FOLDERS);
  const [items, setItems] = useState(saved?.items || SEED_ITEMS);
  const [activeFolder, setActiveFolder] = useState("f-all");
  const [search, setSearch] = useState("");
  const [route, setRoute] = useState("home");
  const [showSaveSheet, setShowSaveSheet] = useState(false);
  const [prefillUrl, setPrefillUrl] = useState("");
  const [prefillFromClipboard, setPrefillFromClipboard] = useState(false);
  const [prefillAutoAnalyze, setPrefillAutoAnalyze] = useState(true);
  const [showFolderSheet, setShowFolderSheet] = useState(false);
  const [editingFolderId, setEditingFolderId] = useState("");
  const [showShareSheet, setShowShareSheet] = useState(false);
  const [selectedItem, setSelectedItem] = useState(null);
  const launchClipboardCheckedRef = useRef(false);

  const dismissActiveField = () => {
    const active = document.activeElement;
    if (!active) return;
    const tag = active.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA" || active.isContentEditable) active.blur();
  };

  const openSaveSheet = (nextUrl = "", options = {}) => {
    dismissActiveField();
    setPrefillUrl(nextUrl);
    setPrefillFromClipboard(Boolean(options.tryClipboard && !nextUrl));
    setPrefillAutoAnalyze(options.autoAnalyzeInitial ?? true);
    setShowSaveSheet(true);
  };

  useEffect(() => {
    dismissActiveField();
  }, [route]);

  // If opened with ?url=..., auto-open the save sheet
  useEffect(() => {
    const incoming = getIncomingUrl();
    if (incoming) {
      openSaveSheet(incoming, { autoAnalyzeInitial: true });
      // clean url so refresh doesn't re-trigger
      try { window.history.replaceState({}, "", window.location.pathname); } catch {}
    }
  }, []);

  useEffect(() => {
    if (launchClipboardCheckedRef.current) return;
    launchClipboardCheckedRef.current = true;

    const incoming = getIncomingUrl();
    if (incoming || showSaveSheet) return;
    if (!window.isSecureContext || !navigator.clipboard?.readText) return;

    const tryClipboardOnLaunch = async () => {
      try {
        const rawText = (await navigator.clipboard.readText()).trim();
        if (!rawText) return;
        const normalized = normalizeUrl(rawText);
        if (!hostFromUrl(normalized)) return;
        openSaveSheet(rawText, { autoAnalyzeInitial: false });
      } catch {}
    };

    tryClipboardOnLaunch();
  }, [showSaveSheet]);

  useEffect(() => { saveState({ folders, items }); }, [folders, items]);

  const visibleItems = useMemo(() => {
    let list = items;
    if (activeFolder !== "f-all") list = list.filter(i => i.folderId === activeFolder);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(i =>
        i.title.toLowerCase().includes(q) ||
        i.description.toLowerCase().includes(q) ||
        i.tags.some(t => t.toLowerCase().includes(q)) ||
        i.source.toLowerCase().includes(q) ||
        (i.assetName || "").toLowerCase().includes(q) ||
        (i.assetMime || "").toLowerCase().includes(q)
      );
    }
    return list.sort((a,b) => b.savedAt - a.savedAt);
  }, [items, activeFolder, search]);

  const folderCounts = useMemo(() => {
    const counts = { "f-all": items.length };
    folders.forEach(f => { if (!f.system) counts[f.id] = items.filter(i => i.folderId === f.id).length; });
    return counts;
  }, [items, folders]);

  const exportBackup = async () => {
    const payload = await buildBackupPayload(folders, items);
    const stamp = payload.exportedAt.replace(/[:.]/g, "-");
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: BACKUP_MIME });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `savi-backup-${stamp}.json`;
    document.body.appendChild(link);
    link.click();
    link.remove();
    window.setTimeout(() => URL.revokeObjectURL(url), 0);
  };

  const importBackup = async (file) => {
    if (!file) return { ok: false, message: "No backup file selected." };

    try {
      const parsed = JSON.parse(await file.text());
      if (!isValidBackup(parsed)) {
        return { ok: false, message: "That file doesn't look like a SAVI backup." };
      }

      await clearAssetRecords().catch(() => {});
      for (const asset of parsed.assets || []) {
        if (!asset?.id || !asset?.dataUrl) continue;
        const blob = await dataUrlToBlob(asset.dataUrl);
        await putAssetRecord({
          id: asset.id,
          name: asset.name || "",
          type: asset.type || blob.type || "application/octet-stream",
          size: typeof asset.size === "number" ? asset.size : blob.size,
          blob,
          updatedAt: Date.now(),
        });
      }

      setFolders(parsed.folders);
      setItems(parsed.items);
      setActiveFolder("f-all");
      setRoute("home");
      setSelectedItem(null);
      setShowSaveSheet(false);
      setShowFolderSheet(false);
      setShowShareSheet(false);

      return {
        ok: true,
        message: `Backup restored. ${parsed.items.length} ${parsed.items.length === 1 ? "item" : "items"} loaded.`,
      };
    } catch {
      return { ok: false, message: "Couldn't read that backup file." };
    }
  };

  const addItem = async (item) => {
    const nextId = `i-${Date.now()}`;
    const savedAt = Date.now();
    const { assetFile, ...rest } = item;
    let nextItem = { ...rest, id: nextId, savedAt };

    if (assetFile) {
      const assetId = `a-${savedAt}-${Math.random().toString(36).slice(2, 8)}`;
      await putAssetRecord({
        id: assetId,
        name: item.assetName || assetFile.name || `${nextId}.bin`,
        type: item.assetMime || assetFile.type || "application/octet-stream",
        size: typeof item.assetSize === "number" ? item.assetSize : assetFile.size,
        blob: assetFile,
        updatedAt: savedAt,
      });
      nextItem = {
        ...nextItem,
        assetId,
        assetName: item.assetName || assetFile.name || "",
        assetMime: item.assetMime || assetFile.type || "application/octet-stream",
        assetSize: typeof item.assetSize === "number" ? item.assetSize : assetFile.size,
      };
    }

    setItems(prev => [nextItem, ...prev]);
    return nextItem;
  };
  const deleteItem = async (id) => {
    const item = items.find(entry => entry.id === id);
    if (item?.assetId) {
      await deleteAssetRecord(item.assetId).catch(() => {});
    }
    setItems(prev => prev.filter(i => i.id !== id));
    if (selectedItem?.id === id) setSelectedItem(null);
  };
  const addFolder = (folderDraft) => setFolders(prev => [...prev, { id: `f-${Date.now()}`, ...folderDraft }]);
  const updateFolder = (folderId, updates) => setFolders(prev => prev.map(folder => folder.id === folderId ? { ...folder, ...updates } : folder));
  const clearLibrary = async () => {
    localStorage.removeItem(STORAGE_KEY);
    await clearAssetRecords().catch(() => {});
    window.location.reload();
  };

  return (
    <div className="stage">
      <div className="frame-wrap">
        <div className="bezel">
          <div className="bezel-inner">
            <div className="screen">
              <div className="notch" />
              <div className="app">
                <div className="app-main">
                  {route === "home" && (
                    <HomeScreen folders={folders} items={visibleItems} activeFolder={activeFolder} setActiveFolder={setActiveFolder} folderCounts={folderCounts} search={search} setSearch={setSearch} onSelect={setSelectedItem} onDemoShare={() => setShowShareSheet(true)} />
                  )}
                  {route === "folders" && (
                    <FoldersScreen folders={folders} folderCounts={folderCounts} onOpen={(id)=>{ setActiveFolder(id); setRoute("home"); }} onNew={()=>{ setEditingFolderId(""); setShowFolderSheet(true); }} onEdit={(id)=>{ setEditingFolderId(id); setShowFolderSheet(true); }} />
                  )}
                  {route === "profile" && (
                    <ProfileScreen itemCount={items.length} folderCount={folders.filter(f=>!f.system).length} exportBackup={exportBackup} importBackup={importBackup} clearLibrary={clearLibrary} />
                  )}
                </div>
                <div className="navigator-shell">
                  <TabBar route={route} setRoute={setRoute} onSavePress={()=>openSaveSheet("", { tryClipboard: true })} />
                </div>

                {showShareSheet && <IOSShareSheet onClose={()=>setShowShareSheet(false)} onPickSavi={()=>{ setShowShareSheet(false); openSaveSheet("https://wired.com/future-of-pkm"); }} />}
                {showSaveSheet && <SaveSheet initialUrl={prefillUrl} prefillFromClipboard={prefillFromClipboard} autoAnalyzeInitial={prefillAutoAnalyze} folders={folders} onClose={()=>setShowSaveSheet(false)} onSave={async (i)=>{ await addItem(i); setShowSaveSheet(false); }} />}
                {showFolderSheet && (
                  <FolderSheet
                    folder={folders.find(folder => folder.id === editingFolderId) || null}
                    onClose={()=>{ setShowFolderSheet(false); setEditingFolderId(""); }}
                    onSave={(draft)=>{
                      if (editingFolderId) {
                        updateFolder(editingFolderId, draft);
                      } else {
                        addFolder(draft);
                      }
                      setShowFolderSheet(false);
                      setEditingFolderId("");
                    }}
                  />
                )}
                {selectedItem && <ItemSheet item={selectedItem} folders={folders} onClose={()=>setSelectedItem(null)} onDelete={()=>deleteItem(selectedItem.id)} />}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function ProfileScreen({ itemCount, folderCount, exportBackup, importBackup, clearLibrary }) {
  const fileInputRef = useRef(null);
  const [backupMessage, setBackupMessage] = useState("");

  const [isImporting, setIsImporting] = useState(false);
  const [isExporting, setIsExporting] = useState(false);

  const showBackupMessage = (message, tone = "muted") => {
    setBackupMessage(message);
    setBackupTone(tone);
  };

  const clearData = async () => {
    if (confirm("Clear all saves and start over?")) {
      await clearLibrary();
    }
  };

  const handleExport = async () => {
    setIsExporting(true);
    try {
      await exportBackup();
      showBackupMessage("Backup downloaded to your device.", "success");
    } catch {
      showBackupMessage("Couldn't build that backup right now.", "error");
    } finally {
      setIsExporting(false);
    }
  };

  const openImportPicker = () => {
    fileInputRef.current?.click();
  };

  const handleImport = async (event) => {
    const file = event.target.files?.[0];
    if (!file) return;

    setIsImporting(true);
    const result = await importBackup(file);
    showBackupMessage(result.message, result.ok ? "success" : "error");
    event.target.value = "";
    setIsImporting(false);
  };

  const backupMessageColor = backupTone === "error" ? T.accent : backupTone === "success" ? T.ink : T.inkSoft;

          </div>
          <div style={{ fontSize: 11.5, lineHeight: 1.5, color: T.inkSoft }}>

            <button onClick={handleExport} disabled={isExporting} style={{ padding: 12, borderRadius: 12, fontSize: 12, fontWeight: 500, background: T.ink, color: T.paper, opacity: isExporting ? 0.65 : 1 }}>
              {isExporting ? "Packing backup..." : "Download backup"}
            </button>
            <button onClick={openImportPicker} disabled={isImporting} style={{ padding: 12, borderRadius: 12, fontSize: 12, fontWeight: 500, background: T.paperDim, color: T.ink, border: `1px solid ${T.lineSoft}`, opacity: isImporting ? 0.5 : 1 }}>

        <TabButton active={route === "profile"} onClick={()=>setRoute("profile")} IconComp={IconUser} label="You" />
      </div>
      <div style={{ position: "absolute", bottom: "calc(6px + env(safe-area-inset-bottom))", left: "50%", transform: "translateX(-50%)", width: 120, height: 5, borderRadius: 999, background: T.ink, opacity: 0.85 }} />
    </div>
  );
}

function SaveSheet({ initialUrl, prefillFromClipboard = false, autoAnalyzeInitial = true, folders, onClose, onSave }) {
  const [step, setStep] = useState(1);
  const [inputMode, setInputMode] = useState("link");
  const [url, setUrl] = useState(initialUrl || "");
  const [title, setTitle] = useState("");
  const [description, setDescription] = useState("");
  const [folderId, setFolderId] = useState(folders.find(f => !f.system)?.id || "f-read");
  const [tags, setTags] = useState("");
  const [type, setType] = useState("article");
  const [thumbnail, setThumbnail] = useState("");
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [isSaving, setIsSaving] = useState(false);
  const [analysisNote, setAnalysisNote] = useState("");
  const [clipboardNote, setClipboardNote] = useState("");
  const [keyboardInset, setKeyboardInset] = useState(0);
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [selectedFile, setSelectedFile] = useState(null);
  const [dragActive, setDragActive] = useState(false);
  const sheetRef = useRef(null);
  const scrollRef = useRef(null);
  const urlInputRef = useRef(null);
  const fileInputRef = useRef(null);
  const autoAnalyzeTimerRef = useRef(null);
  const lastAutoSubmittedRef = useRef("");
  const analyzeRequestRef = useRef(0);
  const clipboardAttemptedRef = useRef(false);

  const isTextEntry = (node) => node && (node.tagName === "INPUT" || node.tagName === "TEXTAREA" || node.isContentEditable);

  const ensureVisible = (node, behavior = "smooth") => {
    if (!node || !scrollRef.current) return;
    window.requestAnimationFrame(() => {
      node.scrollIntoView({ block: "center", behavior });
    });
  };

  const cancelAnalyze = () => {
    analyzeRequestRef.current += 1;
    if (autoAnalyzeTimerRef.current) window.clearTimeout(autoAnalyzeTimerRef.current);
    setIsAnalyzing(false);
  };

  const fillFromClipboard = async ({ auto = false } = {}) => {
    if (!navigator.clipboard?.readText) {
      if (!auto) setClipboardNote("Clipboard paste isn't available in this browser.");
      return false;
    }

    try {
      const rawText = (await navigator.clipboard.readText()).trim();
      if (!rawText) {
        if (!auto) setClipboardNote("Your clipboard looks empty right now.");
        return false;
      }

      const normalized = normalizeUrl(rawText);
      setClipboardNote(auto ? "Pulled the latest thing from your clipboard." : "Pasted from your clipboard.");
      setUrl(rawText);

      if (hostFromUrl(normalized)) {
        analyze(rawText);
      }
      return true;
    } catch {
      if (!auto) setClipboardNote("iOS blocked clipboard access here. Paste once manually and SAVI will keep going.");
      return false;
    }
  };

  const switchMode = (nextMode) => {
    if (nextMode === inputMode) return;
    cancelAnalyze();
    setInputMode(nextMode);
    setStep(1);
    setAnalysisNote("");
    setClipboardNote("");
    setShowAdvanced(false);
    if (nextMode === "link") {
      setSelectedFile(null);
      setThumbnail("");
      setType("article");
      if (fileInputRef.current) fileInputRef.current.value = "";
      window.setTimeout(() => {
        urlInputRef.current?.focus({ preventScroll: true });
      }, 90);
    } else {
      setType("file");
    }
  };

  const analyze = async (nextUrl = url) => {
    const normalized = normalizeUrl(nextUrl);
    if (!normalized || !hostFromUrl(normalized) || isAnalyzing) return;
    setInputMode("link");
    const requestId = ++analyzeRequestRef.current;

    setIsAnalyzing(true);
    setAnalysisNote("");
    setShowAdvanced(false);
    lastAutoSubmittedRef.current = normalized;

    try {
      const metadata = await fetchLinkMetadata(normalized, folders);
      if (requestId !== analyzeRequestRef.current) return;
      const fallbackDomain = domainGuess(normalized);
      const resolvedTitle = metadata.title || `Saved from ${fallbackDomain}`;
      const resolvedDescription = metadata.description || "Add your own notes about this save.";
      const resolvedTags = dedupe([...(metadata.tags || []), fallbackDomain]).join(", ");

      setUrl(normalized);
      setTitle(resolvedTitle);
      setDescription(resolvedDescription);
      setType(metadata.type || "article");
      setThumbnail(metadata.thumbnail || "");
      if (metadata.folderId) setFolderId(metadata.folderId);
      setTags(resolvedTags);
      setStep(2);
      setAnalysisNote(metadata.success ? "Metadata pulled from the link and folder selected automatically." : "Limited metadata was available, so some fields were guessed.");
    } catch (error) {
      if (requestId !== analyzeRequestRef.current) return;
      const fallbackDomain = domainGuess(normalized);
      setUrl(normalized);
      setTitle(`Saved from ${fallbackDomain}`);
      setDescription("Add your own notes about this save.");
      setTags(fallbackDomain);
      setType(inferTypeFromUrl(normalized));
      setThumbnail("");
      setStep(2);
      setAnalysisNote("Couldn't fetch rich metadata for this link, so SAVI filled what it could.");
    } finally {
      if (requestId === analyzeRequestRef.current) setIsAnalyzing(false);
    }
  };

  const analyzeFile = async (file) => {
    if (!file || isAnalyzing) return;
    const requestId = ++analyzeRequestRef.current;
    setInputMode("file");
    setSelectedFile(file);
    setIsAnalyzing(true);
    setAnalysisNote("");
    setShowAdvanced(false);

    try {
      const metadata = await extractFileMetadata(file, folders);
      if (requestId !== analyzeRequestRef.current) return;
      setTitle(metadata.title);
      setDescription(metadata.description);
      setType(metadata.type || "file");
      setThumbnail(metadata.thumbnail || "");
      if (metadata.folderId) setFolderId(metadata.folderId);
      setTags((metadata.tags || []).join(", "));
      setStep(2);
      setAnalysisNote(metadata.thumbnail ? "Preview built from your file and folder selected automatically." : "SAVI read the file details and picked the closest folder automatically.");
    } catch {
      if (requestId !== analyzeRequestRef.current) return;
      setTitle(titleFromFilename(file.name));
      setDescription(`${describeFileKind(file)} from your device • ${formatBytes(file.size)}`);
      setType(inferTypeFromFile(file));
      setThumbnail("");
      setTags(dedupe(["upload", fileExtensionFromName(file.name)]).join(", "));
      setStep(2);
      setAnalysisNote("SAVI couldn't read rich metadata from that file, so it saved the essentials instead.");
    } finally {
      if (requestId === analyzeRequestRef.current) setIsAnalyzing(false);
    }
  };

  useEffect(() => {
    if (initialUrl) {
      setInputMode("link");
      setUrl(initialUrl);
      if (autoAnalyzeInitial) {
        analyze(initialUrl);
      } else {
        setClipboardNote("Pulled a link from your clipboard.");
      }
    }
  }, [initialUrl, autoAnalyzeInitial]);

  useEffect(() => {
    if (!prefillFromClipboard || clipboardAttemptedRef.current || initialUrl || inputMode !== "link") return;
    clipboardAttemptedRef.current = true;
    fillFromClipboard({ auto: true });
  }, [prefillFromClipboard, initialUrl, inputMode]);

  useEffect(() => {
    if (inputMode !== "link" || step !== 1 || initialUrl || isAnalyzing) return;
    const normalized = normalizeUrl(url);
    if (!normalized || !hostFromUrl(normalized) || normalized === lastAutoSubmittedRef.current) return;

    autoAnalyzeTimerRef.current = window.setTimeout(() => {
      analyze(normalized);
    }, 420);

    return () => {
      if (autoAnalyzeTimerRef.current) window.clearTimeout(autoAnalyzeTimerRef.current);
    };
  }, [url, step, initialUrl, isAnalyzing, inputMode]);

  useEffect(() => {
    if (inputMode !== "link" || step !== 1 || initialUrl) return;
    const timer = window.setTimeout(() => {
      const input = urlInputRef.current;
      if (!input) return;
      input.focus({ preventScroll: true });
      ensureVisible(input, "auto");
    }, 140);
    return () => window.clearTimeout(timer);
  }, [step, initialUrl, inputMode]);

  useEffect(() => {
    const viewport = window.visualViewport;
    if (!viewport) return;

    const updateKeyboardInset = () => {
      const nextInset = Math.max(0, Math.round(window.innerHeight - (viewport.height + viewport.offsetTop)));
      setKeyboardInset(nextInset);
      const active = document.activeElement;
      if (sheetRef.current?.contains(active) && isTextEntry(active)) {
        window.setTimeout(() => ensureVisible(active), 90);
      }
    };

    updateKeyboardInset();
    viewport.addEventListener("resize", updateKeyboardInset);
    viewport.addEventListener("scroll", updateKeyboardInset);
    window.addEventListener("orientationchange", updateKeyboardInset);

    return () => {
      viewport.removeEventListener("resize", updateKeyboardInset);
      viewport.removeEventListener("scroll", updateKeyboardInset);
      window.removeEventListener("orientationchange", updateKeyboardInset);
    };
  }, []);

  const handleFocusCapture = (event) => {
    if (!isTextEntry(event.target)) return;
    window.setTimeout(() => ensureVisible(event.target), 120);
  };

  const submit = async () => {
    if (isSaving) return;
    const folder = folders.find(f => f.id === folderId);
    const nextTags = tags.split(",").map(t => t.trim()).filter(Boolean);
    setIsSaving(true);
    try {
      if (inputMode === "file" && selectedFile) {
        await onSave({
          title: title.trim() || titleFromFilename(selectedFile.name),
          description: description.trim() || `${describeFileKind(selectedFile)} from your device • ${formatBytes(selectedFile.size)}`,
          url: "",
          source: "device",
          type: type || inferTypeFromFile(selectedFile),
          folderId,
          tags: nextTags,
          color: folder?.color || T.accent,
          thumbnail,
          assetFile: selectedFile,
          assetName: selectedFile.name,
          assetMime: selectedFile.type || "application/octet-stream",
          assetSize: selectedFile.size || 0,
        });
        return;
      }

      await onSave({
        title: title.trim() || "Untitled save",
        description: description.trim(),
        url: normalizeUrl(url.trim()),
        source: hostFromUrl(url.trim()) || "manual",
        type,
        folderId,
        tags: nextTags,
        color: folder?.color || T.accent,
        thumbnail,
      });
    } finally {
      setIsSaving(false);
    }
  };

  const handlePaste = () => {
    setClipboardNote("Pasted from your clipboard.");
    window.setTimeout(() => {
      const pastedValue = urlInputRef.current?.value || "";
      const normalized = normalizeUrl(pastedValue);
      if (!normalized || !hostFromUrl(normalized) || normalized === lastAutoSubmittedRef.current) return;
      analyze(normalized);
    }, 30);
  };

  const clearUrlInput = () => {
    cancelAnalyze();
    lastAutoSubmittedRef.current = "";
    setUrl("");
    setAnalysisNote("");
    setClipboardNote("");
    setStep(1);
    window.setTimeout(() => {
      urlInputRef.current?.focus({ preventScroll: true });
    }, 20);
  };

  const openFilePicker = () => {
    fileInputRef.current?.click();
  };

  const clearSelectedFile = () => {
    cancelAnalyze();
    setSelectedFile(null);
    setThumbnail("");
    setTitle("");
    setDescription("");
    setTags("");
    setAnalysisNote("");
    setClipboardNote("");
    setStep(1);
    setShowAdvanced(false);
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  const handleFileChange = (event) => {
    const file = event.target.files?.[0];
    event.target.value = "";
    if (!file) return;
    analyzeFile(file);
  };

  const handleDrop = (event) => {
    event.preventDefault();
    setDragActive(false);
    const file = event.dataTransfer?.files?.[0];
    if (!file) return;
    analyzeFile(file);
  };

  const activeFolder = folders.find(f => f.id === folderId);
  const loadingTitle = inputMode === "file" ? "Reading your file, preview, and folder" : "Pulling your title, description, and tags";
  const loadingBody = inputMode === "file"
    ? "SAVI is checking the file name, type, and preview so it can sort this into the right folder for you."
    : "Wizard hands at work on the metadata. If the paste looked wrong, tap the x and try again.";

  return (
    <div className="anim-fade" style={{ position: "absolute", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end", background: "rgba(28,26,23,0.45)", paddingBottom: keyboardInset, transition: "padding-bottom 180ms ease" }} onClick={onClose}>
      <div ref={sheetRef} className="anim-sheet" style={{ borderRadius: "28px 28px 0 0", overflow: "hidden", display: "flex", flexDirection: "column", background: T.paper, maxHeight: keyboardInset ? `calc(100% - ${keyboardInset + 8}px)` : "85%", transition: "max-height 180ms ease" }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding: "12px 0 4px", display: "flex", justifyContent: "center", flexShrink: 0 }}><div style={{ width: 36, height: 4, borderRadius: 999, background: T.line }} /></div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px", flexShrink: 0 }}>
          <button onClick={step === 1 ? onClose : () => setStep(1)} style={{ fontSize: 14, color: T.inkSoft }}>{step === 1 ? "Cancel" : "Back"}</button>
          <div className="serif" style={{ fontSize: 18, color: T.ink }}>{step === 1 ? "New save" : "Review"}</div>
          {step === 1 ? (
            <div className="mono" style={{ fontSize: 10, color: T.inkMute }}>{step}/2</div>
          ) : (
            <button onClick={submit} disabled={isSaving} style={{ padding: "9px 14px", borderRadius: 999, fontSize: 12, fontWeight: 600, background: T.ink, color: T.paper, opacity: isSaving ? 0.65 : 1 }}>
              {isSaving ? "Saving..." : "Save"}
            </button>
          )}
        </div>

        <div ref={scrollRef} className="scroll" style={{ padding: "0 20px 20px" }} onFocusCapture={handleFocusCapture}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
            {[
              { id: "link", label: "Link", icon: <IconLink size={14} /> },
              { id: "file", label: "File", icon: <IconFile size={14} /> },
            ].map(option => (
              <button key={option.id} onClick={() => switchMode(option.id)} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "11px 12px", borderRadius: 12, background: inputMode === option.id ? T.ink : T.paperDim, color: inputMode === option.id ? T.paper : T.inkSoft, border: `1px solid ${inputMode === option.id ? T.ink : T.lineSoft}` }}>
                {option.icon}
                <span className="mono" style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em" }}>{option.label}</span>
              </button>
            ))}
          </div>
          {step === 1 ? (
            <div style={{ padding: "12px 0" }}>
              {inputMode === "link" ? (
                <>
                  <Label>Paste URL</Label>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ position: "relative", flex: 1 }}>
                      <input ref={urlInputRef} value={url} onChange={e=>setUrl(e.target.value)} onPaste={handlePaste} onKeyDown={e=>e.key==="Enter" && !isAnalyzing && analyze()} placeholder="https://..." style={{ width: "100%", borderRadius: 12, padding: url ? "12px 46px 12px 14px" : "12px 14px", fontSize: 14, background: T.card, border: `1px solid ${T.lineSoft}`, color: T.ink }} />
                      {url && (
                        <button onClick={clearUrlInput} aria-label="Clear pasted link" style={{ position: "absolute", top: "50%", right: 10, transform: "translateY(-50%)", width: 28, height: 28, borderRadius: 999, background: T.paperDim, color: T.inkSoft, display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${T.lineSoft}` }}>
                          <IconX size={12} />
                        </button>
                      )}
                    </div>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, marginTop: 10 }}>
                    <button onClick={() => fillFromClipboard()} style={{ padding: "9px 12px", borderRadius: 999, fontSize: 11, fontWeight: 600, background: T.card, color: T.ink, border: `1px solid ${T.lineSoft}` }}>
                      Use clipboard
                    </button>
                    {clipboardNote && (
                      <div className="mono" style={{ flex: 1, textAlign: "right", fontSize: 10, color: T.inkMute }}>
                        {clipboardNote}
                      </div>
                    )}
                  </div>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 8, marginTop: 16, fontSize: 11.5, padding: 12, borderRadius: 12, background: T.paperDim, border: `1px solid ${T.lineSoft}`, color: T.inkSoft }}>
                    <div style={{ color: T.accent, flexShrink: 0, marginTop: 2 }}><IconSparkles size={13} /></div>
                    <span>Tap plus and SAVI will try your clipboard first, then keep going automatically once it sees a real link.</span>
                  </div>
                </>
              ) : (
                <>
                  <Label>Add file or photo</Label>
                  <input ref={fileInputRef} type="file" onChange={handleFileChange} className="sr-only" />
                  <div
                    onDragEnter={(event) => { event.preventDefault(); setDragActive(true); }}
                    onDragOver={(event) => { event.preventDefault(); setDragActive(true); }}
                    onDragLeave={(event) => { event.preventDefault(); setDragActive(false); }}
                    onDrop={handleDrop}
                    style={{ padding: 18, borderRadius: 18, border: `1px dashed ${dragActive ? T.ink : T.line}`, background: dragActive ? T.paperDim : T.card, transition: "background 120ms ease, border-color 120ms ease" }}
                  >
                    <div style={{ width: 44, height: 44, borderRadius: 14, background: T.paperDim, color: T.ink, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 14 }}>
                      <IconUpload size={18} />
                    </div>
                    <div className="serif" style={{ fontSize: 26, lineHeight: 1.05, color: T.ink, marginBottom: 8 }}>
                      {selectedFile ? titleFromFilename(selectedFile.name) : "Drop in a file"}
                    </div>
                    <div style={{ fontSize: 12.5, lineHeight: 1.5, color: T.inkSoft, marginBottom: 14 }}>
                      {selectedFile ? `${describeFileKind(selectedFile)} • ${formatBytes(selectedFile.size)}` : "Choose from your phone, upload a document, or drag a file in on desktop. SAVI will preview it and sort it into a folder for you."}
                    </div>
                    <button onClick={openFilePicker} style={{ padding: "12px 14px", borderRadius: 12, background: T.ink, color: T.paper, fontSize: 13, fontWeight: 600 }}>
                      {selectedFile ? "Choose another file" : "Choose file"}
                    </button>
                  </div>
                  {selectedFile && !isAnalyzing && (
                    <button onClick={clearSelectedFile} style={{ width: "100%", marginTop: 12, padding: 12, borderRadius: 12, fontSize: 12, fontWeight: 500, background: T.paperDim, color: T.inkSoft, border: `1px solid ${T.lineSoft}` }}>
                      Clear selected file
                    </button>
                  )}
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 8, marginTop: 16, fontSize: 11.5, padding: 12, borderRadius: 12, background: T.paperDim, border: `1px solid ${T.lineSoft}`, color: T.inkSoft }}>
                    <div style={{ color: T.accent, flexShrink: 0, marginTop: 2 }}><IconImage size={13} /></div>
                    <span>Photos, notes, PDFs, and documents can live beside your links so SAVI becomes one organized library.</span>
                  </div>
                </>
              )}
              {isAnalyzing && (
                <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginTop: 14, padding: 14, borderRadius: 14, background: T.card, border: `1px solid ${T.lineSoft}` }}>
                  <div className="wizard-float" style={{ width: 36, height: 36, borderRadius: 12, background: T.paperDim, color: T.accent, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <IconSparkles size={16} />
                  </div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: T.ink }}>
                      {loadingTitle}
                      <span className="loading-dots" aria-hidden="true"><span></span><span></span><span></span></span>
                    </div>
                    <div style={{ fontSize: 11.5, lineHeight: 1.45, color: T.inkSoft, marginTop: 4 }}>
                      {loadingBody}
                    </div>
                  </div>
                </div>
              )}
              {inputMode === "link" && (
                <button onClick={() => analyze()} disabled={!url.trim() || isAnalyzing} style={{ width: "100%", marginTop: 20, padding: 14, borderRadius: 12, fontSize: 15, fontWeight: 500, background: T.ink, color: T.paper, opacity: url.trim() && !isAnalyzing ? 1 : 0.3 }}>
                  {isAnalyzing ? "Analyzing..." : "Continue"}
                </button>
              )}
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 16, padding: "8px 0" }}>
              {thumbnail && (
                <div style={{ borderRadius: 16, overflow: "hidden", border: `1px solid ${T.lineSoft}`, background: T.paperDim }}>
                  <img src={thumbnail} alt="" style={{ display: "block", width: "100%", aspectRatio: "1.8 / 1", objectFit: "cover" }} />
                </div>
              )}
              {analysisNote && (
                <div style={{ fontSize: 11.5, padding: 12, borderRadius: 12, background: T.paperDim, border: `1px solid ${T.lineSoft}`, color: T.inkSoft }}>
                  {analysisNote}
                </div>
              )}
              <div style={{ padding: 14, borderRadius: 16, background: T.card, border: `1px solid ${T.lineSoft}` }}>
                <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", color: T.inkMute, marginBottom: 8 }}>
                  Ready to save
                </div>
                <div className="serif clamp2" style={{ fontSize: 24, lineHeight: 1.2, color: T.ink, marginBottom: 10 }}>
                  {title || "Untitled save"}
                </div>
                <div className="clamp2" style={{ fontSize: 12.5, lineHeight: 1.45, color: T.inkSoft, marginBottom: 12 }}>
                  {description}
                </div>
                {inputMode === "file" && selectedFile && (
                  <div className="mono clamp1" style={{ fontSize: 10, color: T.inkMute, marginBottom: 12 }}>
                    {selectedFile.name} • {formatBytes(selectedFile.size)}
                  </div>
                )}
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
                  <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", padding: "5px 8px", borderRadius: 999, background: T.paperDim, color: T.inkSoft }}>
                    {type}
                  </div>
                  {activeFolder && (
                    <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 8px", borderRadius: 999, background: T.paperDim, color: T.inkSoft }}>
                      <div style={{ width: 8, height: 8, borderRadius: 2, background: activeFolder.color || T.accent }} />
                      <span className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>{activeFolder.name}</span>
                    </div>
                  )}
                  {tags.split(",").map(t => t.trim()).filter(Boolean).slice(0, 2).map(tag => (
                    <div key={tag} className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", padding: "5px 8px", borderRadius: 999, background: T.paperDim, color: T.inkSoft }}>
                      #{tag}
                    </div>
                  ))}
                </div>
                <button onClick={submit} disabled={isSaving} style={{ width: "100%", padding: 15, borderRadius: 14, fontSize: 16, fontWeight: 600, background: T.ink, color: T.paper, opacity: isSaving ? 0.65 : 1 }}>
                  {isSaving ? "Saving..." : "Save to library"}
                </button>
              </div>
              <button onClick={()=>setShowAdvanced(v => !v)} style={{ width: "100%", padding: 12, borderRadius: 12, fontSize: 12, fontWeight: 500, background: T.paperDim, color: T.inkSoft, border: `1px solid ${T.lineSoft}` }}>
                {showAdvanced ? "Hide options" : "More options"}
              </button>
              {showAdvanced && (
                <>
                  <Field label="Title"><input value={title} onChange={e=>setTitle(e.target.value)} style={inputStyle()} /></Field>
                  <Field label="Description"><textarea value={description} onChange={e=>setDescription(e.target.value)} rows={3} style={{ ...inputStyle(), resize: "none" }} /></Field>
                  <Field label="Type">
                    <div style={{ display: "flex", gap: 6 }}>
                      {["article", "video", "image", "file", "link"].map(t => (
                        <button key={t} onClick={()=>setType(t)} className="mono" style={{ flex: 1, padding: "8px 0", borderRadius: 8, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", background: type === t ? T.ink : T.card, color: type === t ? T.paper : T.inkSoft, border: `1px solid ${type === t ? T.ink : T.lineSoft}` }}>{t}</button>
                      ))}
                    </div>
                  </Field>
                  <Field label="Folder">
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                      {folders.filter(f => !f.system).map(f => (
                        <button key={f.id} onClick={()=>setFolderId(f.id)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", borderRadius: 8, fontSize: 12, background: folderId === f.id ? T.paperDim : T.card, color: T.ink, border: `1px solid ${folderId === f.id ? T.line : T.lineSoft}`, textAlign: "left" }}>
                          <div style={{ width: 8, height: 8, borderRadius: 2, background: f.color, flexShrink: 0 }} />
                          <span className="clamp1">{f.name}</span>
                        </button>
                      ))}
                    </div>
                  </Field>
                  <Field label="Tags"><input value={tags} onChange={e=>setTags(e.target.value)} placeholder="design, inspiration" style={inputStyle()} /></Field>
                </>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function FolderSheet({ folder, onClose, onSave }) {
  const [name, setName] = useState(folder?.name || "");
  const [color, setColor] = useState(folder?.color || FOLDER_COLORS[0]);
  const [image, setImage] = useState(folder?.image || "");
  const [imageUrl, setImageUrl] = useState("");
  const [imageNote, setImageNote] = useState("");
  const [isReadingImage, setIsReadingImage] = useState(false);
  const imageInputRef = useRef(null);

  const openImagePicker = () => {
    imageInputRef.current?.click();
  };

  const handleImageChange = async (event) => {
    const file = event.target.files?.[0];
    event.target.value = "";
    if (!file) return;
    setIsReadingImage(true);
    try {
      const nextImage = await readFolderImage(file);
      setImage(nextImage);
      setImageUrl("");
      setImageNote("Cover image added.");
    } catch {
      setImageNote("Pick an image file for the folder cover.");
    } finally {
      setIsReadingImage(false);
    }
  };

  const handleImagePaste = async (event) => {
    const items = Array.from(event.clipboardData?.items || []);
    const imageItem = items.find(item => (item.type || "").startsWith("image/"));
    if (!imageItem) return;
    event.preventDefault();
    const file = imageItem.getAsFile();
    if (!file) return;
    setIsReadingImage(true);
    try {
      const nextImage = await readFolderImage(file);
      setImage(nextImage);
      setImageUrl("");
      setImageNote("Cover image pasted from your clipboard.");
    } catch {
      setImageNote("That pasted image couldn't be used.");
    } finally {
      setIsReadingImage(false);
    }
  };

  const clearImage = () => {
    setImage("");
    setImageUrl("");
    setImageNote("Cover image removed.");
  };

  const applyImageUrl = () => {
    const next = (imageUrl || "").trim();
    if (!next) {
      setImage("");
      setImageNote("Cover image removed.");
      return;
    }
    setImage(next);
    setImageNote("Cover image updated from pasted URL.");
  };

  return (
    <div className="anim-fade" style={{ position: "absolute", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end", background: "rgba(28,26,23,0.45)" }} onClick={onClose}>
      <div className="anim-sheet" style={{ borderRadius: "28px 28px 0 0", overflow: "hidden", background: T.paper }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding: "12px 0 4px", display: "flex", justifyContent: "center" }}><div style={{ width: 36, height: 4, borderRadius: 999, background: T.line }} /></div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px" }}>
          <button onClick={onClose} style={{ fontSize: 14, color: T.inkSoft }}>Cancel</button>
          <div className="serif" style={{ fontSize: 18, color: T.ink }}>{folder ? "Edit folder" : "New folder"}</div>
          <div style={{ width: 48 }} />
        </div>
        <div style={{ padding: "0 20px 32px", display: "flex", flexDirection: "column", gap: 16 }}>
          <input ref={imageInputRef} type="file" accept="image/*" onChange={handleImageChange} className="sr-only" />
          <div style={{ borderRadius: 18, overflow: "hidden", minHeight: 140, background: image ? `center / cover no-repeat url(${image}), ${color}22` : `${color}22`, border: `1px solid ${T.lineSoft}`, position: "relative" }}>
            <div style={{ position: "absolute", inset: 0, background: image ? "linear-gradient(180deg, rgba(28,26,23,0.08) 0%, rgba(28,26,23,0.36) 100%)" : "none" }} />
            <div style={{ position: "relative", zIndex: 1, padding: 18, minHeight: 140, display: "flex", flexDirection: "column", justifyContent: "space-between" }}>
              <div style={{ width: 44, height: 44, borderRadius: 14, background: image ? "rgba(255,255,255,0.88)" : T.card, display: "flex", alignItems: "center", justifyContent: "center", color: T.ink }}>
                {image ? <IconImage size={18} /> : <div style={{ width: 18, height: 18, borderRadius: 6, background: color }} />}
              </div>
              <div>
                <div className="serif" style={{ fontSize: 28, lineHeight: 1.05, color: image ? T.paper : T.ink }}>{name.trim() || "Folder cover"}</div>
                <div className="mono" style={{ marginTop: 6, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", color: image ? "rgba(245,241,234,0.84)" : T.inkMute }}>{image ? "Custom image" : "Solid color"}</div>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={openImagePicker} style={{ flex: 1, padding: 12, borderRadius: 12, fontSize: 12, fontWeight: 600, background: T.ink, color: T.paper, opacity: isReadingImage ? 0.65 : 1 }}>
              {isReadingImage ? "Adding cover..." : image ? "Change cover image" : "Add cover image"}
            </button>
            {image && (
              <button onClick={clearImage} style={{ padding: "12px 14px", borderRadius: 12, fontSize: 12, fontWeight: 600, background: T.paperDim, color: T.inkSoft, border: `1px solid ${T.lineSoft}` }}>
                Clear
              </button>
            )}
          </div>
          <Field label="Paste image, GIF, or URL">
            <div style={{ display: "flex", gap: 8 }}>
              <input value={imageUrl} onChange={e=>setImageUrl(e.target.value)} onPaste={handleImagePaste} placeholder="Paste an image, GIF, or URL" style={{ ...inputStyle(), flex: 1 }} />
              <button onClick={applyImageUrl} style={{ padding: "0 14px", borderRadius: 10, background: T.ink, color: T.paper, fontSize: 12, fontWeight: 600 }}>
                Use
              </button>
            </div>
          </Field>
          <Field label="Pick a motion cover">
            <div className="scroll" style={{ display: "flex", gap: 10, overflowX: "auto", overflowY: "hidden", margin: "0 -20px", padding: "0 20px 2px" }}>
              {PRESET_FOLDER_COVERS.map((cover) => {
                const active = image === cover.image;
                return (
                  <button key={cover.id} onClick={()=>{ setImage(cover.image); setImageUrl(""); setImageNote(`${cover.name} cover selected.`); }} style={{ flexShrink: 0, width: 132, textAlign: "left" }}>
                    <div style={{ height: 110, borderRadius: 14, overflow: "hidden", background: `center / cover no-repeat url(${cover.image}), ${T.paperDim}`, border: `2px solid ${active ? T.ink : T.lineSoft}` }} />
                    <div className="mono" style={{ marginTop: 8, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", color: active ? T.ink : T.inkMute }}>
                      {cover.name}
                    </div>
                  </button>
                );
              })}
            </div>
          </Field>
          {imageNote && (
            <div style={{ fontSize: 11.5, color: T.inkSoft }}>{imageNote}</div>
          )}
          <Field label="Name"><input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter" && name.trim() && onSave({ name: name.trim(), color, image })} placeholder="e.g. Travel ideas" style={inputStyle()} /></Field>
          <Field label="Color">
            <div style={{ display: "flex", gap: 8 }}>
              {FOLDER_COLORS.map(c => (
                <button key={c} onClick={()=>setColor(c)} style={{ width: 36, height: 36, borderRadius: 12, background: c, outline: color === c ? `2px solid ${T.ink}` : "none", outlineOffset: 2 }} />
              ))}
            </div>
          </Field>
          <button onClick={()=>name.trim() && onSave({ name: name.trim(), color, image })} disabled={!name.trim()} style={{ width: "100%", padding: 14, borderRadius: 12, fontSize: 15, fontWeight: 500, background: T.ink, color: T.paper, opacity: name.trim() ? 1 : 0.3 }}>{folder ? "Save changes" : "Create folder"}</button>
        </div>
      </div>
    </div>
  );
}

function ItemSheet({ item, folders, onClose, onDelete }) {
  const folder = folders.find(f => f.id === item.folderId);
  const [isOpeningAsset, setIsOpeningAsset] = useState(false);
  const hasLocalAsset = Boolean(item.assetId);

  const openAsset = async () => {
    if (!item.assetId || isOpeningAsset) return;
    setIsOpeningAsset(true);
    try {
      const asset = await getAssetRecord(item.assetId);
      if (!asset?.blob) {
        alert("That file isn't available on this device anymore. Restore a backup or upload it again.");
        return;
      }
      downloadBlob({
        blob: asset.blob,
        name: item.assetName || asset.name || item.title,
        openInNewTab: isPreviewableAsset(item),
      });
    } catch {
      alert("Couldn't open that file right now.");
    } finally {
      setIsOpeningAsset(false);
    }
  };

  return (
    <div className="anim-fade" style={{ position: "absolute", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end", background: "rgba(28,26,23,0.45)" }} onClick={onClose}>
      <div className="anim-sheet" style={{ borderRadius: "28px 28px 0 0", overflow: "hidden", display: "flex", flexDirection: "column", background: T.paper, maxHeight: "85%" }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding: "12px 0 4px", display: "flex", justifyContent: "center" }}><div style={{ width: 36, height: 4, borderRadius: 999, background: T.line }} /></div>
        <div style={{ height: 160, position: "relative", flexShrink: 0, background: item.thumbnail ? `center / cover no-repeat url(${item.thumbnail}), ${item.color}18` : `${item.color}18` }}>
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: item.color, background: item.thumbnail ? "linear-gradient(180deg, rgba(28,26,23,0.1) 0%, rgba(28,26,23,0.24) 100%)" : "transparent" }}>
            <div style={{ width: 64, height: 64, borderRadius: 20, background: item.thumbnail ? "rgba(255,255,255,0.84)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>
              {typeIconFor(item.type, { size: 38, stroke: 1.2 })}
            </div>
          </div>
          <button onClick={onClose} style={{ position: "absolute", top: 12, right: 12, width: 32, height: 32, borderRadius: "50%", background: T.paper, color: T.ink, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <IconX size={14} />
          </button>
          <div className="mono" style={{ position: "absolute", top: 12, left: 12, fontSize: 9, textTransform: "uppercase", letterSpacing: "0.08em", padding: "2px 8px", borderRadius: 999, background: T.paper, color: item.color }}>
            {item.type}
          </div>
        </div>
        <div className="scroll" style={{ padding: "16px 20px" }}>
          <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8, color: T.inkMute }}>{item.source} · saved {relativeTime(item.savedAt)}</div>
          <h2 className="serif" style={{ fontSize: 26, lineHeight: 1.2, marginBottom: 8, marginTop: 0, color: T.ink }}>{item.title}</h2>
          <p style={{ fontSize: 13, lineHeight: 1.5, marginBottom: 12, color: T.inkSoft }}>{item.description}</p>
          {hasLocalAsset && (
            <div style={{ marginBottom: 12, padding: 12, borderRadius: 12, background: T.paperDim, border: `1px solid ${T.lineSoft}` }}>
              <div className="mono clamp1" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", color: T.inkMute, marginBottom: 6 }}>
                Local file
              </div>
              <div className="clamp1" style={{ fontSize: 12.5, color: T.ink, marginBottom: 4 }}>{item.assetName || item.title}</div>
              <div className="mono" style={{ fontSize: 10, color: T.inkSoft }}>
                {[item.assetMime, item.assetSize ? formatBytes(item.assetSize) : ""].filter(Boolean).join(" • ")}
              </div>
            </div>
          )}
          {folder && (
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, fontSize: 11, color: T.inkSoft }}>
              <div style={{ width: 8, height: 8, borderRadius: 2, background: folder.color }} />
              <span>in {folder.name}</span>
            </div>
          )}
          {item.tags.length > 0 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 16 }}>
              {item.tags.map(t => (
                <span key={t} className="mono" style={{ fontSize: 10, padding: "2px 8px", borderRadius: 999, background: T.paperDim, color: T.inkSoft, border: `1px solid ${T.lineSoft}` }}>#{t}</span>
              ))}
            </div>
          )}
          <div style={{ display: "flex", gap: 8, paddingTop: 12, borderTop: `1px solid ${T.lineSoft}` }}>
            {hasLocalAsset ? (
              <button onClick={openAsset} disabled={isOpeningAsset} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: 12, borderRadius: 12, fontSize: 13, fontWeight: 500, background: T.ink, color: T.paper, opacity: isOpeningAsset ? 0.65 : 1 }}>
                {isPreviewableAsset(item) ? <IconArrowOut size={14} /> : <IconDownload size={14} />}
                {isOpeningAsset ? "Opening..." : isPreviewableAsset(item) ? "Open file" : "Download file"}
              </button>
            ) : (
              <a href={item.url} target="_blank" rel="noreferrer" style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: 12, borderRadius: 12, fontSize: 13, fontWeight: 500, background: T.ink, color: T.paper, textDecoration: "none" }}>
                <IconArrowOut size={14} />Open source
              </a>
            )}
            <button onClick={onDelete} style={{ padding: 12, borderRadius: 12, color: T.inkSoft, border: `1px solid ${T.lineSoft}` }}>
              <IconTrash size={14} />
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function IOSShareSheet({ onClose, onPickSavi }) {
  const apps = [
    { name: "SAVI", bg: T.ink, icon: <IconBookmark size={22} stroke={2} fill={T.paper} />, primary: true },
    { name: "Messages", bg: "#34C759" },
    { name: "Mail", bg: "#007AFF" },
    { name: "Notes", bg: "#FFCC00" },
    { name: "Copy", bg: "#8E8E93" },
  ];
  return (
    <div className="anim-fade" style={{ position: "absolute", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end", background: "rgba(28,26,23,0.4)" }} onClick={onClose}>
      <div className="anim-sheet" style={{ borderRadius: "28px 28px 0 0", overflow: "hidden", background: "rgba(245, 241, 234, 0.96)", backdropFilter: "blur(30px)" }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding: "12px 0 8px", display: "flex", justifyContent: "center" }}><div style={{ width: 36, height: 4, borderRadius: 999, background: T.line }} /></div>
        <div style={{ margin: "0 16px 16px", padding: 12, borderRadius: 16, display: "flex", alignItems: "center", gap: 12, background: T.card, border: `1px solid ${T.lineSoft}` }}>
          <div style={{ width: 48, height: 48, borderRadius: 8, background: T.ink, color: T.paper, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <IconFile size={18} />
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="clamp1" style={{ fontSize: 13, fontWeight: 500, color: T.ink }}>The Future of PKM</div>
            <div className="clamp1" style={{ fontSize: 11, color: T.inkSoft }}>wired.com</div>
          </div>
          <div style={{ color: T.inkMute }}><IconShare size={16} /></div>
        </div>
        <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", padding: "0 20px 8px", color: T.inkMute }}>Share with app</div>
        <div style={{ padding: "0 12px 12px", display: "flex", gap: 16, overflowX: "auto" }}>
          {apps.map((app, i) => (
            <button key={i} onClick={app.primary ? onPickSavi : undefined} style={{ flexShrink: 0, display: "flex", flexDirection: "column", alignItems: "center", gap: 6, width: 68, opacity: app.primary ? 1 : 0.4 }}>
              <div style={{ width: 60, height: 60, borderRadius: 14, background: app.bg, color: T.paper, display: "flex", alignItems: "center", justifyContent: "center" }}>
                {app.icon || <div style={{ width: 24, height: 24, borderRadius: 4, background: "rgba(255,255,255,0.5)" }} />}
              </div>
              <div className="clamp1" style={{ fontSize: 10, color: T.ink, textAlign: "center", width: "100%" }}>{app.name}</div>
            </button>
          ))}
        </div>
        <button onClick={onClose} style={{ margin: "0 16px 32px", width: "calc(100% - 32px)", padding: 14, borderRadius: 16, fontSize: 15, fontWeight: 500, background: T.card, color: T.ink, border: `1px solid ${T.lineSoft}` }}>Cancel</button>
      </div>
    </div>
  );
}

// ============ shared helpers ============
const inputStyle = () => ({ width: "100%", borderRadius: 8, padding: "10px 12px", fontSize: 13, background: T.card, border: `1px solid ${T.lineSoft}`, color: T.ink });
const Label = ({ children }) => <label className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: 8, color: T.inkMute }}>{children}</label>;
const Field = ({ label, children }) => <div><Label>{label}</Label>{children}</div>;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
