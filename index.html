function ProfileScreen({ itemCount, folderCount, exportBackup, importBackup, clearLibrary, clearDemoContent }) {
  const fileInputRef = useRef(null);
  const [backupMessage, setBackupMessage] = useState("");
  const [backupTone, setBackupTone] = useState("muted");
  const [isImporting, setIsImporting] = useState(false);
  const [isExporting, setIsExporting] = useState(false);
  const [showDeleteModal, setShowDeleteModal] = useState(false);
  const [deleteStep, setDeleteStep] = useState(1);
  const [isDeletingEverything, setIsDeletingEverything] = useState(false);
  const [showClearDemoModal, setShowClearDemoModal] = useState(false);
  const [isClearingDemo, setIsClearingDemo] = useState(false);

  const showBackupMessage = (message, tone = "muted") => {
    setBackupMessage(message);
    setBackupTone(tone);
  };

  const openDeleteModal = () => {
    setDeleteStep(1);
    setShowDeleteModal(true);
  };

  const closeDeleteModal = () => {
    if (isDeletingEverything) return;
    setDeleteStep(1);
    setShowDeleteModal(false);
  };

  const advanceDeleteStep = () => {
    if (isDeletingEverything) return;
    setDeleteStep(2);
  };

  const confirmDeleteEverything = async () => {
    if (isDeletingEverything) return;
    setIsDeletingEverything(true);
    await clearLibrary();
  };

  const resetPrototype = () => {
    try {
      localStorage.removeItem(ONBOARDED_KEY);
    } catch {}
    window.location.reload();
  };

  const requestClearDemo = () => {
    setShowClearDemoModal(true);
  };

  const closeClearDemoModal = () => {
    if (isClearingDemo) return;
    setShowClearDemoModal(false);
  };

  const confirmClearDemo = async () => {
    if (isClearingDemo) return;
    setIsClearingDemo(true);
    try {
      const remainingCount = await clearDemoContent();
      showBackupMessage(remainingCount ? "Preview content removed. Your own saves are still here." : "Preview content removed. Starting fresh.", "success");
      setShowClearDemoModal(false);
    } catch {
      showBackupMessage("Couldn't clear the preview content right now.", "error");
    } finally {
      setIsClearingDemo(false);
    }
  };

  const handleExport = async () => {
    setIsExporting(true);
    try {
      await exportBackup();
      showBackupMessage("Backup downloaded to your device.", "success");
    } catch {
      showBackupMessage("Couldn't build that backup right now.", "error");
    } finally {
      setIsExporting(false);
    }
  };

  const openImportPicker = () => {
    fileInputRef.current?.click();
  };

  const handleImport = async (event) => {
    const file = event.target.files?.[0];
    if (!file) return;

    setIsImporting(true);
    const result = await importBackup(file);
    showBackupMessage(result.message, result.ok ? "success" : "error");
    event.target.value = "";
    setIsImporting(false);
  };

  const backupMessageColor = backupTone === "error" ? T.accent : backupTone === "success" ? T.ink : T.inkSoft;

  return (
    <div className="scroll anim-fade" style={{ height: "100%" }}>
      <div style={{ padding: "16px 20px 24px" }}>
        <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.22em", marginBottom: 8, color: T.inkMute }}>Account</div>
        <div className="serif" style={{ fontSize: 42, lineHeight: 1.02, marginBottom: 24, color: T.ink }}>Your library</div>

        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 24, padding: 16, borderRadius: 16, background: T.card, border: `1px solid ${T.lineSoft}` }}>
          <div style={{ width: 48, height: 48, borderRadius: "50%", background: T.ink, color: T.paper, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <IconUser size={20} />
          </div>
          <div>
            <div style={{ fontWeight: 500, color: T.ink }}>You</div>
            <div className="mono" style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em", color: T.inkMute, marginTop: 2 }}>Building your digital legacy</div>
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 }}>
          <div style={{ padding: 16, borderRadius: 16, background: T.card, border: `1px solid ${T.lineSoft}` }}>
            <div className="serif" style={{ fontSize: 40, lineHeight: 1, color: T.ink }}>{itemCount}</div>
            <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 8, color: T.inkMute }}>Items saved</div>
          </div>
          <div style={{ padding: 16, borderRadius: 16, background: T.card, border: `1px solid ${T.lineSoft}` }}>
            <div className="serif" style={{ fontSize: 40, lineHeight: 1, color: T.ink }}>{folderCount}</div>
            <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 8, color: T.inkMute }}>Folders</div>
          </div>
        </div>

        <div className="mono" style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.22em", marginBottom: 8, padding: "0 4px", color: T.inkMute }}>Storage</div>
        <div style={{ padding: 16, borderRadius: 16, marginBottom: 16, background: T.card, border: `1px solid ${T.lineSoft}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
            <div style={{ fontSize: 14, color: T.ink }}>Local device</div>
            <div className="mono" style={{ fontSize: 12, color: T.inkSoft }}>saved</div>
          </div>
          <div style={{ fontSize: 11.5, color: T.inkSoft }}>Your library, uploaded files, and image previews persist on this device. Clearing browser data will erase it.</div>
        </div>

        <div style={{ padding: 16, borderRadius: 16, marginBottom: 16, background: T.card, border: `1px solid ${T.lineSoft}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, marginBottom: 8 }}>
            <div style={{ fontSize: 14, color: T.ink }}>Backup</div>
            <div className="mono" style={{ fontSize: 12, color: T.inkSoft }}>json</div>
          </div>
          <div style={{ fontSize: 11.5, lineHeight: 1.5, color: T.inkSoft }}>
            Export your folders, saves, and uploaded files to a backup file, then restore that file later on any device running SAVI.
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 14 }}>
            <button onClick={handleExport} disabled={isExporting} style={{ padding: 12, borderRadius: 12, fontSize: 12, fontWeight: 500, background: T.ink, color: T.paper, opacity: isExporting ? 0.65 : 1 }}>
              {isExporting ? "Packing backup..." : "Download backup"}
            </button>
            <button onClick={openImportPicker} disabled={isImporting} style={{ padding: 12, borderRadius: 12, fontSize: 12, fontWeight: 500, background: T.paperDim, color: T.ink, border: `1px solid ${T.lineSoft}`, opacity: isImporting ? 0.5 : 1 }}>
              {isImporting ? "Restoring..." : "Restore backup"}
            </button>
          </div>
          <input ref={fileInputRef} type="file" accept="application/json,.json" onChange={handleImport} className="sr-only" />
          {backupMessage && (
            <div style={{ marginTop: 12, fontSize: 11.5, color: backupMessageColor }}>
              {backupMessage}
            </div>
          )}
        </div>

        <div style={{ marginBottom: 24, padding: 16, borderRadius: 16, background: "#FFF6F2", border: "1px solid rgba(200,85,61,0.18)" }}>
          <div className="mono" style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6, color: T.accent }}>Danger zone</div>
          <div style={{ fontSize: 12.5, lineHeight: 1.5, color: T.inkSoft, marginBottom: 12 }}>
            Delete everything on this device, including your saved items, custom folders, uploaded files, onboarding state, and local settings.
          </div>
          <button onClick={openDeleteModal} style={{ width: "100%", padding: 13, borderRadius: 12, fontSize: 12.5, fontWeight: 700, background: "linear-gradient(180deg, #D45745 0%, #B83428 100%)", color: T.paper, border: "1px solid rgba(120,20,16,0.22)", boxShadow: "0 18px 28px -22px rgba(184,52,40,0.65)" }}>
            Delete Everything
          </button>
        </div>

        <div style={{ padding: 16, borderRadius: 16, background: T.paperDim, border: `1px solid ${T.lineSoft}` }}>
          <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4, color: T.accent }}>Prototype</div>
          <div style={{ fontSize: 12, lineHeight: 1.5, color: T.inkSoft, marginBottom: 12 }}>Web version of SAVI. The native iOS app would add the Share Extension, cross-device sync, and system gestures.</div>
          <div style={{ display: "grid", gap: 10 }}>
            <button onClick={requestClearDemo} style={{ width: "100%", padding: 12, borderRadius: 12, fontSize: 12.5, fontWeight: 600, background: T.card, color: T.ink, border: `1px solid ${T.lineSoft}`, boxShadow: "0 12px 20px -18px rgba(22,26,35,0.3)" }}>
              Clear Demo Content
            </button>
            <button onClick={resetPrototype} style={{ width: "100%", padding: 12, borderRadius: 12, fontSize: 12.5, fontWeight: 600, background: T.paperDim, color: T.inkSoft, border: `1px solid ${T.lineSoft}` }}>
              Reset Prototype
            </button>
          </div>
        </div>
      </div>
      {showDeleteModal && (
        <div className="anim-fade" style={{ position: "fixed", inset: 0, zIndex: 9999, display: "flex", alignItems: "flex-end", justifyContent: "center", background: "rgba(20, 18, 24, 0.45)" }} onClick={closeDeleteModal}>
          <div className="anim-sheet" style={{ width: "100%", borderRadius: "28px 28px 0 0", background: T.paper, padding: "14px 20px calc(120px + env(safe-area-inset-bottom))", boxShadow: "0 -18px 40px -26px rgba(20,18,24,0.55)" }} onClick={(event) => event.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
              <div style={{ width: 40, height: 5, borderRadius: 999, background: T.line }} />
            </div>
            <div style={{ width: 54, height: 54, borderRadius: 18, background: "rgba(212,87,69,0.14)", color: "#B83428", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 14 }}>
              <IconTrash size={22} />
            </div>
            <div className="serif" style={{ fontSize: 29, lineHeight: 1.04, color: T.ink, marginBottom: 10 }}>
              {deleteStep === 1 ? "Are you sure?" : "Last chance - delete everything?"}
            </div>
            <div style={{ fontSize: 13, lineHeight: 1.55, color: T.inkSoft, marginBottom: 14 }}>
              {deleteStep === 1
                ? "This removes all saved content."
                : "Last chance. This will permanently delete all your saved items, folders, uploads, and local settings."}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <button onClick={closeDeleteModal} disabled={isDeletingEverything} style={{ padding: 13, borderRadius: 14, fontSize: 13, fontWeight: 600, background: T.paperDim, color: T.ink, border: `1px solid ${T.lineSoft}`, opacity: isDeletingEverything ? 0.55 : 1 }}>
                Cancel
              </button>
              <button onClick={deleteStep === 1 ? advanceDeleteStep : confirmDeleteEverything} disabled={isDeletingEverything} style={{ padding: 13, borderRadius: 14, fontSize: 13, fontWeight: 700, background: "linear-gradient(180deg, #D45745 0%, #B83428 100%)", color: T.paper, opacity: isDeletingEverything ? 0.6 : 1 }}>
                {isDeletingEverything ? "Deleting..." : deleteStep === 1 ? "Yes Delete" : "Delete Everything"}
              </button>
            </div>
          </div>
        </div>
      )}
      {showClearDemoModal && (
        <div className="anim-fade" style={{ position: "fixed", inset: 0, zIndex: 9998, display: "flex", alignItems: "flex-end", justifyContent: "center", background: "rgba(20, 18, 24, 0.42)" }} onClick={closeClearDemoModal}>
          <div className="anim-sheet" style={{ width: "100%", borderRadius: "28px 28px 0 0", background: T.paper, padding: "14px 20px calc(120px + env(safe-area-inset-bottom))", boxShadow: "0 -18px 40px -26px rgba(20,18,24,0.55)" }} onClick={(event) => event.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
              <div style={{ width: 40, height: 5, borderRadius: 999, background: T.line }} />
            </div>
            <div className="serif" style={{ fontSize: 28, lineHeight: 1.05, color: T.ink, marginBottom: 10 }}>Clear demo content?</div>
            <div style={{ fontSize: 13, lineHeight: 1.55, color: T.inkSoft, marginBottom: 16 }}>
              Remove all preview content and start fresh?
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <button onClick={closeClearDemoModal} disabled={isClearingDemo} style={{ padding: 13, borderRadius: 14, fontSize: 13, fontWeight: 600, background: T.paperDim, color: T.ink, border: `1px solid ${T.lineSoft}`, opacity: isClearingDemo ? 0.55 : 1 }}>
                Cancel
              </button>
              <button onClick={confirmClearDemo} disabled={isClearingDemo} style={{ padding: 13, borderRadius: 14, fontSize: 13, fontWeight: 700, background: T.ink, color: T.paper, opacity: isClearingDemo ? 0.6 : 1 }}>
                {isClearingDemo ? "Clearing..." : "Clear"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TabBar({ route, setRoute, onSavePress }) {
  const TabButton = ({ active, onClick, IconComp, label, disabled }) => (
    <button onClick={onClick} disabled={disabled} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "4px 0", color: active ? T.ink : disabled ? T.lineSoft : T.inkMute }}>
      <IconComp size={17} stroke={active ? 2.2 : 1.7} />
      <span className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>{label}</span>
    </button>
  );

  return (
    <div style={{ position: "relative", background: T.paper, flexShrink: 0 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-around", padding: `8px 24px calc(24px + env(safe-area-inset-bottom))`, borderTop: `1px solid ${T.lineSoft}`, background: `${T.paper}f5`, backdropFilter: "blur(12px)" }}>
        <TabButton active={route === "home"} onClick={()=>setRoute("home")} IconComp={IconHome} label="Home" />
        <TabButton active={route === "search"} onClick={()=>setRoute("search")} IconComp={IconSearch} label="Search" />
        <button aria-label="Add a new save" onClick={onSavePress} style={{ width: 52, height: 52, borderRadius: 18, background: T.ink, color: T.paper, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 8px 20px -6px rgba(28,26,23,0.35)" }}>
          <IconPlus size={20} stroke={2.2} />
        </button>
        <TabButton active={route === "folders"} onClick={()=>setRoute("folders")} IconComp={IconGrid} label="Folders" />
        <TabButton active={route === "profile"} onClick={()=>setRoute("profile")} IconComp={IconUser} label="Profile" />
      </div>
      <div style={{ position: "absolute", bottom: "calc(6px + env(safe-area-inset-bottom))", left: "50%", transform: "translateX(-50%)", width: 120, height: 5, borderRadius: 999, background: T.ink, opacity: 0.85 }} />
    </div>
  );
}

function SaveSheet({ initialUrl, prefillFromClipboard = false, autoAnalyzeInitial = true, folders, onClose, onSave }) {
  const [step, setStep] = useState(1);
  const [inputMode, setInputMode] = useState("link");
  const [url, setUrl] = useState(initialUrl || "");
  const [textBody, setTextBody] = useState("");
  const [source, setSource] = useState("");
  const [title, setTitle] = useState("");
  const [description, setDescription] = useState("");
  const [folderId, setFolderId] = useState(folders.find(f => f.id === "f-random")?.id || folders.find(f => f.id === "f-must-see")?.id || folders.find(f => !f.system)?.id || "f-random");
  const [tags, setTags] = useState("");
  const [type, setType] = useState("article");
  const [thumbnail, setThumbnail] = useState("");
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [isSaving, setIsSaving] = useState(false);
  const [analysisNote, setAnalysisNote] = useState("");
  const [clipboardNote, setClipboardNote] = useState("");
  const [keyboardInset, setKeyboardInset] = useState(0);
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [selectedFile, setSelectedFile] = useState(null);
  const [dragActive, setDragActive] = useState(false);
  const sheetRef = useRef(null);
  const scrollRef = useRef(null);
  const advancedRef = useRef(null);
  const urlInputRef = useRef(null);
  const fileInputRef = useRef(null);
  const autoAnalyzeTimerRef = useRef(null);
  const lastAutoSubmittedRef = useRef("");
  const analyzeRequestRef = useRef(0);
  const clipboardAttemptedRef = useRef(false);

  const isTextEntry = (node) => node && (node.tagName === "INPUT" || node.tagName === "TEXTAREA" || node.isContentEditable);

  const ensureVisible = (node, behavior = "smooth") => {
    if (!node || !scrollRef.current) return;
    window.requestAnimationFrame(() => {
      node.scrollIntoView({ block: "center", behavior });
    });
  };

  const cancelAnalyze = () => {
    analyzeRequestRef.current += 1;
    if (autoAnalyzeTimerRef.current) window.clearTimeout(autoAnalyzeTimerRef.current);
    setIsAnalyzing(false);
  };
  const hasDraft = Boolean(selectedFile || url.trim() || textBody.trim() || title.trim() || description.trim() || tags.trim() || thumbnail || step === 2);
  const requestClose = () => {
    if (isSaving) return;
    if (hasDraft && !confirm("Discard this draft?")) return;
    onClose();
  };

  const fillFromClipboard = async ({ auto = false } = {}) => {
    if (!navigator.clipboard?.readText) {
      if (!auto) setClipboardNote("Clipboard paste isn't available in this browser.");
      return false;
    }

    try {
      const rawText = (await navigator.clipboard.readText()).trim();
      if (!rawText) {
        if (!auto) setClipboardNote("Your clipboard looks empty right now.");
        return false;
      }

      const normalized = normalizeUrl(rawText);
      setClipboardNote(auto ? "Pulled the latest thing from your clipboard." : "Pasted from your clipboard.");
      setUrl(rawText);

      if (hostFromUrl(normalized)) {
        analyze(rawText);
      }
      return true;
    } catch {
      if (!auto) setClipboardNote("iOS blocked clipboard access here. Paste once manually and SAVI will keep going.");
      return false;
    }
  };

  const switchMode = (nextMode) => {
    if (nextMode === inputMode) return;
    cancelAnalyze();
    setInputMode(nextMode);
    setStep(1);
    setAnalysisNote("");
    setClipboardNote("");
    setShowAdvanced(false);
    if (nextMode === "link") {
      setSelectedFile(null);
      setThumbnail("");
      setSource("");
      setType("article");
      setTextBody("");
      if (fileInputRef.current) fileInputRef.current.value = "";
      window.setTimeout(() => {
        urlInputRef.current?.focus({ preventScroll: true });
      }, 90);
    } else if (nextMode === "text") {
      cancelAnalyze();
      setSelectedFile(null);
      setUrl("");
      setThumbnail("");
      setSource("Paste");
      setType("text");
      setFolderId(folders.find((f) => f.id === "f-paste-bin")?.id || folders.find((f) => f.id === "f-random")?.id || folders.find((f) => !f.system)?.id || "f-random");
      if (fileInputRef.current) fileInputRef.current.value = "";
    } else {
      setTextBody("");
      setSource("Device");
      setType("file");
    }
  };

  const analyze = async (nextUrl = url) => {
    const normalized = normalizeUrl(nextUrl);
    if (!normalized || !hostFromUrl(normalized) || isAnalyzing) return;
    setInputMode("link");
    const requestId = ++analyzeRequestRef.current;

    setIsAnalyzing(true);
    setAnalysisNote("");
    setShowAdvanced(false);
    lastAutoSubmittedRef.current = normalized;

    try {
      const metadata = await fetchLinkMetadata(normalized, folders);
      if (requestId !== analyzeRequestRef.current) return;
      const fallbackDomain = domainGuess(normalized);
      const resolvedTitle = metadata.title || `Saved from ${fallbackDomain}`;
      const resolvedDescription = metadata.description || "Add your own notes about this save.";
      const resolvedTags = dedupe([...(metadata.tags || []), fallbackDomain]).join(", ");

      setUrl(normalized);
      setTitle(resolvedTitle);
      setDescription(resolvedDescription);
      setSource(metadata.source || sourceProfileForValue(normalized, metadata.source || "").label);
      setType(metadata.type || "article");
      setThumbnail(metadata.thumbnail || "");
      if (metadata.folderId) setFolderId(metadata.folderId);
      setTags(resolvedTags);
      setStep(2);
      setAnalysisNote(metadata.success ? "Metadata pulled from the link and folder selected automatically." : "Limited metadata was available, so some fields were guessed.");
    } catch (error) {
      if (requestId !== analyzeRequestRef.current) return;
      const fallbackDomain = domainGuess(normalized);
      setUrl(normalized);
      setSource(sourceProfileForValue(normalized).label);
      setTitle(`Saved from ${fallbackDomain}`);
      setDescription("Add your own notes about this save.");
      setTags(fallbackDomain);
      setType(inferTypeFromUrl(normalized));
      setThumbnail("");
      setStep(2);
      setAnalysisNote("Couldn't fetch rich metadata for this link, so SAVI filled what it could.");
    } finally {
      if (requestId === analyzeRequestRef.current) setIsAnalyzing(false);
    }
  };

  const analyzeFile = async (file) => {
    if (!file || isAnalyzing) return;
    const requestId = ++analyzeRequestRef.current;
    setInputMode("file");
    setSelectedFile(file);
    setIsAnalyzing(true);
    setAnalysisNote("");
    setShowAdvanced(false);

    try {
      const metadata = await extractFileMetadata(file, folders);
      if (requestId !== analyzeRequestRef.current) return;
      setTitle(metadata.title);
      setDescription(metadata.description);
      setSource(metadata.source || "Device");
      setType(metadata.type || "file");
      setThumbnail(metadata.thumbnail || "");
      if (metadata.folderId) setFolderId(metadata.folderId);
      setTags((metadata.tags || []).join(", "));
      setStep(2);
      setAnalysisNote(metadata.thumbnail ? "Preview built from your file and folder selected automatically." : "SAVI read the file details and picked the closest folder automatically.");
    } catch {
      if (requestId !== analyzeRequestRef.current) return;
      setTitle(titleFromFilename(file.name));
      setDescription(`${describeFileKind(file)} from your device • ${formatBytes(file.size)}`);
      setSource("Device");
      setType(inferTypeFromFile(file));
      setThumbnail("");
      setTags(dedupe(["upload", fileExtensionFromName(file.name)]).join(", "));
      setStep(2);
      setAnalysisNote("SAVI couldn't read rich metadata from that file, so it saved the essentials instead.");
    } finally {
      if (requestId === analyzeRequestRef.current) setIsAnalyzing(false);
    }
  };

  useEffect(() => {
    if (initialUrl) {
      setInputMode("link");
      setUrl(initialUrl);
      setSource(sourceProfileForValue(initialUrl).label);
      if (autoAnalyzeInitial) {
        analyze(initialUrl);
      } else {
        setClipboardNote("Pulled a link from your clipboard.");
      }
    }
  }, [initialUrl, autoAnalyzeInitial]);

  useEffect(() => {
    if (!prefillFromClipboard || clipboardAttemptedRef.current || initialUrl || inputMode !== "link") return;
    clipboardAttemptedRef.current = true;
    fillFromClipboard({ auto: true });
  }, [prefillFromClipboard, initialUrl, inputMode]);

  useEffect(() => {
    if (!showAdvanced) return;
    window.setTimeout(() => ensureVisible(advancedRef.current), 120);
  }, [showAdvanced]);

  useEffect(() => {
    if (inputMode !== "link" || step !== 1 || initialUrl || isAnalyzing) return;
    const normalized = normalizeUrl(url);
    if (!normalized || !hostFromUrl(normalized) || normalized === lastAutoSubmittedRef.current) return;

    autoAnalyzeTimerRef.current = window.setTimeout(() => {
      analyze(normalized);
    }, 420);

    return () => {
      if (autoAnalyzeTimerRef.current) window.clearTimeout(autoAnalyzeTimerRef.current);
    };
  }, [url, step, initialUrl, isAnalyzing, inputMode]);

  useEffect(() => {
    if (inputMode !== "link" || step !== 1 || initialUrl) return;
    const timer = window.setTimeout(() => {
      const input = urlInputRef.current;
      if (!input) return;
      input.focus({ preventScroll: true });
      ensureVisible(input, "auto");
    }, 140);
    return () => window.clearTimeout(timer);
  }, [step, initialUrl, inputMode]);

  useEffect(() => {
    const viewport = window.visualViewport;
    if (!viewport) return;

    const updateKeyboardInset = () => {
      const nextInset = Math.max(0, Math.round(window.innerHeight - (viewport.height + viewport.offsetTop)));
      setKeyboardInset(nextInset);
      const active = document.activeElement;
      if (sheetRef.current?.contains(active) && isTextEntry(active)) {
        window.setTimeout(() => ensureVisible(active), 90);
      }
    };

    updateKeyboardInset();
    viewport.addEventListener("resize", updateKeyboardInset);
    viewport.addEventListener("scroll", updateKeyboardInset);
    window.addEventListener("orientationchange", updateKeyboardInset);

    return () => {
      viewport.removeEventListener("resize", updateKeyboardInset);
      viewport.removeEventListener("scroll", updateKeyboardInset);
      window.removeEventListener("orientationchange", updateKeyboardInset);
    };
  }, []);

  const handleFocusCapture = (event) => {
    if (!isTextEntry(event.target)) return;
    window.setTimeout(() => ensureVisible(event.target), 120);
  };

  const submit = async () => {
    if (isSaving) return;
    const folder = folders.find(f => f.id === folderId);
    const nextTags = tags.split(",").map(t => t.trim()).filter(Boolean);
    setIsSaving(true);
    try {
      if (inputMode === "file" && selectedFile) {
        await onSave({
          title: title.trim() || titleFromFilename(selectedFile.name),
          description: description.trim() || `${describeFileKind(selectedFile)} from your device • ${formatBytes(selectedFile.size)}`,
          url: "",
          source: "device",
          type: type || inferTypeFromFile(selectedFile),
          folderId,
          tags: nextTags,
          color: folder?.color || T.accent,
          thumbnail,
          assetFile: selectedFile,
          assetName: selectedFile.name,
          assetMime: selectedFile.type || "application/octet-stream",
          assetSize: selectedFile.size || 0,
        });
        return;
      }

      if (inputMode === "text") {
        const textDraft = deriveTextSaveDraft(textBody, folders);
        await onSave({
          title: title.trim() || textDraft.title,
          description: description.trim() || textDraft.description,
          url: "",
          source: "Paste",
          type: "text",
          folderId,
          tags: nextTags.length ? nextTags : textDraft.tags,
          color: folder?.color || T.accent,
          thumbnail: "",
        });
        return;
      }

      await onSave({
        title: title.trim() || "Untitled save",
        description: description.trim(),
        url: normalizeUrl(url.trim()),
        source: source || sourceProfileForValue(url.trim(), hostFromUrl(url.trim()) || "manual").label,
        type,
        folderId,
        tags: nextTags,
        color: folder?.color || T.accent,
        thumbnail,
      });
    } finally {
      setIsSaving(false);
    }
  };

  const handlePaste = () => {
    setClipboardNote("Pasted from your clipboard.");
    window.setTimeout(() => {
      const pastedValue = urlInputRef.current?.value || "";
      const normalized = normalizeUrl(pastedValue);
      if (!normalized || !hostFromUrl(normalized) || normalized === lastAutoSubmittedRef.current) return;
      analyze(normalized);
    }, 30);
  };

  const clearUrlInput = () => {
    cancelAnalyze();
    lastAutoSubmittedRef.current = "";
    setUrl("");
    setSource("");
    setAnalysisNote("");
    setClipboardNote("");
    setStep(1);
    window.setTimeout(() => {
      urlInputRef.current?.focus({ preventScroll: true });
    }, 20);
  };

  const openFilePicker = () => {
    fileInputRef.current?.click();
  };

  const clearSelectedFile = () => {
    cancelAnalyze();
    setSelectedFile(null);
    setThumbnail("");
    setSource("");
    setTitle("");
    setDescription("");
    setTags("");
    setAnalysisNote("");
    setClipboardNote("");
    setStep(1);
    setShowAdvanced(false);
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  const clearTextInput = () => {
    cancelAnalyze();
    setTextBody("");
    setSource("Paste");
    setTitle("");
    setDescription("");
    setTags("");
    setThumbnail("");
    setAnalysisNote("");
    setClipboardNote("");
    setStep(1);
    setShowAdvanced(false);
  };

  const prepareTextDraft = () => {
    const normalized = textBody.trim();
    if (!normalized) return;
    const draft = deriveTextSaveDraft(normalized, folders);
    setTitle(draft.title);
    setDescription(draft.description);
    setSource(draft.source);
    setType(draft.type);
    if (draft.folderId) setFolderId(draft.folderId);
    setTags(draft.tags.join(", "));
    setThumbnail("");
    setStep(2);
    setAnalysisNote(draft.folderId === "f-private-vault"
      ? "SAVI spotted something sensitive and nudged it into Private Vault."
      : "SAVI turned that paste into a simple text save. Rename it or move it if you want.");
  };

  const handleFileChange = (event) => {
    const file = event.target.files?.[0];
    event.target.value = "";
    if (!file) return;
    analyzeFile(file);
  };

  const handleDrop = (event) => {
    event.preventDefault();
    setDragActive(false);
    const file = event.dataTransfer?.files?.[0];
    if (!file) return;
    analyzeFile(file);
  };

  const activeFolder = folders.find(f => f.id === folderId);
  const privateVaultFolder = folders.find(f => f.id === "f-private-vault");
  const activeSourceProfile = inputMode === "file" ? sourceProfileForValue("device", source || "device") : inputMode === "text" ? sourceProfileForValue("paste", source || "paste") : sourceProfileForValue(url, source || "");
  const loadingTitle = inputMode === "file" ? "Reading your file, preview, and folder" : "Pulling your title, description, and tags";
  const loadingBody = inputMode === "file"
    ? "SAVI is checking the file name, type, and preview so it can sort this into the right folder for you."
    : "Wizard hands at work on the metadata. If the paste looked wrong, tap the x and try again.";

  return (
    <div className="anim-fade" style={{ position: "absolute", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end", background: "rgba(28,26,23,0.45)", paddingBottom: keyboardInset, transition: "padding-bottom 180ms ease" }} onClick={requestClose}>
      <div ref={sheetRef} className="anim-sheet" style={{ borderRadius: "28px 28px 0 0", overflow: "hidden", display: "flex", flexDirection: "column", background: T.paper, maxHeight: keyboardInset ? `calc(100% - ${keyboardInset + 8}px)` : "85%", transition: "max-height 180ms ease" }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding: "12px 0 4px", display: "flex", justifyContent: "center", flexShrink: 0 }}><div style={{ width: 36, height: 4, borderRadius: 999, background: T.line }} /></div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px", flexShrink: 0 }}>
          <button onClick={step === 1 ? requestClose : () => setStep(1)} style={{ fontSize: 14, color: T.inkSoft }}>{step === 1 ? "Cancel" : "Back"}</button>
          <div className="serif" style={{ fontSize: 18, color: T.ink }}>{step === 1 ? "New save" : "Review"}</div>
          {step === 1 ? (
            <div className="mono" style={{ fontSize: 10, color: T.inkMute }}>{step}/2</div>
          ) : (
            <button onClick={submit} disabled={isSaving} style={{ padding: "9px 14px", borderRadius: 999, fontSize: 12, fontWeight: 600, background: T.ink, color: T.paper, opacity: isSaving ? 0.65 : 1 }}>
              {isSaving ? "Saving..." : "Save"}
            </button>
          )}
        </div>

        <div ref={scrollRef} className="scroll" style={{ padding: "0 20px 20px" }} onFocusCapture={handleFocusCapture}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, minmax(0, 1fr))", gap: 8, marginBottom: 8 }}>
            {[
              { id: "link", label: "Link", icon: <IconLink size={14} /> },
              { id: "text", label: "Text", icon: <IconClipboard size={14} /> },
              { id: "file", label: "File", icon: <IconFile size={14} /> },
            ].map(option => (
              <button key={option.id} onClick={() => switchMode(option.id)} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "11px 12px", borderRadius: 12, background: inputMode === option.id ? T.ink : T.paperDim, color: inputMode === option.id ? T.paper : T.inkSoft, border: `1px solid ${inputMode === option.id ? T.ink : T.lineSoft}` }}>
                {option.icon}
                <span className="mono" style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em" }}>{option.label}</span>
              </button>
            ))}
          </div>
          {step === 1 ? (
            <div style={{ padding: "12px 0" }}>
              {inputMode === "link" ? (
                <>
                  <Label>Paste URL</Label>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ position: "relative", flex: 1 }}>
                      <input aria-label="Paste a URL to save" ref={urlInputRef} value={url} onChange={e=>setUrl(e.target.value)} onPaste={handlePaste} onKeyDown={e=>e.key==="Enter" && !isAnalyzing && analyze()} placeholder="https://..." style={{ width: "100%", borderRadius: 12, padding: url ? "12px 54px 12px 14px" : "12px 14px", fontSize: 14, background: T.card, border: `1px solid ${T.lineSoft}`, color: T.ink }} />
                      {url && (
                        <button onClick={clearUrlInput} aria-label="Clear pasted link" style={{ position: "absolute", top: "50%", right: 10, transform: "translateY(-50%)", width: 34, height: 34, borderRadius: 999, background: T.paperDim, color: T.inkSoft, display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${T.lineSoft}` }}>
                          <IconX size={12} />
                        </button>
                      )}
                    </div>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, marginTop: 10 }}>
                    <button onClick={() => fillFromClipboard()} style={{ padding: "9px 12px", borderRadius: 999, fontSize: 11, fontWeight: 600, background: T.card, color: T.ink, border: `1px solid ${T.lineSoft}` }}>
                      Use clipboard
                    </button>
                    {clipboardNote && (
                      <div className="mono" style={{ flex: 1, textAlign: "right", fontSize: 10, color: T.inkMute }}>
                        {clipboardNote}
                      </div>
                    )}
                  </div>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 8, marginTop: 16, fontSize: 11.5, padding: 12, borderRadius: 12, background: T.paperDim, border: `1px solid ${T.lineSoft}`, color: T.inkSoft }}>
                    <div style={{ color: T.accent, flexShrink: 0, marginTop: 2 }}><IconSparkles size={13} /></div>
                    <span>Tap plus and SAVI will try your clipboard first, then keep going automatically once it sees a real link.</span>
                  </div>
                </>
              ) : inputMode === "text" ? (
                <>
                  <Label>Paste plain text</Label>
                  <div style={{ position: "relative" }}>
                    <textarea aria-label="Paste plain text to save" value={textBody} onChange={e=>setTextBody(e.target.value)} placeholder="Paste an API key, note, snippet, address, copied garbage, whatever future-you might need..." rows={8} style={{ ...inputStyle(), minHeight: 190, resize: "vertical", paddingRight: textBody ? 42 : 12 }} />
                    {textBody && (
                      <button onClick={clearTextInput} aria-label="Clear pasted text" style={{ position: "absolute", top: 10, right: 10, width: 30, height: 30, borderRadius: 999, background: T.paperDim, color: T.inkSoft, display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${T.lineSoft}` }}>
                        <IconX size={12} />
                      </button>
                    )}
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, marginTop: 10 }}>
                    <button onClick={async () => {
                      if (!navigator.clipboard?.readText) return;
                      try {
                        const rawText = await navigator.clipboard.readText();
                        if (rawText) {
                          setTextBody(rawText);
                          setClipboardNote("Pasted plain text from your clipboard.");
                        }
                      } catch {
                        setClipboardNote("Clipboard paste is blocked here. Long-press and paste manually.");
                      }
                    }} style={{ padding: "9px 12px", borderRadius: 999, fontSize: 11, fontWeight: 600, background: T.card, color: T.ink, border: `1px solid ${T.lineSoft}` }}>
                      Paste clipboard
                    </button>
                    {clipboardNote && (
                      <div className="mono" style={{ flex: 1, textAlign: "right", fontSize: 10, color: T.inkMute }}>
                        {clipboardNote}
                      </div>
                    )}
                  </div>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 8, marginTop: 16, fontSize: 11.5, padding: 12, borderRadius: 12, background: T.paperDim, border: `1px solid ${T.lineSoft}`, color: T.inkSoft }}>
                    <div style={{ color: T.accent, flexShrink: 0, marginTop: 2 }}><IconClipboard size={13} /></div>
                    <span>Perfect for API keys, shipping notes, copied addresses, scraps of text, or random junk you need later. SAVI will default these into Paste Bin unless it looks sensitive.</span>
                  </div>
                </>
              ) : (
                <>
                  <Label>Add file or photo</Label>
                  <input ref={fileInputRef} type="file" onChange={handleFileChange} className="sr-only" />
                  <div
                    onDragEnter={(event) => { event.preventDefault(); setDragActive(true); }}
                    onDragOver={(event) => { event.preventDefault(); setDragActive(true); }}
                    onDragLeave={(event) => { event.preventDefault(); setDragActive(false); }}
                    onDrop={handleDrop}
                    style={{ padding: 18, borderRadius: 18, border: `1px dashed ${dragActive ? T.ink : T.line}`, background: dragActive ? T.paperDim : T.card, transition: "background 120ms ease, border-color 120ms ease" }}
                  >
                    <div style={{ width: 44, height: 44, borderRadius: 14, background: T.paperDim, color: T.ink, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 14 }}>
                      <IconUpload size={18} />

function FolderSheet({ folder, onClose, onSave }) {
  const [name, setName] = useState(folder?.name || "");
  const [color, setColor] = useState(folder?.color || FOLDER_COLORS[0]);
  const [image, setImage] = useState(folder?.image || "");
  const [imageUrl, setImageUrl] = useState("");
  const [imageNote, setImageNote] = useState("");
  const [isReadingImage, setIsReadingImage] = useState(false);
  const [keyboardInset, setKeyboardInset] = useState(0);
  const imageInputRef = useRef(null);
  const sheetRef = useRef(null);
  const scrollRef = useRef(null);
  const activePreset = PRESET_FOLDER_COVERS.find((cover) => cover.image === image);
  const coverLabel = image ? (activePreset ? `${activePreset.name} motion cover` : "Custom cover") : "Solid color";
  const initialName = folder?.name || "";
  const initialColor = folder?.color || FOLDER_COLORS[0];
  const initialImage = folder?.image || "";
  const hasDraft = name.trim() !== initialName.trim() || color !== initialColor || image !== initialImage;

  const ensureVisible = (node, behavior = "smooth") => {
    if (!node || !scrollRef.current) return;
    window.requestAnimationFrame(() => {
      node.scrollIntoView({ block: "center", behavior });
    });
  };

  const requestClose = () => {
    if (hasDraft && !confirm("Discard these folder changes?")) return;
    onClose();
  };

  useEffect(() => {
    const viewport = window.visualViewport;
    if (!viewport) return;

    const updateKeyboardInset = () => {
      const nextInset = Math.max(0, Math.round(window.innerHeight - (viewport.height + viewport.offsetTop)));
      setKeyboardInset(nextInset);
      const active = document.activeElement;
      if (sheetRef.current?.contains(active) && (active?.tagName === "INPUT" || active?.tagName === "TEXTAREA" || active?.isContentEditable)) {
        window.setTimeout(() => ensureVisible(active), 90);
      }
    };

    updateKeyboardInset();
    viewport.addEventListener("resize", updateKeyboardInset);
    viewport.addEventListener("scroll", updateKeyboardInset);
    window.addEventListener("orientationchange", updateKeyboardInset);

    return () => {
      viewport.removeEventListener("resize", updateKeyboardInset);
      viewport.removeEventListener("scroll", updateKeyboardInset);
      window.removeEventListener("orientationchange", updateKeyboardInset);
    };
  }, []);

  const handleFocusCapture = (event) => {
    const node = event.target;
    if (!node || (node.tagName !== "INPUT" && node.tagName !== "TEXTAREA" && !node.isContentEditable)) return;
    window.setTimeout(() => ensureVisible(node), 120);
  };

  const openImagePicker = () => {
    imageInputRef.current?.click();
  };

  const handleImageChange = async (event) => {
    const file = event.target.files?.[0];
    event.target.value = "";
    if (!file) return;
    setIsReadingImage(true);
    try {
      const nextImage = await readFolderImage(file);
      setImage(nextImage);
      setImageUrl("");
      setImageNote("Cover image added.");
    } catch {
      setImageNote("Pick an image file for the folder cover.");
    } finally {
      setIsReadingImage(false);
    }
  };

  const handleImagePaste = async (event) => {
    const items = Array.from(event.clipboardData?.items || []);
    const imageItem = items.find(item => (item.type || "").startsWith("image/"));
    if (!imageItem) return;
    event.preventDefault();
    const file = imageItem.getAsFile();
    if (!file) return;
    setIsReadingImage(true);
    try {
      const nextImage = await readFolderImage(file);
      setImage(nextImage);
      setImageUrl("");
      setImageNote("Cover image pasted from your clipboard.");
    } catch {
      setImageNote("That pasted image couldn't be used.");
    } finally {
      setIsReadingImage(false);
    }
  };

  const clearImage = () => {
    setImage("");
    setImageUrl("");
    setImageNote("Cover image removed.");
  };

  const applyImageUrl = () => {
    const next = (imageUrl || "").trim();
    if (!next) {
      setImage("");
      setImageNote("Cover image removed.");
      return;
    }
    setImage(next);
    setImageNote("Cover image updated from pasted URL.");
  };

  return (
    <div className="anim-fade" style={{ position: "absolute", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end", background: "rgba(28,26,23,0.45)", paddingBottom: keyboardInset, transition: "padding-bottom 180ms ease" }} onClick={requestClose}>
      <div ref={sheetRef} className="anim-sheet" style={{ borderRadius: "28px 28px 0 0", overflow: "hidden", display: "flex", flexDirection: "column", background: T.paper, maxHeight: keyboardInset ? `calc(100% - ${keyboardInset + 8}px)` : "85%", transition: "max-height 180ms ease" }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding: "12px 0 4px", display: "flex", justifyContent: "center" }}><div style={{ width: 36, height: 4, borderRadius: 999, background: T.line }} /></div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px" }}>
          <button onClick={requestClose} style={{ fontSize: 14, color: T.inkSoft }}>Cancel</button>
          <div className="serif" style={{ fontSize: 18, color: T.ink }}>{folder ? "Edit folder" : "New folder"}</div>
          <div style={{ width: 48 }} />
        </div>
        <div ref={scrollRef} className="scroll" style={{ padding: "0 20px 32px", display: "flex", flexDirection: "column", gap: 16 }} onFocusCapture={handleFocusCapture}>
          <input ref={imageInputRef} type="file" accept="image/*" onChange={handleImageChange} className="sr-only" />
          <div style={{ borderRadius: 20, overflow: "hidden", minHeight: 146, background: image ? `center / cover no-repeat url(${image}), ${color}22` : `linear-gradient(160deg, ${color}26 0%, ${T.card} 100%)`, border: `1px solid ${T.lineSoft}`, position: "relative", boxShadow: "0 18px 30px -28px rgba(28,26,23,0.7)" }}>
            <div style={{ position: "absolute", inset: 0, background: image ? "linear-gradient(180deg, rgba(28,26,23,0.04) 0%, rgba(28,26,23,0.12) 34%, rgba(28,26,23,0.46) 100%)" : "none" }} />
            <div style={{ position: "relative", zIndex: 1, padding: 18, minHeight: 140, display: "flex", flexDirection: "column", justifyContent: "space-between" }}>
              <div>
                <div className="mono" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 10px", borderRadius: 999, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", background: image ? "rgba(255,255,255,0.18)" : "rgba(255,255,255,0.78)", color: image ? T.paper : T.inkSoft, border: image ? "1px solid rgba(255,255,255,0.16)" : `1px solid ${T.lineSoft}`, backdropFilter: "blur(10px)" }}>
                  <span style={{ width: 8, height: 8, borderRadius: 999, background: image ? "rgba(255,255,255,0.88)" : color }} />
                  {coverLabel}
                </div>
              </div>
              <div>
                <div className="serif" style={{ fontSize: 28, lineHeight: 1.05, color: image ? T.paper : T.ink }}>{name.trim() || "Folder cover"}</div>
                <div style={{ marginTop: 6, fontSize: 11.5, color: image ? "rgba(245,241,234,0.84)" : T.inkMute }}>
                  {image ? "Upload one, paste one, or pick a motion cover below." : "Start with color, then layer in a cover if you want."}
                </div>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={openImagePicker} style={{ flex: 1, padding: 12, borderRadius: 12, fontSize: 12, fontWeight: 600, background: T.ink, color: T.paper, opacity: isReadingImage ? 0.65 : 1 }}>
              {isReadingImage ? "Adding cover..." : image ? "Change cover image" : "Add cover image"}
            </button>
            {image && (
              <button onClick={clearImage} style={{ padding: "12px 14px", borderRadius: 12, fontSize: 12, fontWeight: 600, background: T.paperDim, color: T.inkSoft, border: `1px solid ${T.lineSoft}` }}>
                Clear
              </button>
            )}
          </div>
          <Field label="Paste image, GIF, or URL">
            <div style={{ display: "flex", gap: 8 }}>
              <input aria-label="Paste a folder cover image or GIF URL" value={imageUrl} onChange={e=>setImageUrl(e.target.value)} onPaste={handleImagePaste} placeholder="Paste an image, GIF, or URL" style={{ ...inputStyle(), flex: 1 }} />
              <button onClick={applyImageUrl} style={{ padding: "0 14px", borderRadius: 10, background: T.ink, color: T.paper, fontSize: 12, fontWeight: 600 }}>
                Use
              </button>
            </div>
          </Field>
          <Field label="Pick a motion cover">
            <div className="scroll" style={{ display: "flex", gap: 10, overflowX: "auto", overflowY: "hidden", margin: "0 -20px", padding: "0 20px 2px" }}>
              {PRESET_FOLDER_COVERS.map((cover) => {
                const active = image === cover.image;
                return (
                  <button key={cover.id} onClick={()=>{ setImage(cover.image); setImageUrl(""); setImageNote(`${cover.name} cover selected.`); }} style={{ flexShrink: 0, width: 132, textAlign: "left" }}>
                    <div style={{ height: 110, borderRadius: 14, overflow: "hidden", background: `center / cover no-repeat url(${cover.image}), ${T.paperDim}`, border: `2px solid ${active ? T.ink : T.lineSoft}` }} />
                    <div className="mono" style={{ marginTop: 8, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", color: active ? T.ink : T.inkMute }}>
                      {cover.name}
                    </div>
                  </button>
                );
              })}
            </div>
          </Field>
          {imageNote && (
            <div style={{ fontSize: 11.5, color: T.inkSoft }}>{imageNote}</div>
          )}
          <Field label="Name"><input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter" && name.trim() && onSave({ name: name.trim(), color, image })} placeholder="e.g. Travel ideas" style={inputStyle()} /></Field>
          <Field label="Color">
            <div style={{ display: "flex", gap: 8 }}>
              {FOLDER_COLORS.map(c => (
                <button aria-label={`Choose folder color ${c}`} key={c} onClick={()=>setColor(c)} style={{ width: 40, height: 40, borderRadius: 12, background: c, outline: color === c ? `2px solid ${T.ink}` : "none", outlineOffset: 2 }} />
              ))}
            </div>
          </Field>
          <button onClick={()=>name.trim() && onSave({ name: name.trim(), color, image })} disabled={!name.trim()} style={{ width: "100%", padding: 14, borderRadius: 12, fontSize: 15, fontWeight: 500, background: T.ink, color: T.paper, opacity: name.trim() ? 1 : 0.3 }}>{folder ? "Save changes" : "Create folder"}</button>
        </div>
      </div>
    </div>
  );
}

function ImageLightbox({ image, onClose }) {
  const [scale, setScale] = useState(1);
  const [offset, setOffset] = useState({ x: 0, y: 0 });
  const gestureRef = useRef({ mode: "", startScale: 1, startDistance: 0, startOffset: { x: 0, y: 0 }, startPoint: { x: 0, y: 0 } });

  const clampScale = (value) => Math.max(1, Math.min(4, value));

  const resetView = () => {
    setScale(1);
    setOffset({ x: 0, y: 0 });
  };

  useEffect(() => {
    const handleKeyDown = (event) => {
      if (event.key === "Escape") onClose();
    };
    window.addEventListener("keydown", handleKeyDown);
    return () => window.removeEventListener("keydown", handleKeyDown);
  }, [onClose]);

  useEffect(() => {
    resetView();
  }, [image?.src]);

  const handleTouchStart = (event) => {
    if (event.touches.length === 2) {
      const [a, b] = event.touches;
      gestureRef.current = {
        mode: "pinch",
        startScale: scale,
        startDistance: Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY),
        startOffset: offset,
        startPoint: { x: 0, y: 0 },
      };
    } else if (event.touches.length === 1 && scale > 1) {
      const touch = event.touches[0];
      gestureRef.current = {
        mode: "pan",
        startScale: scale,
        startDistance: 0,
        startOffset: offset,
        startPoint: { x: touch.clientX, y: touch.clientY },
      };
    }
  };

  const handleTouchMove = (event) => {
    if (gestureRef.current.mode === "pinch" && event.touches.length === 2) {
      event.preventDefault();
      const [a, b] = event.touches;
      const distance = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
      const nextScale = clampScale((distance / Math.max(1, gestureRef.current.startDistance)) * gestureRef.current.startScale);
      setScale(nextScale);
      if (nextScale === 1) setOffset({ x: 0, y: 0 });
      return;
    }
    if (gestureRef.current.mode === "pan" && event.touches.length === 1 && scale > 1) {
      event.preventDefault();
      const touch = event.touches[0];
      const deltaX = touch.clientX - gestureRef.current.startPoint.x;
      const deltaY = touch.clientY - gestureRef.current.startPoint.y;
      setOffset({
        x: gestureRef.current.startOffset.x + deltaX,
        y: gestureRef.current.startOffset.y + deltaY,
      });
    }
  };

  const handleTouchEnd = () => {
    gestureRef.current.mode = "";
    if (scale <= 1.02) resetView();
  };

  const handleWheel = (event) => {
    event.preventDefault();
    const delta = event.deltaY < 0 ? 0.2 : -0.2;
    setScale((current) => {
      const next = clampScale(current + delta);
      if (next === 1) setOffset({ x: 0, y: 0 });
      return next;
    });
  };

  const handleDoubleClick = () => {
    if (scale > 1) resetView();
    else setScale(2);
  };

  return (
    <div className="anim-fade" onClick={onClose} style={{ position: "absolute", inset: 0, zIndex: 90, background: "rgba(8,10,16,0.96)", display: "flex", alignItems: "center", justifyContent: "center", padding: "calc(18px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom))" }}>
      <button aria-label="Close image viewer" onClick={(event) => { event.stopPropagation(); onClose(); }} style={{ position: "absolute", top: "calc(18px + env(safe-area-inset-top))", right: 18, width: 42, height: 42, borderRadius: 999, background: "rgba(255,255,255,0.14)", color: T.paper, border: "1px solid rgba(255,255,255,0.12)", display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(14px)", zIndex: 2 }}>
        <IconX size={16} />
      </button>
      <div onClick={(event) => event.stopPropagation()} style={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12 }}>
        <div style={{ textAlign: "center", maxWidth: 320 }}>
          <div className="serif" style={{ fontSize: 22, color: T.paper, marginBottom: 4 }}>{image.title}</div>
          {!!image.subtitle && <div style={{ fontSize: 12.5, lineHeight: 1.45, color: "rgba(245,241,234,0.76)" }}>{image.subtitle}</div>}
        </div>
        <div
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={handleTouchEnd}
          onTouchCancel={handleTouchEnd}
          onWheel={handleWheel}
          onDoubleClick={handleDoubleClick}
          style={{ flex: 1, width: "100%", display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", touchAction: "none" }}
        >
          <img
            src={image.src}
            alt={image.title || ""}
            style={{
              maxWidth: "100%",
              maxHeight: "100%",
              objectFit: "contain",
              transform: `translate3d(${offset.x}px, ${offset.y}px, 0) scale(${scale})`,
              transformOrigin: "center center",
              transition: gestureRef.current.mode ? "none" : "transform 180ms ease",
              userSelect: "none",
              WebkitUserDrag: "none",
              cursor: scale > 1 ? "grab" : "zoom-in",
            }}
          />
        </div>
        <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: "rgba(245,241,234,0.62)" }}>
          Pinch to zoom
        </div>
      </div>
    </div>
  );
}

function ItemSheet({ item, folders, onClose, onDelete, onEdit, onShare, onOpenImage }) {
  const folder = folders.find(f => f.id === item.folderId);
  const sourceProfile = sourceProfileForItem(item);
  const sourceVisual = sourceVisualForProfile(sourceProfile);
  const [isOpeningAsset, setIsOpeningAsset] = useState(false);
  const [dragY, setDragY] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const hasLocalAsset = Boolean(item.assetId);
  const sheetScrollRef = useRef(null);
  const dragStartYRef = useRef(0);
  const dragStartXRef = useRef(0);
  const dragStartTimeRef = useRef(0);
  const dragLastYRef = useRef(0);
  const dragLastTimeRef = useRef(0);
  const dragActiveRef = useRef(false);

  const openAsset = async () => {
    if (!item.assetId || isOpeningAsset) return;
    if (item.type === "image" && onOpenImage) {
      onOpenImage(item);
      return;
    }
    setIsOpeningAsset(true);
    try {
      const asset = await getAssetRecord(item.assetId);
      if (!asset?.blob) {
        alert("That file isn't available on this device anymore. Restore a backup or upload it again.");
        return;
      }
      if (!isPreviewableAsset(item) && navigator.share && typeof File !== "undefined") {
        try {
          const shareFile = new File([asset.blob], item.assetName || asset.name || item.title, {
            type: item.assetMime || asset.type || asset.blob.type || "application/octet-stream",
          });
          if (!navigator.canShare || navigator.canShare({ files: [shareFile] })) {
            await navigator.share({
              title: item.title,
              text: item.description || item.title,
              files: [shareFile],
            });
            return;
          }
        } catch (error) {
          if (error?.name === "AbortError") return;
        }
      }
      downloadBlob({
        blob: asset.blob,
        name: item.assetName || asset.name || item.title,
        openInNewTab: isPreviewableAsset(item),
      });
    } catch {
      alert("Couldn't open that file right now.");
    } finally {
      setIsOpeningAsset(false);
    }
  };

  const startSwipe = (event) => {
    if (sheetScrollRef.current && sheetScrollRef.current.scrollTop > 6) return;
    const touch = event.touches?.[0];
    if (!touch) return;
    dragActiveRef.current = true;
    dragStartYRef.current = touch.clientY;
    dragStartXRef.current = touch.clientX;
    dragLastYRef.current = touch.clientY;
    dragStartTimeRef.current = performance.now();
    dragLastTimeRef.current = dragStartTimeRef.current;
    setIsDragging(true);
  };

  const moveSwipe = (event) => {
    if (!dragActiveRef.current) return;
    const touch = event.touches?.[0];
    if (!touch) return;
    const deltaY = touch.clientY - dragStartYRef.current;
    const deltaX = Math.abs(touch.clientX - dragStartXRef.current);
    if (deltaY <= 0 || deltaX > deltaY * 1.15) {
      setDragY(0);
      return;
    }
    event.preventDefault();
    dragLastYRef.current = touch.clientY;
    dragLastTimeRef.current = performance.now();
    setDragY(deltaY);
  };

  const endSwipe = () => {
    if (!dragActiveRef.current) return;
    dragActiveRef.current = false;
    const distance = Math.max(0, dragLastYRef.current - dragStartYRef.current);
    const elapsed = Math.max(1, dragLastTimeRef.current - dragStartTimeRef.current);
    const velocity = distance / elapsed;
    const shouldClose = distance > 120 || velocity > 0.75;
    setIsDragging(false);
    setDragY(0);
    if (shouldClose) onClose();
  };

  const overlayAlpha = Math.max(0.14, 0.45 - dragY / 520);
  const canOpenOriginal = Boolean(!hasLocalAsset && item.url);
  const canPreviewImage = item.type === "image" && Boolean(item.thumbnail || item.url || item.assetId);
  const heroAspect = item.type === "video" ? "16 / 9" : item.type === "image" ? "1 / 1" : "1.78 / 1";

  const openOriginal = () => {
    if (!canOpenOriginal) return;
    window.open(item.url, "_blank", "noopener,noreferrer");
  };

  const openImage = () => {
    if (!canPreviewImage) return;
    onOpenImage?.(item);
  };

  const handleHeroKeyDown = (event) => {
    if (!canOpenOriginal && !canPreviewImage) return;
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      if (canPreviewImage) openImage();
      else openOriginal();
    }
  };

  return (
    <div className="anim-fade" onClick={onClose} style={{ position: "absolute", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end", background: `rgba(16, 20, 30, ${overlayAlpha})`, transition: isDragging ? "none" : "background 180ms ease" }}>
      <div className="anim-sheet" style={{ borderRadius: "28px 28px 0 0", overflow: "hidden", display: "flex", flexDirection: "column", background: T.paper, maxHeight: "88%", transform: `translateY(${dragY}px)`, transition: isDragging ? "none" : "transform 220ms cubic-bezier(0.22, 1, 0.36, 1)" }} onClick={e=>e.stopPropagation()}>
        <div
          onTouchStart={startSwipe}
          onTouchMove={moveSwipe}
          onTouchEnd={endSwipe}
          onTouchCancel={endSwipe}
          style={{ padding: "12px 0 6px", display: "flex", justifyContent: "center", cursor: "grab", touchAction: "none" }}
        >
          <div style={{ width: 42, height: 5, borderRadius: 999, background: T.line }} />
        </div>
        <div
          ref={sheetScrollRef}
          className="scroll"
          style={{ padding: "0 20px 20px" }}
          onTouchStart={startSwipe}
          onTouchMove={moveSwipe}
          onTouchEnd={endSwipe}
          onTouchCancel={endSwipe}
        >
          <div style={{ position: "sticky", top: 0, zIndex: 2, background: `linear-gradient(180deg, ${T.paper} 0%, ${T.paper}f1 78%, rgba(245,241,234,0) 100%)`, padding: "6px 0 10px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
                <BrandBadge visual={sourceVisual} size={18} />
                <div className="mono clamp1" style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em", color: T.inkMute }}>{sourceProfile.label} · saved {relativeTime(item.savedAt)}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                <button aria-label="Share this save" onClick={onShare} style={{ width: 40, height: 40, borderRadius: 14, background: T.card, color: T.ink, border: `1px solid ${T.lineSoft}`, boxShadow: "0 12px 22px -20px rgba(22,26,35,0.45)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <IconShare size={16} stroke={1.95} />
                </button>
                <button onClick={onEdit} style={{ display: "flex", alignItems: "center", gap: 7, padding: "0 14px", height: 40, borderRadius: 14, background: T.ink, color: T.paper, boxShadow: "0 14px 24px -20px rgba(22,26,35,0.55)" }}>
                  <IconEdit size={14} />
                  <span style={{ fontSize: 12.5, fontWeight: 700 }}>Edit</span>
                </button>
                <button aria-label="Close details" onClick={onClose} style={{ width: 40, height: 40, borderRadius: 14, background: T.paperDim, color: T.ink, border: `1px solid ${T.lineSoft}`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <IconX size={14} />
                </button>
              </div>
            </div>
          </div>
          <div
            role={canOpenOriginal || canPreviewImage ? "button" : undefined}
            tabIndex={canOpenOriginal || canPreviewImage ? 0 : undefined}
            onClick={canPreviewImage ? openImage : (canOpenOriginal ? openOriginal : undefined)}
            onKeyDown={handleHeroKeyDown}
            style={{ position: "relative", marginBottom: 16, cursor: canPreviewImage || canOpenOriginal ? "pointer" : "default" }}
          >
            <div style={{ position: "relative", aspectRatio: heroAspect, borderRadius: 22, overflow: "hidden", background: item.thumbnail ? "#EEF1F7" : `linear-gradient(160deg, ${item.color}26 0%, rgba(22,26,35,0.1) 100%)`, border: `1px solid ${T.lineSoft}`, boxShadow: "0 24px 40px -32px rgba(22,26,35,0.45)" }}>
              {item.thumbnail ? (
                <img src={item.thumbnail} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
              ) : null}
              <div style={{ position: "absolute", inset: 0, background: item.thumbnail ? "linear-gradient(180deg, rgba(11,16,26,0.04) 0%, rgba(11,16,26,0.18) 48%, rgba(11,16,26,0.55) 100%)" : "linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(22,26,35,0.2) 100%)" }} />
              {!item.thumbnail && (
                <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: item.color }}>
                  <div style={{ width: 72, height: 72, borderRadius: 22, background: "rgba(255,255,255,0.78)", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 20px 34px -28px rgba(22,26,35,0.48)" }}>
                    {typeIconFor(item.type, { size: 34, stroke: 1.6 })}
                  </div>
                </div>
              )}
              {item.type === "video" && canOpenOriginal && (
                <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                  <div style={{ width: 78, height: 78, borderRadius: "50%", background: "rgba(11,16,26,0.28)", border: "1px solid rgba(255,255,255,0.22)", backdropFilter: "blur(12px)", color: T.paper, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 22px 34px -24px rgba(11,16,26,0.72)" }}>
                    <IconPlayCircle size={34} stroke={1.85} />
                  </div>
                </div>
              )}
              {item.type === "image" && canPreviewImage && (
                <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                  <div style={{ width: 78, height: 78, borderRadius: "50%", background: "rgba(11,16,26,0.28)", border: "1px solid rgba(255,255,255,0.22)", backdropFilter: "blur(12px)", color: T.paper, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 22px 34px -24px rgba(11,16,26,0.72)" }}>
                    <IconSearch size={28} stroke={2.05} />
                  </div>
                </div>
              )}
              <div className="mono" style={{ position: "absolute", top: 12, left: 12, fontSize: 9.5, textTransform: "uppercase", letterSpacing: "0.08em", padding: "7px 10px", borderRadius: 999, background: "rgba(255,255,255,0.88)", color: item.color, boxShadow: "0 10px 20px -18px rgba(22,26,35,0.7)" }}>
                {displayTypeLabel(item.type)}
              </div>
              {(canOpenOriginal || canPreviewImage) && (
                <div className="mono" style={{ position: "absolute", left: 12, bottom: 12, fontSize: 9.5, textTransform: "uppercase", letterSpacing: "0.12em", padding: "7px 10px", borderRadius: 999, background: "rgba(11,16,26,0.42)", color: "rgba(255,255,255,0.96)", backdropFilter: "blur(10px)" }}>
                  {canPreviewImage ? "Tap image to view full size" : "Tap preview to open original"}
                </div>
              )}
            </div>
          </div>
          <h2 className="serif" style={{ fontSize: 26, lineHeight: 1.2, marginBottom: 8, marginTop: 0, color: T.ink }}>{item.title}</h2>
          <p style={{ fontSize: 13, lineHeight: 1.5, marginBottom: 12, color: T.inkSoft }}>{item.description}</p>
          {hasLocalAsset && (
            <div style={{ marginBottom: 12, padding: 12, borderRadius: 12, background: T.paperDim, border: `1px solid ${T.lineSoft}` }}>
              <div className="mono clamp1" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", color: T.inkMute, marginBottom: 6 }}>
                Local file
              </div>
              <div className="clamp1" style={{ fontSize: 12.5, color: T.ink, marginBottom: 4 }}>{item.assetName || item.title}</div>
              <div className="mono" style={{ fontSize: 10, color: T.inkSoft }}>
                {[item.assetMime, item.assetSize ? formatBytes(item.assetSize) : ""].filter(Boolean).join(" • ")}
              </div>
            </div>
          )}
          {folder && (
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, fontSize: 11, color: T.inkSoft }}>
              <div style={{ width: 8, height: 8, borderRadius: 2, background: folder.color }} />
              <span>in {folder.name}</span>
            </div>
          )}
          {(item.tags || []).length > 0 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 16 }}>
              {(item.tags || []).map(t => (
                <span key={t} className="mono" style={{ fontSize: 10, padding: "2px 8px", borderRadius: 999, background: T.paperDim, color: T.inkSoft, border: `1px solid ${T.lineSoft}` }}>{t}</span>
              ))}
            </div>
          )}
          <div style={{ display: "flex", gap: 8, paddingTop: 12, borderTop: `1px solid ${T.lineSoft}` }}>
            {hasLocalAsset ? (
              <button onClick={openAsset} disabled={isOpeningAsset} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: 12, borderRadius: 12, fontSize: 13, fontWeight: 500, background: T.ink, color: T.paper, opacity: isOpeningAsset ? 0.65 : 1 }}>
                {item.type === "image" ? <IconSearch size={14} /> : isPreviewableAsset(item) ? <IconArrowOut size={14} /> : <IconDownload size={14} />}
                {isOpeningAsset ? "Opening..." : item.type === "image" ? "View image" : isPreviewableAsset(item) ? "Open file" : "Share or download file"}
              </button>
            ) : (
              <a href={item.url} target="_blank" rel="noreferrer" style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: 12, borderRadius: 12, fontSize: 13, fontWeight: 500, background: T.ink, color: T.paper, textDecoration: "none" }}>
                <IconArrowOut size={14} />Open original
              </a>
            )}
            <button aria-label="Delete this save" onClick={onDelete} style={{ padding: 12, borderRadius: 12, color: T.inkSoft, border: `1px solid ${T.lineSoft}` }}>
              <IconTrash size={14} />
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ItemEditorSheet({ item, folders, onClose, onSave }) {
  const [title, setTitle] = useState(item.title || "");
  const [description, setDescription] = useState(item.description || "");
  const [folderId, setFolderId] = useState(item.folderId || folders.find(f => f.id === "f-random")?.id || folders.find(f => !f.system)?.id || "f-random");
  const [tags, setTags] = useState((item.tags || []).join(", "));
  const [type, setType] = useState(item.type || "link");
  const [source, setSource] = useState(item.source || "");
  const [url, setUrl] = useState(item.url || "");
  const [keyboardInset, setKeyboardInset] = useState(0);
  const [isSaving, setIsSaving] = useState(false);
  const scrollRef = useRef(null);
  const hasLocalAsset = Boolean(item.assetId);
  const hasDraft = title.trim() !== (item.title || "").trim()
    || description.trim() !== (item.description || "").trim()
    || folderId !== (item.folderId || "")
    || type !== (item.type || "link")
    || source.trim() !== (item.source || "").trim()
    || url.trim() !== (item.url || "").trim()
    || tags.trim() !== (item.tags || []).join(", ");

  const requestClose = () => {
    if (isSaving) return;
    if (hasDraft && !confirm("Discard your edits?")) return;
    onClose();
  };

  const ensureVisible = (node, behavior = "smooth") => {
    if (!node || !scrollRef.current) return;
    window.requestAnimationFrame(() => {
      node.scrollIntoView({ block: "center", behavior });
    });
  };

  useEffect(() => {
    const viewport = window.visualViewport;
    if (!viewport) return;

    const updateKeyboardInset = () => {
      const nextInset = Math.max(0, Math.round(window.innerHeight - (viewport.height + viewport.offsetTop)));
      setKeyboardInset(nextInset);
      const active = document.activeElement;
      if (scrollRef.current?.contains(active) && (active?.tagName === "INPUT" || active?.tagName === "TEXTAREA")) {
        window.setTimeout(() => ensureVisible(active), 90);
      }
    };

    updateKeyboardInset();
    viewport.addEventListener("resize", updateKeyboardInset);
    viewport.addEventListener("scroll", updateKeyboardInset);
    window.addEventListener("orientationchange", updateKeyboardInset);
    return () => {
      viewport.removeEventListener("resize", updateKeyboardInset);
      viewport.removeEventListener("scroll", updateKeyboardInset);
      window.removeEventListener("orientationchange", updateKeyboardInset);
    };
  }, []);

  const submit = async () => {
    if (isSaving) return;
    const nextFolder = folders.find(folder => folder.id === folderId);
    setIsSaving(true);
    try {
      await onSave({
        title: title.trim() || item.title || "Untitled save",
        description: description.trim(),
        folderId,
        type,
        source: source.trim() || item.source || (hasLocalAsset ? "device" : "Web"),
        url: hasLocalAsset ? "" : (normalizeUrl(url.trim()) || item.url || ""),
        tags: dedupe(tags.split(",").map(tag => tag.trim()).filter(Boolean)),
        color: nextFolder?.color || item.color || T.accent,
      });
    } finally {
      setIsSaving(false);
    }
  };

  return (
    <div className="anim-fade" style={{ position: "absolute", inset: 0, zIndex: 55, display: "flex", flexDirection: "column", justifyContent: "flex-end", background: "rgba(16, 20, 30, 0.46)", paddingBottom: keyboardInset, transition: "padding-bottom 180ms ease" }} onClick={requestClose}>
      <div className="anim-sheet" style={{ borderRadius: "28px 28px 0 0", overflow: "hidden", display: "flex", flexDirection: "column", background: T.paper, maxHeight: keyboardInset ? `calc(100% - ${keyboardInset + 8}px)` : "86%", transition: "max-height 180ms ease" }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding: "12px 0 4px", display: "flex", justifyContent: "center", flexShrink: 0 }}><div style={{ width: 36, height: 4, borderRadius: 999, background: T.line }} /></div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px", flexShrink: 0 }}>
          <button onClick={requestClose} style={{ fontSize: 14, color: T.inkSoft }}>Cancel</button>
          <div className="serif" style={{ fontSize: 18, color: T.ink }}>Edit save</div>
          <button onClick={submit} disabled={isSaving} style={{ padding: "9px 14px", borderRadius: 999, fontSize: 12, fontWeight: 600, background: T.ink, color: T.paper, opacity: isSaving ? 0.65 : 1 }}>
            {isSaving ? "Saving..." : "Save"}
          </button>
        </div>
        <div ref={scrollRef} className="scroll" style={{ padding: "0 20px 28px", display: "flex", flexDirection: "column", gap: 16 }} onFocusCapture={(event) => ensureVisible(event.target)}>
          {item.thumbnail && (
            <div style={{ borderRadius: 16, overflow: "hidden", border: `1px solid ${T.lineSoft}`, background: T.paperDim }}>
              <img src={item.thumbnail} alt="" style={{ display: "block", width: "100%", aspectRatio: "1.8 / 1", objectFit: "cover" }} />
            </div>
          )}
          <Field label="Title"><input value={title} onChange={e=>setTitle(e.target.value)} style={inputStyle()} /></Field>
          <Field label="Description"><textarea value={description} onChange={e=>setDescription(e.target.value)} rows={4} style={{ ...inputStyle(), resize: "none" }} /></Field>
          {!hasLocalAsset && (
            <Field label="Original link"><input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://..." style={inputStyle()} /></Field>
          )}
          <Field label="App / source"><input value={source} onChange={e=>setSource(e.target.value)} placeholder={hasLocalAsset ? "Device" : "YouTube, Reddit, Web..."} style={inputStyle()} /></Field>
          <Field label="Type">
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6 }}>
              {["article", "video", "image", "file", "place", "link"].map(nextType => (
                <button key={nextType} onClick={()=>setType(nextType)} className="mono" style={{ padding: "8px 0", borderRadius: 8, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", background: type === nextType ? T.ink : T.card, color: type === nextType ? T.paper : T.inkSoft, border: `1px solid ${type === nextType ? T.ink : T.lineSoft}` }}>
                  {displayTypeLabel(nextType)}
                </button>
              ))}
            </div>
          </Field>
          <Field label="Folder">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
              {folders.filter(folder => !folder.system).map(folder => (
                <button key={folder.id} onClick={()=>setFolderId(folder.id)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", borderRadius: 8, fontSize: 12, background: folderId === folder.id ? T.paperDim : T.card, color: T.ink, border: `1px solid ${folderId === folder.id ? T.line : T.lineSoft}`, textAlign: "left" }}>
                  <div style={{ width: 8, height: 8, borderRadius: 2, background: folder.color, flexShrink: 0 }} />
                  <span className="clamp1">{folder.name}</span>
                </button>
              ))}
            </div>
          </Field>
          <Field label="Tags"><input value={tags} onChange={e=>setTags(e.target.value)} placeholder="comma, separated, tags" style={inputStyle()} /></Field>
          {hasLocalAsset && (
            <div style={{ padding: 14, borderRadius: 14, background: T.paperDim, border: `1px solid ${T.lineSoft}` }}>
              <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", color: T.inkMute, marginBottom: 6 }}>
                Attached file
              </div>
              <div className="clamp1" style={{ fontSize: 13, color: T.ink }}>{item.assetName || item.title}</div>
              <div className="mono" style={{ marginTop: 4, fontSize: 10, color: T.inkSoft }}>
                {[item.assetMime, item.assetSize ? formatBytes(item.assetSize) : ""].filter(Boolean).join(" • ")}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
