const normalizeUrl = (value) => {
  const raw = (value || "").trim();
  if (!raw) return "";
  const next = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
  try {
    return new URL(next).toString();
  } catch {
    return raw;
  }
};

const hostFromUrl = (value) => {
  try {
    return new URL(normalizeUrl(value)).hostname.replace(/^www\./, "");
  } catch {
    return "";
  }
};

const domainGuess = (value) => hostFromUrl(value).split(".")[0] || "";
const dedupe = (values) => [...new Set(values.filter(Boolean))];

const inferTypeFromUrl = (value) => {
  const normalized = normalizeUrl(value).toLowerCase();
  if (/\.(png|jpe?g|gif|webp|svg)(\?|$)/.test(normalized)) return "image";
  if (/\.(mp4|mov|m4v|webm)(\?|$)/.test(normalized)) return "video";
  if (/youtube\.com|youtu\.be|vimeo\.com|tiktok\.com/.test(normalized)) return "video";
  return "article";
};

const inferTypeFromMetadata = (metadata, value) => {
  const haystack = `${metadata?.publisher || ""} ${metadata?.provider || ""} ${value || ""}`.toLowerCase();
  if (metadata?.type === "video" || /youtube|youtu\.be|vimeo|tiktok/.test(haystack)) return "video";
  if (metadata?.type === "photo" || metadata?.type === "image") return "image";
  if (/\.(png|jpe?g|gif|webp|svg)(\?|$)/.test((value || "").toLowerCase())) return "image";
  return inferTypeFromUrl(value);
};

const sanitizeText = (value = "") => value.replace(/\[(.*?)\]\(.*?\)/g, "$1").replace(/\s+/g, " ").trim();

const extractJinaDescription = (text) => {
  const descriptionMatch = text.match(/^Description:\s*(.+)$/mi);
  if (descriptionMatch?.[1]) return sanitizeText(descriptionMatch[1]);
  const contentMatch = text.match(/Markdown Content:\s*([\s\S]+)/i);
  const lines = (contentMatch?.[1] || text)
    .split("\n")
    .map(line => sanitizeText(line))
    .filter(Boolean);

  return (
    lines.find(line =>
      line.length > 70 &&
      !/^title:/i.test(line) &&
      !/^url source:/i.test(line) &&
      !/^published time:/i.test(line) &&
      !/^warning:/i.test(line) &&
      !/^#/.test(line)
    ) || ""
  );
};

const parseJinaMetadata = (text) => {
  const titleMatch = text.match(/^Title:\s*(.+)$/mi);
  return {
    title: sanitizeText(titleMatch?.[1] || ""),
    description: extractJinaDescription(text),
  };
};

const parseMicrolinkData = (data = {}) => ({
  title: sanitizeText(data.title || ""),
  description: sanitizeText(data.description || ""),
  thumbnail: typeof data.image === "string" ? data.image : data.image?.url || "",
  publisher: sanitizeText(data.publisher || ""),
  author: sanitizeText(data.author || ""),
  source: sanitizeText(data.publisher || ""),
});

const parseNoembedData = (data = {}) => ({

  thumbnail: data.thumbnail_url || "",
  publisher: sanitizeText(data.provider_name || ""),
  author: sanitizeText(data.author_name || ""),
  type: data.type || "",
  source: sanitizeText(data.provider_name || ""),
});

const youtubeVideoIdFromUrl = (value) => {
  try {
    const url = new URL(normalizeUrl(value));
    if (url.hostname.includes("youtu.be")) return url.pathname.replace("/", "").trim();
    if (url.searchParams.get("v")) return url.searchParams.get("v");
    const parts = url.pathname.split("/").filter(Boolean);
    const markerIndex = parts.findIndex(part => ["shorts", "embed", "live"].includes(part));
    if (markerIndex >= 0 && parts[markerIndex + 1]) return parts[markerIndex + 1];
  } catch {}
  return "";
};

const isYouTubeUrl = (value) => /(^|\.)youtube\.com$|(^|\.)youtu\.be$|(^|\.)youtube-nocookie\.com$/i.test(hostFromUrl(value));

const parseYouTubeOEmbedData = (data = {}) => ({
  title: sanitizeText(data.title || ""),
  description: sanitizeText(data.author_name ? `${data.author_name} via YouTube` : "YouTube video"),
  thumbnail: data.thumbnail_url || "",
  publisher: "YouTube",
  author: sanitizeText(data.author_name || ""),
  type: data.type || "video",
  source: "YouTube",
});

const fetchYouTubeOEmbedMetadata = async (normalizedUrl) => {
  const endpoint = `https://www.youtube.com/oembed?format=json&url=${encodeURIComponent(normalizedUrl)}`;
  const response = await fetch(endpoint);
  if (!response.ok) throw new Error("youtube_oembed_failed");
  const payload = await response.json();
  const parsed = parseYouTubeOEmbedData(payload);
  const videoId = youtubeVideoIdFromUrl(normalizedUrl);
  if (videoId && !parsed.thumbnail) parsed.thumbnail = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
  return parsed;
};

const fetchMicrolinkMetadata = async (normalizedUrl) => {
  const endpoint = `https://api.microlink.io/?${new URLSearchParams({ url: normalizedUrl, screenshot: "false", meta: "true" }).toString()}`;
  const response = await fetch(endpoint);
  if (!response.ok) throw new Error("microlink_failed");
  const payload = await response.json();
  if (payload.status !== "success") throw new Error("microlink_failed");
  return parseMicrolinkData(payload.data);
};

const fetchNoembedMetadata = async (normalizedUrl) => {
  const endpoint = `https://noembed.com/embed?url=${encodeURIComponent(normalizedUrl)}`;
  const response = await fetch(endpoint);
  if (!response.ok) throw new Error("noembed_failed");
  const payload = await response.json();
  if (payload.error) throw new Error("noembed_failed");
  return parseNoembedData(payload);
};

const fetchJinaMetadata = async (normalizedUrl) => {
  const response = await fetch(`https://r.jina.ai/http://${normalizedUrl}`);
  if (!response.ok) throw new Error("jina_failed");
  const text = await response.text();
  return parseJinaMetadata(text);
};

const descriptionScore = (value = "") => {
  const normalized = sanitizeText(value).toLowerCase();
  if (!normalized) return -1;
  let score = normalized.length;
  if (/ via youtube$/.test(normalized)) score -= 200;
  if (/^youtube video$/.test(normalized)) score -= 250;
  if (/^saved from /.test(normalized)) score -= 300;
  return score;
};

const mergeMetadata = (...sources) => {
  const descriptions = sources.map(source => source?.description || "").filter(Boolean);
  const bestDescription = descriptions.sort((a, b) => descriptionScore(b) - descriptionScore(a))[0] || "";

  return {
    title: sources.find(source => source?.title)?.title || "",
    description: bestDescription,
    thumbnail: sources.find(source => source?.thumbnail)?.thumbnail || "",
    publisher: sources.find(source => source?.publisher)?.publisher || "",
    author: sources.find(source => source?.author)?.author || "",
    type: sources.find(source => source?.type)?.type || "",
    source: sources.find(source => source?.source)?.source || "",
  };
};

const scoreFolder = (folder, haystack) => {
  const normalizedName = folder.name.toLowerCase().replace(/&/g, " ").replace(/\s+/g, " ").trim();
  let score = 0;

  normalizedName.split(" ").filter(token => token.length > 2).forEach((token) => {
    if (haystack.includes(token)) score += 2;
  });

  (folderKeywordMap[normalizedName] || []).forEach((keyword) => {
    if (haystack.includes(keyword)) score += 4;
  });

  return score;
};

const guessFolderId = (metadata, folders) => {
  const fallback = folders.find(f => f.id === "f-read" || f.name.toLowerCase() === "read later") || folders.find(f => !f.system);
  const haystack = sanitizeText([
    metadata.title,
    metadata.description,
    metadata.publisher,
    metadata.author,
    metadata.source,
    metadata.url,
  ].join(" ").toLowerCase());

  let best = fallback || folders.find(f => !f.system);
  let bestScore = -1;
  folders.filter(f => !f.system).forEach((folder) => {
    const score = scoreFolder(folder, haystack);
    if (score > bestScore) {
      best = folder;
      bestScore = score;
    }
  });
  return best?.id || "";
};

const fetchLinkMetadata = async (rawUrl, folders) => {
  const normalizedUrl = normalizeUrl(rawUrl);
  const source = hostFromUrl(normalizedUrl);
  const domain = domainGuess(normalizedUrl);
  const requests = [
    fetchMicrolinkMetadata(normalizedUrl),
    fetchNoembedMetadata(normalizedUrl),
    fetchJinaMetadata(normalizedUrl),
  ];

  if (isYouTubeUrl(normalizedUrl)) {
    requests.unshift(fetchYouTubeOEmbedMetadata(normalizedUrl));
  }

  const results = await Promise.allSettled(requests);

  const metadata = mergeMetadata(
    ...results.filter(result => result.status === "fulfilled").map(result => result.value)
  );

  const type = inferTypeFromMetadata(metadata, normalizedUrl);
  const tags = dedupe([domain, metadata.publisher && metadata.publisher.toLowerCase().replace(/\s+/g, "-")]);
  const folderId = guessFolderId({ ...metadata, url: normalizedUrl, source }, folders);
  const fallbackTitle = metadata.title || (domain ? `Saved from ${domain}` : "Untitled save");
  const fallbackDescription = metadata.description || "";

  return {
    ...metadata,
    title: fallbackTitle,
    description: fallbackDescription,
    url: normalizedUrl,
    source: metadata.source || source,
    type,
    tags,
    folderId,
    success: Boolean(metadata.title || metadata.description || metadata.thumbnail || results.some(result => result.status === "fulfilled")),
  };
};

const typeIconFor = (type, props) => {
  const P = { size: 18, stroke: 1.5, ...props };
  if (type === "article") return <IconFile {...P} />;
  if (type === "video") return <IconFilm {...P} />;
  if (type === "image") return <IconImage {...P} />;
  return <IconLink {...P} />;
};

const relativeTime = (ts) => {
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return "just now";
  if (m < 60) return `${m}m`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h`;
  const d = Math.floor(h / 24);
  if (d < 7) return `${d}d`;
  return new Date(ts).toLocaleDateString();
};

// Check URL params on load: SAVI supports ?url=... to receive shared URLs
const getIncomingUrl = () => {
  try {
    const params = new URLSearchParams(window.location.search);
    return params.get("url") || params.get("text") || "";
  } catch { return ""; }
};

const loadState = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
};
const saveState = (data) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
};

function App() {
  const saved = loadState();
  const [folders, setFolders] = useState(saved?.folders || SEED_FOLDERS);
  const [items, setItems] = useState(saved?.items || SEED_ITEMS);
  const [activeFolder, setActiveFolder] = useState("f-all");
  const [search, setSearch] = useState("");
  const [route, setRoute] = useState("home");
  const [showSaveSheet, setShowSaveSheet] = useState(false);
  const [prefillUrl, setPrefillUrl] = useState("");
  const [showFolderSheet, setShowFolderSheet] = useState(false);
  const [showShareSheet, setShowShareSheet] = useState(false);
  const [selectedItem, setSelectedItem] = useState(null);

  // If opened with ?url=..., auto-open the save sheet
  useEffect(() => {
    const incoming = getIncomingUrl();
    if (incoming) {
      setPrefillUrl(incoming);
      setShowSaveSheet(true);
      // clean url so refresh doesn't re-trigger
      try { window.history.replaceState({}, "", window.location.pathname); } catch {}
    }
  }, []);

  useEffect(() => { saveState({ folders, items }); }, [folders, items]);

  const visibleItems = useMemo(() => {
    let list = items;
    if (activeFolder !== "f-all") list = list.filter(i => i.folderId === activeFolder);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(i =>
        i.title.toLowerCase().includes(q) ||
        i.description.toLowerCase().includes(q) ||
        i.tags.some(t => t.toLowerCase().includes(q)) ||
        i.source.toLowerCase().includes(q)
      );
    }
    return list.sort((a,b) => b.savedAt - a.savedAt);
  }, [items, activeFolder, search]);

  const folderCounts = useMemo(() => {
    const counts = { "f-all": items.length };
    folders.forEach(f => { if (!f.system) counts[f.id] = items.filter(i => i.folderId === f.id).length; });
    return counts;
  }, [items, folders]);

  const addItem = (item) => setItems(prev => [{ ...item, id: `i-${Date.now()}`, savedAt: Date.now() }, ...prev]);
  const deleteItem = (id) => { setItems(prev => prev.filter(i => i.id !== id)); if (selectedItem?.id === id) setSelectedItem(null); };
  const addFolder = (name, color) => setFolders(prev => [...prev, { id: `f-${Date.now()}`, name, color }]);

  return (
    <div className="stage">
      <div className="frame-wrap">
        <div className="bezel">
          <div className="bezel-inner">
            <div className="screen">
              <div className="notch" />
              <div className="app">
                <StatusBar />
                <div className="app-main">
                  {route === "home" && (
                    <HomeScreen folders={folders} items={visibleItems} activeFolder={activeFolder} setActiveFolder={setActiveFolder} folderCounts={folderCounts} search={search} setSearch={setSearch} onSelect={setSelectedItem} onDemoShare={() => setShowShareSheet(true)} />
                  )}
                  {route === "folders" && (
                    <FoldersScreen folders={folders} folderCounts={folderCounts} onOpen={(id)=>{ setActiveFolder(id); setRoute("home"); }} onNew={()=>setShowFolderSheet(true)} />
                  )}
                  {route === "profile" && (
                    <ProfileScreen itemCount={items.length} folderCount={folders.filter(f=>!f.system).length} />
                  )}
                </div>
                <div className="navigator-shell">
                  <TabBar route={route} setRoute={setRoute} onSavePress={()=>{ setPrefillUrl(""); setShowSaveSheet(true); }} />
                </div>

                {showShareSheet && <IOSShareSheet onClose={()=>setShowShareSheet(false)} onPickSavi={()=>{ setShowShareSheet(false); setPrefillUrl("https://wired.com/future-of-pkm"); setShowSaveSheet(true); }} />}
                {showSaveSheet && <SaveSheet initialUrl={prefillUrl} folders={folders} onClose={()=>setShowSaveSheet(false)} onSave={(i)=>{ addItem(i); setShowSaveSheet(false); }} />}
                {showFolderSheet && <FolderSheet onClose={()=>setShowFolderSheet(false)} onCreate={(n,c)=>{ addFolder(n,c); setShowFolderSheet(false); }} />}
                {selectedItem && <ItemSheet item={selectedItem} folders={folders} onClose={()=>setSelectedItem(null)} onDelete={()=>deleteItem(selectedItem.id)} />}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

  const [title, setTitle] = useState("");
  const [description, setDescription] = useState("");
  const [folderId, setFolderId] = useState(folders.find(f => !f.system)?.id || "f-read");
  const [tags, setTags] = useState("");
  const [type, setType] = useState("article");
  const [thumbnail, setThumbnail] = useState("");
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [analysisNote, setAnalysisNote] = useState("");

  const analyze = async (nextUrl = url) => {
    const normalized = normalizeUrl(nextUrl);
    if (!normalized) return;

    setIsAnalyzing(true);
    setAnalysisNote("");

    try {
      const metadata = await fetchLinkMetadata(normalized, folders);
      const fallbackDomain = domainGuess(normalized);
      const resolvedTitle = metadata.title || `Saved from ${fallbackDomain}`;
      const resolvedDescription = metadata.description || "Add your own notes about this save.";
      const resolvedTags = dedupe([...(metadata.tags || []), fallbackDomain]).join(", ");

      setUrl(normalized);
      setTitle(resolvedTitle);
      setDescription(resolvedDescription);
      setType(metadata.type || "article");
      setThumbnail(metadata.thumbnail || "");
      if (metadata.folderId) setFolderId(metadata.folderId);
      setTags(resolvedTags);
      setStep(2);
      setAnalysisNote(metadata.success ? "Metadata pulled from the link and folder selected automatically." : "Limited metadata was available, so some fields were guessed.");
    } catch (error) {
      const fallbackDomain = domainGuess(normalized);
      setUrl(normalized);
      setTitle(`Saved from ${fallbackDomain}`);
      setDescription("Add your own notes about this save.");
      setTags(fallbackDomain);
      setType(inferTypeFromUrl(normalized));
      setThumbnail("");
      setStep(2);
      setAnalysisNote("Couldn't fetch rich metadata for this link, so SAVI filled what it could.");
    } finally {
      setIsAnalyzing(false);
    }
  };

  useEffect(() => {
    if (initialUrl) {
      analyze(initialUrl);
    }
  }, [initialUrl]);

  const submit = () => {
    const folder = folders.find(f => f.id === folderId);
    onSave({
      title: title.trim() || "Untitled save",
      description: description.trim(),
      url: normalizeUrl(url.trim()),
      source: hostFromUrl(url.trim()) || "manual",
      type, folderId,
      tags: tags.split(",").map(t => t.trim()).filter(Boolean),
      color: folder?.color || T.accent,
      thumbnail,
    });
  };

  return (
    <div className="anim-fade" style={{ position: "absolute", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end", background: "rgba(28,26,23,0.45)" }} onClick={onClose}>
      <div className="anim-sheet" style={{ borderRadius: "28px 28px 0 0", overflow: "hidden", display: "flex", flexDirection: "column", background: T.paper, maxHeight: "85%" }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding: "12px 0 4px", display: "flex", justifyContent: "center", flexShrink: 0 }}><div style={{ width: 36, height: 4, borderRadius: 999, background: T.line }} /></div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px", flexShrink: 0 }}>
          <button onClick={step === 1 ? onClose : () => setStep(1)} style={{ fontSize: 14, color: T.inkSoft }}>{step === 1 ? "Cancel" : "Back"}</button>
          <div className="serif" style={{ fontSize: 18, color: T.ink }}>{step === 1 ? "New save" : "Review"}</div>
          <div className="mono" style={{ fontSize: 10, color: T.inkMute }}>{step}/2</div>
        </div>

        <div className="scroll" style={{ padding: "0 20px 20px" }}>
          {step === 1 ? (
            <div style={{ padding: "12px 0" }}>
              <Label>Paste URL</Label>
              <input autoFocus value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>e.key==="Enter" && !isAnalyzing && analyze()} placeholder="https://..." style={{ width: "100%", borderRadius: 12, padding: "12px 14px", fontSize: 14, background: T.card, border: `1px solid ${T.lineSoft}`, color: T.ink }} />
              <div style={{ display: "flex", alignItems: "flex-start", gap: 8, marginTop: 16, fontSize: 11.5, padding: 12, borderRadius: 12, background: T.paperDim, border: `1px solid ${T.lineSoft}`, color: T.inkSoft }}>
                <div style={{ color: T.accent, flexShrink: 0, marginTop: 2 }}><IconSparkles size={13} /></div>
                <span>SAVI will try to pull the title, description, thumbnail, and best folder automatically from the link metadata.</span>
              </div>
              <button onClick={() => analyze()} disabled={!url.trim() || isAnalyzing} style={{ width: "100%", marginTop: 20, padding: 14, borderRadius: 12, fontSize: 15, fontWeight: 500, background: T.ink, color: T.paper, opacity: url.trim() && !isAnalyzing ? 1 : 0.3 }}>
                {isAnalyzing ? "Analyzing..." : "Continue"}
              </button>
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 16, padding: "8px 0" }}>
              {thumbnail && (
                <div style={{ borderRadius: 16, overflow: "hidden", border: `1px solid ${T.lineSoft}`, background: T.paperDim }}>
                  <img src={thumbnail} alt="" style={{ display: "block", width: "100%", aspectRatio: "1.8 / 1", objectFit: "cover" }} />
                </div>
              )}
              {analysisNote && (
                <div style={{ fontSize: 11.5, padding: 12, borderRadius: 12, background: T.paperDim, border: `1px solid ${T.lineSoft}`, color: T.inkSoft }}>
                  {analysisNote}
                </div>
              )}
              <Field label="Title"><input value={title} onChange={e=>setTitle(e.target.value)} style={inputStyle()} /></Field>
              <Field label="Description"><textarea value={description} onChange={e=>setDescription(e.target.value)} rows={3} style={{ ...inputStyle(), resize: "none" }} /></Field>
              <Field label="Type">
                <div style={{ display: "flex", gap: 6 }}>
                  {["article", "video", "image", "link"].map(t => (
                    <button key={t} onClick={()=>setType(t)} className="mono" style={{ flex: 1, padding: "8px 0", borderRadius: 8, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", background: type === t ? T.ink : T.card, color: type === t ? T.paper : T.inkSoft, border: `1px solid ${type === t ? T.ink : T.lineSoft}` }}>{t}</button>
                  ))}
                </div>
              </Field>
              <Field label="Folder">
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                  {folders.filter(f => !f.system).map(f => (
                    <button key={f.id} onClick={()=>setFolderId(f.id)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", borderRadius: 8, fontSize: 12, background: folderId === f.id ? T.paperDim : T.card, color: T.ink, border: `1px solid ${folderId === f.id ? T.line : T.lineSoft}`, textAlign: "left" }}>
                      <div style={{ width: 8, height: 8, borderRadius: 2, background: f.color, flexShrink: 0 }} />
                      <span className="clamp1">{f.name}</span>
                    </button>
                  ))}
                </div>
              </Field>
              <Field label="Tags"><input value={tags} onChange={e=>setTags(e.target.value)} placeholder="design, inspiration" style={inputStyle()} /></Field>
              <button onClick={submit} style={{ width: "100%", padding: 14, borderRadius: 12, fontSize: 15, fontWeight: 500, marginTop: 8, background: T.ink, color: T.paper }}>Save to library</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function FolderSheet({ onClose, onCreate }) {
  const [name, setName] = useState("");
  const [color, setColor] = useState(FOLDER_COLORS[0]);
  return (
    <div className="anim-fade" style={{ position: "absolute", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end", background: "rgba(28,26,23,0.45)" }} onClick={onClose}>
      <div className="anim-sheet" style={{ borderRadius: "28px 28px 0 0", overflow: "hidden", background: T.paper }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding: "12px 0 4px", display: "flex", justifyContent: "center" }}><div style={{ width: 36, height: 4, borderRadius: 999, background: T.line }} /></div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px" }}>
          <button onClick={onClose} style={{ fontSize: 14, color: T.inkSoft }}>Cancel</button>
          <div className="serif" style={{ fontSize: 18, color: T.ink }}>New folder</div>
          <div style={{ width: 48 }} />
        </div>
        <div style={{ padding: "0 20px 32px", display: "flex", flexDirection: "column", gap: 16 }}>
          <Field label="Name"><input autoFocus value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter" && name.trim() && onCreate(name.trim(), color)} placeholder="e.g. Travel ideas" style={inputStyle()} /></Field>
          <Field label="Color">
            <div style={{ display: "flex", gap: 8 }}>
              {FOLDER_COLORS.map(c => (
                <button key={c} onClick={()=>setColor(c)} style={{ width: 36, height: 36, borderRadius: 12, background: c, outline: color === c ? `2px solid ${T.ink}` : "none", outlineOffset: 2 }} />
              ))}
            </div>
          </Field>
          <button onClick={()=>name.trim() && onCreate(name.trim(), color)} disabled={!name.trim()} style={{ width: "100%", padding: 14, borderRadius: 12, fontSize: 15, fontWeight: 500, background: T.ink, color: T.paper, opacity: name.trim() ? 1 : 0.3 }}>Create</button>
        </div>
      </div>
    </div>
  );
}

function ItemSheet({ item, folders, onClose, onDelete }) {
  const folder = folders.find(f => f.id === item.folderId);
  return (
    <div className="anim-fade" style={{ position: "absolute", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end", background: "rgba(28,26,23,0.45)" }} onClick={onClose}>
      <div className="anim-sheet" style={{ borderRadius: "28px 28px 0 0", overflow: "hidden", display: "flex", flexDirection: "column", background: T.paper, maxHeight: "85%" }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding: "12px 0 4px", display: "flex", justifyContent: "center" }}><div style={{ width: 36, height: 4, borderRadius: 999, background: T.line }} /></div>
        <div style={{ height: 160, position: "relative", flexShrink: 0, background: item.thumbnail ? `center / cover no-repeat url(${item.thumbnail}), ${item.color}18` : `${item.color}18` }}>
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: item.color, background: item.thumbnail ? "linear-gradient(180deg, rgba(28,26,23,0.1) 0%, rgba(28,26,23,0.24) 100%)" : "transparent" }}>
            <div style={{ width: 64, height: 64, borderRadius: 20, background: item.thumbnail ? "rgba(255,255,255,0.84)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>
              {typeIconFor(item.type, { size: 38, stroke: 1.2 })}
            </div>
          </div>
          <button onClick={onClose} style={{ position: "absolute", top: 12, right: 12, width: 32, height: 32, borderRadius: "50%", background: T.paper, color: T.ink, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <IconX size={14} />
          </button>
          <div className="mono" style={{ position: "absolute", top: 12, left: 12, fontSize: 9, textTransform: "uppercase", letterSpacing: "0.08em", padding: "2px 8px", borderRadius: 999, background: T.paper, color: item.color }}>
            {item.type}
          </div>
        </div>
        <div className="scroll" style={{ padding: "16px 20px" }}>
          <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8, color: T.inkMute }}>{item.source} · saved {relativeTime(item.savedAt)}</div>
          <h2 className="serif" style={{ fontSize: 26, lineHeight: 1.2, marginBottom: 8, marginTop: 0, color: T.ink }}>{item.title}</h2>
          <p style={{ fontSize: 13, lineHeight: 1.5, marginBottom: 12, color: T.inkSoft }}>{item.description}</p>
          {folder && (
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, fontSize: 11, color: T.inkSoft }}>
              <div style={{ width: 8, height: 8, borderRadius: 2, background: folder.color }} />
              <span>in {folder.name}</span>
            </div>
          )}
          {item.tags.length > 0 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 16 }}>
              {item.tags.map(t => (
                <span key={t} className="mono" style={{ fontSize: 10, padding: "2px 8px", borderRadius: 999, background: T.paperDim, color: T.inkSoft, border: `1px solid ${T.lineSoft}` }}>#{t}</span>
              ))}
            </div>
          )}
          <div style={{ display: "flex", gap: 8, paddingTop: 12, borderTop: `1px solid ${T.lineSoft}` }}>
            <a href={item.url} target="_blank" rel="noreferrer" style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: 12, borderRadius: 12, fontSize: 13, fontWeight: 500, background: T.ink, color: T.paper, textDecoration: "none" }}>
              <IconArrowOut size={14} />Open source
            </a>
            <button onClick={onDelete} style={{ padding: 12, borderRadius: 12, color: T.inkSoft, border: `1px solid ${T.lineSoft}` }}>
              <IconTrash size={14} />
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function IOSShareSheet({ onClose, onPickSavi }) {
  const apps = [
    { name: "SAVI", bg: T.ink, icon: <IconBookmark size={22} stroke={2} fill={T.paper} />, primary: true },
    { name: "Messages", bg: "#34C759" },
    { name: "Mail", bg: "#007AFF" },
    { name: "Notes", bg: "#FFCC00" },
    { name: "Copy", bg: "#8E8E93" },
  ];
  return (
    <div className="anim-fade" style={{ position: "absolute", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end", background: "rgba(28,26,23,0.4)" }} onClick={onClose}>
      <div className="anim-sheet" style={{ borderRadius: "28px 28px 0 0", overflow: "hidden", background: "rgba(245, 241, 234, 0.96)", backdropFilter: "blur(30px)" }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding: "12px 0 8px", display: "flex", justifyContent: "center" }}><div style={{ width: 36, height: 4, borderRadius: 999, background: T.line }} /></div>
        <div style={{ margin: "0 16px 16px", padding: 12, borderRadius: 16, display: "flex", alignItems: "center", gap: 12, background: T.card, border: `1px solid ${T.lineSoft}` }}>
          <div style={{ width: 48, height: 48, borderRadius: 8, background: T.ink, color: T.paper, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <IconFile size={18} />
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="clamp1" style={{ fontSize: 13, fontWeight: 500, color: T.ink }}>The Future of PKM</div>
            <div className="clamp1" style={{ fontSize: 11, color: T.inkSoft }}>wired.com</div>
          </div>
          <div style={{ color: T.inkMute }}><IconShare size={16} /></div>
        </div>
        <div className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", padding: "0 20px 8px", color: T.inkMute }}>Share with app</div>
        <div style={{ padding: "0 12px 12px", display: "flex", gap: 16, overflowX: "auto" }}>
          {apps.map((app, i) => (
            <button key={i} onClick={app.primary ? onPickSavi : undefined} style={{ flexShrink: 0, display: "flex", flexDirection: "column", alignItems: "center", gap: 6, width: 68, opacity: app.primary ? 1 : 0.4 }}>
              <div style={{ width: 60, height: 60, borderRadius: 14, background: app.bg, color: T.paper, display: "flex", alignItems: "center", justifyContent: "center" }}>
                {app.icon || <div style={{ width: 24, height: 24, borderRadius: 4, background: "rgba(255,255,255,0.5)" }} />}
              </div>
              <div className="clamp1" style={{ fontSize: 10, color: T.ink, textAlign: "center", width: "100%" }}>{app.name}</div>
            </button>
          ))}
        </div>
        <button onClick={onClose} style={{ margin: "0 16px 32px", width: "calc(100% - 32px)", padding: 14, borderRadius: 16, fontSize: 15, fontWeight: 500, background: T.card, color: T.ink, border: `1px solid ${T.lineSoft}` }}>Cancel</button>
      </div>
    </div>
  );
}

// ============ shared helpers ============
const inputStyle = () => ({ width: "100%", borderRadius: 8, padding: "10px 12px", fontSize: 13, background: T.card, border: `1px solid ${T.lineSoft}`, color: T.ink });
const Label = ({ children }) => <label className="mono" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: 8, color: T.inkMute }}>{children}</label>;
const Field = ({ label, children }) => <div><Label>{label}</Label>{children}</div>;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
